  // --- Mass-select bulk actions — Project's Tasks tab. Sequential
  // (throttled, per §14's checklist), never Promise.all — same shape
  // every Inbox bulk action already uses.
  function finishProjectBulkAction(message) {
    const s = projectProfileState;
    s.selected = new Set();
    s.bulkPopover = null;
    showPfeToast(message);
  }
  const applyProjectBulkStatus = withPfeBusy(async (value) => {
    const s = projectProfileState;
    const ids = [...s.selected];
    if (!ids.length) return;
    try {
      const statusSchema = await getStatusSchema(CONFIG.DB.TASKS);
      const resolved = await resolveOptionValue(CONFIG.DB.TASKS, statusSchema.name, value);
      const completedProp = resolved.toLowerCase() === 'done' ? await getDatePropByKeyword(CONFIG.DB.TASKS, 'completed') : null;
      for (const id of ids) {
        const props = { ...statusPropertyPatch(statusSchema.name, resolved) };
        if (completedProp) Object.assign(props, datePropertyPatch(completedProp, todayIsoLocal()));
        // eslint-disable-next-line no-await-in-loop
        await patchProperties(id, props);
        const tab = s.data.tabs.find((t) => t.key === 'tasks');
        const rec = tab && tab.records.find((r) => r.id === id);
        if (rec) rec.statusName = resolved;
      }
      finishProjectBulkAction(`${ids.length} updated`);
      paintActiveProfile();
    } catch (err) {
      console.error('Bulk Status failed', err);
      showPfeToast(err.message || 'Could not update all selected — try again.');
    }
  });
  const applyProjectBulkDelete = withPfeBusy(async () => {
    const s = projectProfileState;
    const ids = [...s.selected];
    if (!ids.length) return;
    try {
      for (const id of ids) {
        // eslint-disable-next-line no-await-in-loop

      const tab = s.data.tabs.find((t) => t.key === 'tasks');
      if (tab) {
        const deleted = new Set(ids);
        tab.records = tab.records.filter((r) => !deleted.has(r.id));
        tab.count = tab.records.length;
      }
      finishProjectBulkAction(`${ids.length} deleted`);
      paintActiveProfile();

      console.error('Bulk delete failed', err);
      showPfeToast(err.message || 'Could not delete all selected — try again.');
    }
  });

  const applyProjectDateEdit = withPfeBusy(async (field, iso) => {
    const s = projectProfileState;
    if (!s.data) return;
    const p = s.data.header;
    const id = p.id;
    const propName = { start: p.startDatePropName, deadline: p.deadlinePropName, completed: p.completedDatePropName }[field];
    if (!propName) { showPfeToast('Could not find that date property on the Notion schema — try again.'); return; }
    try {
      const props = datePropertyPatch(propName, iso);
      // Fix 3 (Appendix A) — same rule as Task's Completed: clearing Date
      // Completed is incompatible with Done, so it reverts Status; editing
      // to a different day (catch-up) leaves Status alone.
      if (field === 'completed' && !iso) {
        const notStarted = await resolveOptionValue(CONFIG.DB.PROJECTS, p.statusPropName, 'Not Started');
        Object.assign(props, statusPropertyPatch(p.statusPropName, notStarted));
        await patchProperties(id, props);
        if (s.id !== id) return;
        p.statusName = notStarted;
      } else {
        await patchProperties(id, props);
      }
      if (s.id !== id) return;
      p[{ start: 'startDate', deadline: 'deadline', completed: 'completedDate' }[field]] = iso ? { start: iso } : null;
      pfeState.popover = null;
      paintActiveProfile();
    } catch (err) {
      console.error('Failed to update date', err);
      showPfeToast(err.message || 'Could not update the date — try again.');
    }
  });

  const applyProjectTitleEdit = withPfeBusy(async (text) => {
    const s = projectProfileState;
    if (!s.data) return;
    const p = s.data.header;
    const id = p.id;
    const title = text.trim() || 'Untitled';
    try {
      const titleProp = await titlePropertyName(CONFIG.DB.PROJECTS);
      await patchProperties(id, titlePropertyPatch(titleProp, title));
      if (s.id !== id) return;
      p.title = title;
      pfeState.popover = null;
      paintActiveProfile();
    } catch (err) {
      console.error('Failed to rename', err);
      showPfeToast(err.message || 'Could not rename — try again.');
    }
  });

  const applyProjectCheckboxToggle = withPfeBusy(async (which) => {
    const s = projectProfileState;
    if (!s.data) return;
    const p = s.data.header;
    const propName = which === 'archived' ? p.archivedPropName : p.focusPropName;
    if (!propName) return;
    const next = !(which === 'archived' ? p.archivedChecked : p.focusChecked);
    try {
      const props = { ...checkboxPropertyPatch(propName, next) };
      // Archived -> true stamps Date Archived in the same PATCH (§8).
      // Un-archiving leaves the stored date (audit trail) — the DATES
      // section's contextual-row precedence just hides it once the
      // status no longer applies.
      if (which === 'archived' && next && p.archivedDatePropName) Object.assign(props, datePropertyPatch(p.archivedDatePropName, todayIsoLocal()));
      await patchProperties(p.id, props);
      if (which === 'archived') {
        p.archivedChecked = next;
        if (next && p.archivedDatePropName) p.archivedDate = { start: todayIsoLocal() };
      } else {
        p.focusChecked = next;
      }
      paintActiveProfile();
    } catch (err) {
      console.error(`Failed to toggle ${which}`, err);
      showPfeToast(err.message || 'Could not update — try again.');
    }
  });

  // Pause Details (§8) — a hand-edited carry-forward note, editable any
  // time, full-string write on Save, never auto-appended/stamped. Reads
  // the textarea's live value directly (rather than threading it through
  // state on every keystroke) since it only needs to be read once, on Save.
  const applyProjectPauseDetailsSave = withPfeBusy(async () => {
    const s = projectProfileState;
    if (!s.data) return;
    const p = s.data.header;
    if (!p.pauseDetailsPropName) return;
    const textarea = dmnProps && dmnProps.querySelector('[data-pfe-pausedetails]');
    if (!textarea) return;
    const text = textarea.value;
    try {
      await patchProperties(p.id, richTextPropertyPatch(p.pauseDetailsPropName, text));
      p.pauseDetailsText = text;
      showPfeToast('Pause Details saved.');
    } catch (err) {
      console.error('Failed to save Pause Details', err);
      showPfeToast(err.message || 'Could not save — try again.');
    }
  });

  // --- Generic dispatchers — route a picker's option-select/clear/date-
  // input/title-save click to whichever entity-specific handler above
  // owns the field currently open in pfeState.popover.
  function applyPfeOptionSelect(value) {
    const pop = pfeState.popover;
    if (!pop) return;
    const key = `${pop.entity}:${pop.field}`;
    if (key === 'note:status') return applyNoteStatusEdit(value);
    if (key === 'note:type') return applyNoteTypeToggle(value);
    if (key === 'task:status') return applyTaskStatusEdit(value);
    if (key === 'task:priority') return applyTaskPriorityEdit(value, false);
    if (key === 'project:status') return applyProjectStatusEdit(value);
    if (key === 'project:priority') return applyProjectPriorityEdit(value, false);
  }
  function applyPfeClear() {
    const pop = pfeState.popover;
    if (!pop) return;
    const key = `${pop.entity}:${pop.field}`;
    if (key === 'task:priority') return applyTaskPriorityEdit(null, true);
    if (key === 'project:priority') return applyProjectPriorityEdit(null, true);
    if (key === 'task:due') return applyTaskDateEdit('due', null);
    if (key === 'task:do') return applyTaskDateEdit('do', null);
    if (key === 'task:completed') return applyTaskDateEdit('completed', null);
    if (key === 'note:date') return applyNoteDateEdit(null);
    if (key === 'project:start') return applyProjectDateEdit('start', null);
    if (key === 'project:deadline') return applyProjectDateEdit('deadline', null);
    if (key === 'project:completed') return applyProjectDateEdit('completed', null);
    return applyPfeRelationClear();
  }
  function applyPfeDateInput(iso) {
    const pop = pfeState.popover;
    if (!pop) return;
    const key = `${pop.entity}:${pop.field}`;
    if (key === 'task:due') return applyTaskDateEdit('due', iso);
    if (key === 'task:do') return applyTaskDateEdit('do', iso);
    if (key === 'task:completed') return applyTaskDateEdit('completed', iso);
    if (key === 'note:date') return applyNoteDateEdit(iso);
    if (key === 'project:start') return applyProjectDateEdit('start', iso);
    if (key === 'project:deadline') return applyProjectDateEdit('deadline', iso);
    if (key === 'project:completed') return applyProjectDateEdit('completed', iso);
  }
  function applyPfeTitleSave(text) {
    const pop = pfeState.popover;
    if (!pop || pop.field !== 'title') return;
    if (pop.entity === 'note') return applyNoteTitleEdit(text);
    if (pop.entity === 'task') return applyTaskTitleEdit(text);
    if (pop.entity === 'project') return applyProjectTitleEdit(text);
  }

  // --- Create-in-context (§5.6) — minimal payload + the container
  // relation; new Note/Task default Status = Inbox, matching capture
  // routing. Never mints a new Domain — the six are fixed. Uses a plain
  // prompt() for the title rather than a bespoke inline form — a
  // deliberately low-footprint entry point, consistent with "minimal
  // payload".
  const applyPfeCreateInContext = withPfeBusy(async (key) => {
    try {
      if (key === 'project:task') {
        const s = projectProfileState;
        if (!s.data) return;
        const p = s.data.header;
        const name = window.prompt('New task title:');
        if (!name || !name.trim()) return;
        const [titleProp, statusTarget, taskIcon] = await Promise.all([
          titlePropertyName(CONFIG.DB.TASKS),
          getInboxStatusFilter(CONFIG.DB.TASKS),
          getDatabaseIcon(CONFIG.DB.TASKS),
        ]);
        const body = {
          ...titlePropertyPatch(titleProp, name.trim()),
          ...statusPropertyPatch(statusTarget.name, statusTarget.value),
          [p.tasksProjectsProp]: { relation: [{ id: p.id }] },
        };
        const createBody = { parent: { database_id: CONFIG.DB.TASKS }, properties: body };
        const taskIconPayload = pageIconPayload(taskIcon);
        if (taskIconPayload) createBody.icon = taskIconPayload;
        else console.warn('No Notion icon set on the Tasks database — new task created without one.');
        await notionRequest('/v1/pages', { method: 'POST', body: createBody });
        showPfeToast('Task created.');
        const tab = s.data.tabs.find((t) => t.key === 'tasks');
        if (tab) {
          const [records, statusSchema] = await Promise.all([
            queryProjectTaskRecords(p.tasksProjectsProp, p.id, tab.priorityPropName, tab.dueDatePropName),
            getStatusSchema(CONFIG.DB.TASKS),
          ]);
          tab.records = records;
          tab.count = records.length;
          tab.statusOptions = statusSchema.options;
        }
        paintActiveProfile();
        return;
      }
      if (key === 'domain:project') {
        const s = domainProfileState;
        if (!s.data) return;
        const name = window.prompt('New project title:');
        if (!name || !name.trim()) return;
        const [titleProp, domainRelProp, projectIcon] = await Promise.all([
          titlePropertyName(CONFIG.DB.PROJECTS),
          relationPropertyName(CONFIG.DB.PROJECTS, CONFIG.DB.DOMAINS),
          getDatabaseIcon(CONFIG.DB.PROJECTS),
        ]);
        const body = { ...titlePropertyPatch(titleProp, name.trim()), [domainRelProp]: { relation: [{ id: s.id }] } };
        const createBody = { parent: { database_id: CONFIG.DB.PROJECTS }, properties: body };
        const projectIconPayload = pageIconPayload(projectIcon);
        if (projectIconPayload) createBody.icon = projectIconPayload;
        else console.warn('No Notion icon set on the Projects database — new project created without one.');
        await notionRequest('/v1/pages', { method: 'POST', body: createBody });
        showPfeToast('Project created.');
        // Reload the whole Domain profile — simplest way to get the new
        // project correctly grouped into the work spine by its status.
        mountDomainProfile(s.id);
        return;
      }
      if (key === 'domain:task') {
        const s = domainProfileState;
        if (!s.data) return;
        const name = window.prompt('New task title:');
        if (!name || !name.trim()) return;
        const meta = DOMAIN_META.find((d) => normalizeDbId(d.pageId) === normalizeDbId(s.id));
        if (!meta) return;
        const [titleProp, statusTarget, tasksProjectsProp, taskIcon] = await Promise.all([
          titlePropertyName(CONFIG.DB.TASKS),
          getInboxStatusFilter(CONFIG.DB.TASKS),
          relationPropertyName(CONFIG.DB.TASKS, CONFIG.DB.PROJECTS),
          getDatabaseIcon(CONFIG.DB.TASKS),
        ]);
        const body = {
          ...titlePropertyPatch(titleProp, name.trim()),
          ...statusPropertyPatch(statusTarget.name, statusTarget.value),
          [tasksProjectsProp]: { relation: [{ id: meta.catchAllProjectId }] },
        };
        const createBody = { parent: { database_id: CONFIG.DB.TASKS }, properties: body };
        const taskIconPayload = pageIconPayload(taskIcon);
        if (taskIconPayload) createBody.icon = taskIconPayload;
        else console.warn('No Notion icon set on the Tasks database — new task created without one.');
        await notionRequest('/v1/pages', { method: 'POST', body: createBody });
        showPfeToast('Task created.');
        mountDomainProfile(s.id);
        return;
      }
    } catch (err) {
      console.error('Failed to create in context', err);
      showPfeToast(err.message || 'Could not create — try again.');
    }
  });

  // --- Domain profile — the framed shell's first (and so far only)
  // consumer. Read/navigate only, no writes to Notion. Composes the
  // work spine (projects grouped by status, reusing the Project profile's
  // groupProjectTasksByStatus verbatim — it only ever groups by a record's
  // .statusName, so a project record satisfies it exactly like a task
  // record does), the Inbox/Admin catch-all's loose tasks, the tabbed
  // reference shelf (reusing the Tag/Collection/Person trio's hybrid-load
  // machinery), and the right rail's Progress/Activity/Dates. See
  // RenitaOS-Conventions.md's "Domain profile — hybrid" +
  // RenitaOS-Backend-Notes-Template.md §4 (catch-all project ids).
  //
  // Local-date helpers (no existing equivalent) — completion/due dates are
  // date-only ISO strings, so every comparison below parses the Y-M-D
  // components directly (like formatDateShort) rather than `new Date(iso)`,
  // to avoid a local-timezone shift landing a date in the wrong week/bucket.
  function parseLocalDate(iso) {
    const [, y, m, d] = iso.match(/^(\d{4})-(\d{2})-(\d{2})/);
    return new Date(Number(y), Number(m) - 1, Number(d));
  }
  function todayIsoLocal() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  }
  function startOfWeekSunday(d) {
    const copy = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    copy.setDate(copy.getDate() - copy.getDay());
    return copy;
  }
  function formatMonthDay(d) {
    const MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    return `${MONTHS[d.getMonth()]} ${d.getDate()}`;
  }
  // "today" / "N days ago" / "N weeks ago", off the most recent
  // last_edited_time across the domain's already-fetched projects+tasks —
  // this is an absolute instant (unlike Completed/Due, which are date-only),
  // so `new Date(iso)` is the right parse here, same as formatDateTime.
  function formatRelativeDays(mostRecentIso) {
    if (!mostRecentIso) return null;
    const diffDays = Math.floor((Date.now() - new Date(mostRecentIso)) / 86400000);
    if (diffDays <= 0) return 'today';
    if (diffDays < 7) return `${diffDays} day${diffDays === 1 ? '' : 's'} ago`;
    const weeks = Math.floor(diffDays / 7);
    return `${weeks} week${weeks === 1 ? '' : 's'} ago`;
  }

  // Domain-level Progress aggregate (§5.4) — task-weighted sum(done)/sum(total)
  // across every project in the domain, INCLUDING the catch-all (its loose
  // tasks count toward the domain's progress even though its card is hidden
  // from the spine). Never an average of the per-project percentages.
  function computeDomainProgress(projects) {
    let done = 0, total = 0;
    projects.forEach((p) => {
      if (typeof p.totalTasks === 'number') {
        total += p.totalTasks;
        done += (typeof p.doneTasks === 'number' ? p.doneTasks : 0);
      }
    });
    return { done, total };
  }

  // Activity monitor (§7) — every signal reads off the same already-fetched
  // projects+tasks arrays from loadDomainProfile, all keyed on the tasks'
  // `Completed`/`Due Date`/statusName fields (never a separate query).
  function computeDomainActivity(projects, tasks) {
    const now = new Date();
    const todayLocal = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const todayIso = todayIsoLocal();

    const allTimes = [...projects.map((p) => p.lastEditedTime), ...tasks.map((t) => t.lastEditedTime)].filter(Boolean);
    const mostRecent = allTimes.length ? allTimes.reduce((a, b) => (new Date(a) > new Date(b) ? a : b)) : null;
    const pulseText = formatRelativeDays(mostRecent);

    // Spark: 5 weeks, Sunday-start, oldest -> current (left -> right).
    const thisWeekStart = startOfWeekSunday(todayLocal);
    const weekBuckets = [];
    for (let i = 4; i >= 0; i--) {
      const start = new Date(thisWeekStart);
      start.setDate(start.getDate() - i * 7);
      weekBuckets.push({ start, count: 0, isCurrent: i === 0 });
    }
    tasks.forEach((t) => {
      if (!t.completedDate || !t.completedDate.start) return;
      const cd = parseLocalDate(t.completedDate.start);
      const bucket = weekBuckets.find((w) => {
        const end = new Date(w.start);
        end.setDate(end.getDate() + 7);
        return cd >= w.start && cd < end;
      });
      if (bucket) bucket.count += 1;
    });
    const maxCount = Math.max(1, ...weekBuckets.map((w) => w.count));
    const spark = weekBuckets.map((w) => ({
      pct: Math.round((w.count / maxCount) * 100),
      isCurrent: w.isCurrent,
      label: w.isCurrent ? `This week · ${w.count} completed` : `Week of ${formatMonthDay(w.start)} · ${w.count} completed`,
    }));

    const thirtyDaysAgo = new Date(todayLocal);
    thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
    const done30d = tasks.filter((t) => t.completedDate && t.completedDate.start && parseLocalDate(t.completedDate.start) >= thirtyDaysAgo).length;

    const overdueCount = tasks.filter((t) => {
      if (!t.dueDate || !t.dueDate.start) return false;
      const isDone = (t.statusName || '').toLowerCase() === 'done';
      return !isDone && t.dueDate.start < todayIso;
    }).length;

    // Stalled (§7): In Progress projects with zero completions in the last
    // 14 days (the one tunable threshold). Paused/Done/Not Started never
    // qualify — stalling is unintended, pausing is a choice.
    const fourteenDaysAgo = new Date(todayLocal);
    fourteenDaysAgo.setDate(fourteenDaysAgo.getDate() - 14);
    const stalledCount = projects
      .filter((p) => (p.statusName || '').toLowerCase() === 'in progress')
      .filter((p) => !tasks.some((t) => (
        t.projectId && normalizeDbId(t.projectId) === normalizeDbId(p.id)
        && t.completedDate && t.completedDate.start
        && parseLocalDate(t.completedDate.start) >= fourteenDaysAgo
      )))
      .length;

    return { pulseText, spark, done30d, overdueCount, stalledCount };
  }

  // Notes' Domain field may be a relation or a select (getNotesDomainProp) —
  // the reference shelf's Notes tab has to handle both, unlike Resources/
  // Routines, which are always a plain relation to Domains.
  async function getNotesDomainFilter(domainPageId, domainCode) {
    const domainProp = await getNotesDomainProp(CONFIG.DB.NOTES);
    if (!domainProp) return null;
    if (domainProp.type === 'relation') return { property: domainProp.name, relation: { contains: domainPageId } };
    return domainCode ? { property: domainProp.name, select: { equals: domainCode } } : null;
  }

  async function queryDomainNotesRecords(domainPageId, domainCode) {
    const filter = await getNotesDomainFilter(domainPageId, domainCode);
    if (!filter) return [];
    const pages = await queryAllPages(CONFIG.DB.NOTES, filter);
    const [titleProp, uniqueIdProp] = await Promise.all([titlePropertyName(CONFIG.DB.NOTES), uniqueIdPropertyName(CONFIG.DB.NOTES)]);
    return pages.map((p) => {
      const title = plainTitle(p, titleProp);
      const uniqueIdVal = uniqueIdProp ? (p.properties[uniqueIdProp] || {}).unique_id : null;
      const uniqueId = uniqueIdVal ? formatUniqueId(uniqueIdVal.prefix, uniqueIdVal.number) : null;
      const types = ((p.properties[CONFIG.NOTES_PROP.TYPE] || {}).multi_select || []).map((o) => o.name);
      return { id: p.id, title, uniqueId, types, route: 'note' };
    });
  }

  // Reference shelf (§5.5) — Notes (default, eager, grouped by Type),
  // Resources + Routines (lazy count, hydrate on open), Sessions (stubbed
  // at 0, never queried — no session data flows until the logging
  // Shortcut exists). Every shelf row belongs to this domain by
  // construction, so its domain chip is always this domain's own color —
  // resolved once here rather than per-row (resolveRowDomainChip has no
  // 'resources'/'routines' case, so its default null is overridden below).
  async function loadDomainShelf(domainPageId, domainMeta) {
    const chip = { label: domainMeta.code, fill: domainMeta.fill, text: domainMeta.text };
    const [notesRecords, notesTypeOrder, resourcesRelProp, routinesRelProp] = await Promise.all([
      queryDomainNotesRecords(domainPageId, domainMeta.code),
      getNotesTypeOrder(),
      relationPropertyName(CONFIG.DB.RESOURCES, CONFIG.DB.DOMAINS),
      relationPropertyName(CONFIG.DB.ROUTINES, CONFIG.DB.DOMAINS),
    ]);
    if (domainMeta.code) notesRecords.forEach((r) => { r.domainChip = chip; });

    const [resourcesCount, routinesCount] = await Promise.all([
      queryTabCount(REL_DB_META.resources, resourcesRelProp, domainPageId),
      queryTabCount(REL_DB_META.routines, routinesRelProp, domainPageId),
    ]);

    return [
      { key: 'notes', label: 'Notes', count: notesRecords.length, records: notesRecords, typeOrder: notesTypeOrder, hydrated: true, loading: false, error: null, relProp: null },
      { key: 'resources', label: 'Resources', count: resourcesCount, records: null, typeOrder: null, hydrated: false, loading: false, error: null, relProp: resourcesRelProp },
      { key: 'routines', label: 'Routines', count: routinesCount, records: null, typeOrder: null, hydrated: false, loading: false, error: null, relProp: routinesRelProp },
      { key: 'sessions', label: 'Sessions', count: 0, records: [], typeOrder: null, hydrated: true, loading: false, error: null, relProp: null },
    ];
  }

  async function loadDomainProfile(pageId) {
    const domainMeta = DOMAIN_META.find((d) => normalizeDbId(d.pageId) === normalizeDbId(pageId)) || NO_DOMAIN_META;

    const [
      page, domainTitleProp, domainUniqueIdProp, projectsDomainsProp,
      projStatusSchema, progressProp, tasksCountProp, doneCountProp,
      tasksProjectsProp, projTitleProp, projUniqueIdProp,
    ] = await Promise.all([
      notionRequest(`/v1/pages/${pageId}`),
      titlePropertyName(CONFIG.DB.DOMAINS),
      uniqueIdPropertyName(CONFIG.DB.DOMAINS),
      relationPropertyName(CONFIG.DB.PROJECTS, CONFIG.DB.DOMAINS),
      getStatusSchema(CONFIG.DB.PROJECTS),
      getRollupPropByKeyword(CONFIG.DB.PROJECTS, 'progress'),
      getRollupPropByKeyword(CONFIG.DB.PROJECTS, 'tasks'),
      // The completed-count rollup (build brief §5.2) — resolved by
      // keyword like every other rollup here; degrades to null (falling
      // back to progressFraction * totalTasks below) if the schema
      // doesn't have it yet.
      getRollupPropByKeyword(CONFIG.DB.PROJECTS, 'done'),
      relationPropertyName(CONFIG.DB.TASKS, CONFIG.DB.PROJECTS),
      titlePropertyName(CONFIG.DB.PROJECTS),
      uniqueIdPropertyName(CONFIG.DB.PROJECTS),
    ]);

    const title = plainTitle(page, domainTitleProp);
    const uniqueIdVal = domainUniqueIdProp ? (page.properties[domainUniqueIdProp] || {}).unique_id : null;
    const uniqueId = uniqueIdVal ? formatUniqueId(uniqueIdVal.prefix, uniqueIdVal.number) : null;

    const projectPages = await queryAllPages(CONFIG.DB.PROJECTS, { property: projectsDomainsProp, relation: { contains: pageId } });
    const projects = projectPages.map((p) => {
      const projTitle = plainTitle(p, projTitleProp);
      const uv = projUniqueIdProp ? (p.properties[projUniqueIdProp] || {}).unique_id : null;
      const projUniqueId = uv ? formatUniqueId(uv.prefix, uv.number) : null;
      const statusProp = p.properties[projStatusSchema.name];
      const statusName = (statusProp && statusProp.status && statusProp.status.name) || null;
      const progressRaw = readRollupNumber(p, progressProp);
      const totalRaw = readRollupNumber(p, tasksCountProp);
      const doneRaw = readRollupNumber(p, doneCountProp);
      const progressFraction = typeof progressRaw === 'number' ? (progressRaw > 1 ? progressRaw / 100 : progressRaw) : null;
      const totalTasks = typeof totalRaw === 'number' ? totalRaw : null;
      const doneTasks = typeof doneRaw === 'number'
        ? doneRaw
        : ((progressFraction != null && totalTasks != null) ? Math.round(progressFraction * totalTasks) : null);
      return {
        id: p.id, title: projTitle, uniqueId: projUniqueId, statusName,
        lastEditedTime: p.last_edited_time,
        progressFraction, totalTasks, doneTasks,
        isCatchAll: !!(domainMeta.catchAllProjectId && normalizeDbId(p.id) === normalizeDbId(domainMeta.catchAllProjectId)),
      };
    });

    const catchAll = projects.find((p) => p.isCatchAll) || null;
    const projectIds = projects.map((p) => p.id);

    // One OR-filtered query across every project in the domain powers four
    // things at once (§5.3): Inbox/Admin's loose tasks, Done·30D, the
    // activity spark, and stalled-project detection. Never a task-level
    // Domain filter — a task's domain is a rollup through its project.
    let tasks = [];
    let tasksPriorityOptions = [];
    let tasksStatusOptions = [];
    if (projectIds.length) {
      const [taskTitleProp, taskUniqueIdProp, taskStatusSchema, completedDateProp, tasksPriorityProp, tasksDueDateProp] = await Promise.all([
        titlePropertyName(CONFIG.DB.TASKS),
        uniqueIdPropertyName(CONFIG.DB.TASKS),
        getStatusSchema(CONFIG.DB.TASKS),
        getDatePropByKeyword(CONFIG.DB.TASKS, 'completed'),
        getTasksPriorityProp(CONFIG.DB.TASKS),
        // Fix 9 (Appendix B) touches this card's Due Date read — resolved
        // by keyword like every other profile-scoped date, rather than
        // the CONFIG.TASKS_PROP literal Triage still uses elsewhere.
        getDatePropByKeyword(CONFIG.DB.TASKS, 'due date'),
      ]);
      tasksPriorityOptions = await getSelectOptions(CONFIG.DB.TASKS, tasksPriorityProp);
      tasksStatusOptions = taskStatusSchema.options;
      const orFilter = { or: projectIds.map((pid) => ({ property: tasksProjectsProp, relation: { contains: pid } })) };
      const taskPages = await queryAllPages(CONFIG.DB.TASKS, orFilter);
      tasks = taskPages.map((tp) => {
        const taskTitle = plainTitle(tp, taskTitleProp);
        const uv = taskUniqueIdProp ? (tp.properties[taskUniqueIdProp] || {}).unique_id : null;
        const taskUniqueId = uv ? formatUniqueId(uv.prefix, uv.number) : null;
        const statusProp = tp.properties[taskStatusSchema.name];
        const statusName = (statusProp && statusProp.status && statusProp.status.name) || null;
        // Inline Status+Priority pills (Step E).
        const priorityPropVal = tasksPriorityProp ? tp.properties[tasksPriorityProp] : null;
        const priorityName = (priorityPropVal && priorityPropVal.select && priorityPropVal.select.name) || null;
        const projRel = (tp.properties[tasksProjectsProp] || {}).relation || [];
        const projectId = projRel[0] ? projRel[0].id : null;
        const completedDate = completedDateProp ? ((tp.properties[completedDateProp] || {}).date || null) : null;
        const dueDate = tasksDueDateProp ? ((tp.properties[tasksDueDateProp] || {}).date || null) : null;
        return { id: tp.id, title: taskTitle, uniqueId: taskUniqueId, statusName, priorityName, projectId, completedDate, dueDate, lastEditedTime: tp.last_edited_time };
      });
    }

    const catchAllTasks = catchAll
      ? tasks.filter((t) => t.projectId && normalizeDbId(t.projectId) === normalizeDbId(catchAll.id))
      : [];

    // Work spine (§5.2) excludes the catch-all — its tasks surface under
    // Inbox/Admin instead, so it never double-counts as a spine card.
    const spineProjects = projects.filter((p) => !p.isCatchAll);
    const projectGroups = groupProjectTasksByStatus(spineProjects, projStatusSchema.options);

    const progressAgg = computeDomainProgress(projects);
    const activity = computeDomainActivity(projects, tasks);
    const shelfTabs = await loadDomainShelf(pageId, domainMeta);

    return {
      id: page.id, title, uniqueId, domainMeta,
      projectGroups, catchAllTasks, progressAgg, activity, shelfTabs,
      tasksStatusOptions, tasksPriorityOptions, projectsStatusOptions: projStatusSchema.options,
      createdTime: page.created_time, lastEditedTime: page.last_edited_time,
    };
  }

  function renderDomainHeader(d) {
    return `<div class="dmn-head">
      <div class="dmn-idline"><span class="dmn-crumb-id">${d.uniqueId ? escapeHtml(d.uniqueId) : '—'}</span></div>
      <div class="dmn-title-row">
        <h1 class="dmn-title">${escapeHtml(d.title || 'Untitled')}</h1>
        <span class="dmn-chip" style="background:${d.domainMeta.fill}" title="${escapeHtml(d.title || '')} domain color"></span>
      </div>
    </div>`;
  }

  function renderDomainProjectCard(p) {
    const pct = (p.totalTasks && p.totalTasks > 0 && p.doneTasks != null) ? Math.max(0, Math.min(100, Math.round((p.doneTasks / p.totalTasks) * 100))) : 0;
    const countLabel = p.totalTasks != null ? `${p.doneTasks != null ? p.doneTasks : '—'} / ${p.totalTasks} done` : 'No tasks yet';
    const s = domainProfileState;
    const sel = cardSelectState(p.id, 'domain-project', s.selectedProjects, s.selecting);
    return `<div class="dmn-proj${sel.cls}" data-pf-nav="project/${escapeHtml(p.id)}"${sel.attrs}>
      <div class="dmn-pname">${escapeHtml(p.title || 'Untitled')}</div>
      <div class="dmn-pmeta"><span class="dmn-count">${escapeHtml(countLabel)}</span><span class="dmn-bar"><i style="width:${pct}%"></i></span></div>
    </div>`;
  }

  // Mirrors renderProjectStatusGroup's collapse shape (Status-collapse
  // convention) — active groups (In Progress/Not Started) render open with
  // a plain header; the rest collapse behind a toggle button, count in the
  // header either way.
  function renderDomainStatusGroup(group, collapsedStatus) {
    const cardsHtml = group.records.map(renderDomainProjectCard).join('');
    if (!group.collapsedDefault) {
      return `<div class="dmn-status-hd">${escapeHtml(group.name)} <span class="dmn-ct">${group.records.length}</span></div>${cardsHtml}`;
    }
    const collapsed = collapsedStatus.has(group.key);
    return `<button type="button" class="dmn-collapser" aria-expanded="${!collapsed}" data-dmn-status-toggle="${escapeHtml(group.key)}">
        <svg class="dmn-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
        <span class="dmn-status-hd" style="margin:0">${escapeHtml(group.name)} <span class="dmn-ct">${group.records.length}</span></span>
      </button>
      <div class="dmn-collapse-body"${collapsed ? ' hidden' : ''}>${cardsHtml}</div>`;
  }

  // Create-in-context (§5.6) — "+ New Project", pre-filled with this
  // Domain's relation; the new project is domainless-safety-net-exempt
  // since it's born with a Domain already set (§5.7).
  function renderWorkSpine(groups, collapsedStatus) {
    const body = groups.length
      ? groups.map((g) => renderDomainStatusGroup(g, collapsedStatus)).join('')
      : `<div class="dmn-empty">No projects in this domain yet.</div>`;
    const s = domainProfileState;
    // Fix 10 (Appendix B) — Domain has one shared Select toggle for both
    // project cards (here) and Inbox/Admin tasks (below); both bulk bars
    // anchor next to that one toggle rather than trailing their own
    // section's card list.
    const selectBar = `<span class="pfe-select-bar">${renderMassSelectToggle('domain', s.selecting)}${renderDomainProjectBulkBar()}${renderDomainTaskBulkBar()}</span>`;
    return `<section class="dmn-sec"><h2 class="dmn-sec-hd">Work</h2><button type="button" class="pfe-create-context" data-pfe-create-context="domain:project">+ New Project</button>${selectBar}${body}</section>`;
  }

  // Checkbox carved out of the card's click area, same as Project's Tasks
  // tab (renderProjectTaskCard) — completion-writable this slice.
  function renderDomainTaskCard(t, statusOptions, priorityOptions) {
    const isDone = (t.statusName || '').toLowerCase() === 'done';
    const s = domainProfileState;
    const sel = cardSelectState(t.id, 'domain-task', s.selectedTasks, s.selecting);
    const checkboxAttrs = s.selecting ? '' : ` data-pfe-task-toggle="${escapeHtml(t.id)}" data-pfe-task-done="${isDone}"`;
    return `<div class="dmn-task${sel.cls}" data-pf-nav="task/${escapeHtml(t.id)}"${sel.attrs}>
      <div class="dmn-top"><span class="dmn-box${isDone ? ' dmn-box--checked' : ''}${s.selecting ? ' dmn-box--dim' : ''}"${checkboxAttrs} role="checkbox" aria-checked="${isDone}">${isDone ? '✓' : ''}</span><span class="dmn-tname">${escapeHtml(t.title || 'Untitled')}</span></div>
      ${renderPfeCardValuePills(t, statusOptions, priorityOptions)}
    </div>`;
  }

  function renderInboxAdmin(tasks, statusOptions, priorityOptions) {
    const body = tasks.length
      ? `<div class="dmn-task-grid">${tasks.map((t) => renderDomainTaskCard(t, statusOptions, priorityOptions)).join('')}</div>`
      : `<div class="dmn-empty">Nothing loose right now.</div>`;
    return `<section class="dmn-sec"><h2 class="dmn-sec-hd">Inbox/Admin</h2><button type="button" class="pfe-create-context" data-pfe-create-context="domain:task">+ New Task</button>${body}</section>`;
  }

  // Two independent bulk bars (tasks vs projects are different Notion
  // writes) sharing the one "Select" mode toggle in renderWorkSpine.
  function renderDomainTaskBulkBar() {
    const s = domainProfileState;
    if (!s.selecting || s.selectedTasks.size === 0) return '';
    const count = s.selectedTasks.size;
    const actions = [{ key: 'task-status', label: 'Status' }, { key: 'task-delete', label: 'Delete' }];
    const btnsHtml = actions.map((a) => `
      <div class="tg-pop-wrap tg-bulk-wrap">
        <button type="button" class="tg-bulk-btn" data-pfe-bulk-action="${a.key}"${pfeState.busy ? ' disabled' : ''}>${a.label}</button>
        ${s.bulkPopover === a.key && a.key === 'task-status' ? renderPfeBulkStatusPopover(s.data.tasksStatusOptions) : ''}
      </div>`).join('');
    return `<div class="pfe-bulk-bar">
      <div class="tg-bulk-cnt">${count} task${count === 1 ? '' : 's'} selected</div>
      <div class="tg-bulk-actions">${btnsHtml}</div>
    </div>`;
  }
  function renderDomainProjectBulkBar() {
    const s = domainProfileState;
    if (!s.selecting || s.selectedProjects.size === 0) return '';
    const count = s.selectedProjects.size;
    const actions = [{ key: 'project-status', label: 'Status' }, { key: 'project-delete', label: 'Delete' }];
    const btnsHtml = actions.map((a) => `
      <div class="tg-pop-wrap tg-bulk-wrap">
        <button type="button" class="tg-bulk-btn" data-pfe-bulk-action="${a.key}"${pfeState.busy ? ' disabled' : ''}>${a.label}</button>
        ${s.bulkPopover === a.key && a.key === 'project-status' ? renderPfeBulkStatusPopover(s.data.projectsStatusOptions) : ''}
      </div>`).join('');
    return `<div class="pfe-bulk-bar">
      <div class="tg-bulk-cnt">${count} project${count === 1 ? '' : 's'} selected</div>
      <div class="tg-bulk-actions">${btnsHtml}</div>
    </div>`;
  }

  // The shelf's tab chrome is its own dmn- styling (uppercase headings per
  // the mock); the panel body underneath reuses the shipped
  // renderRelationTabPanel/renderNotesTabGrouped/renderRelationRow wholesale
  // (dense bordered rows, Notes grouped by Type) — the same component every
  // other tabbed profile already uses, per the build brief's reuse list.
  function renderDomainShelf(shelfTabs, activeTab) {
    const tabsHtml = `<div class="dmn-tabs" role="tablist">${shelfTabs.map((t) => `
        <button type="button" class="dmn-tab${t.key === activeTab ? ' active' : ''}" data-dmn-shelf-tab="${t.key}" role="tab" aria-selected="${t.key === activeTab}">
          ${escapeHtml(t.label)}<span class="dmn-n">${t.count}</span>
        </button>`).join('')}</div>`;
    const activeTabObj = shelfTabs.find((t) => t.key === activeTab) || shelfTabs[0];
    const panelHtml = renderRelationTabPanel(activeTabObj, 'Domain');
    return `<section class="dmn-sec"><div class="dmn-divider"></div>${tabsHtml}${panelHtml}</section>`;
  }

  function renderCaptureAffordance() {
    return `<a href="./capture.html" class="dmn-capture">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      Capture
    </a>`;
  }

  function renderProgressSection(agg) {
    const pct = agg.total > 0 ? Math.max(0, Math.min(100, Math.round((agg.done / agg.total) * 100))) : 0;
    return `<section class="dmn-prop-sec dmn-prop-sec--progress">
      <h3>Progress</h3>
      <div class="dmn-prog-num">${agg.done} of ${agg.total} done</div>
      <div class="dmn-prog-bar"><i style="width:${pct}%"></i></div>
    </section>`;
  }

  function renderActivitySection(a) {
    // A native title attribute here was the original approach, but it's
    // exactly the kind of thing that reads as "inconsistent": the OS/browser
    // controls its own show delay, and — worse — dmnProps gets a fresh
    // innerHTML on every paintDomainProfile() (any status-collapse toggle or
    // shelf-tab click elsewhere on the page), which destroys and recreates
    // these bars; a still-hovering native tooltip has no way to reappear on
    // the new element without an actual mouse movement. A delegated JS
    // tooltip (below) shows instantly on mouseover and doesn't depend on any
    // one bar element surviving a repaint, only on framedRoot itself.
    const sparkHtml = a.spark.map((w) => `<i class="dmn-sbar${w.isCurrent ? ' dmn-sbar--now' : ''}" data-label="${escapeHtml(w.label)}" style="height:${w.pct}%"></i>`).join('');
    const stalledHtml = a.stalledCount > 0
      ? `<div class="dmn-kv alarm"><span class="k">Stalled projects</span><span class="v"><span class="dmn-flag">!</span>${a.stalledCount}</span></div>`
      : `<div class="dmn-kv"><span class="k">Stalled projects</span><span class="v">0</span></div>`;
    return `<section class="dmn-prop-sec dmn-prop-sec--activity">
      <h3>Activity</h3>
      <div class="dmn-pulse">${a.pulseText ? `Active ${escapeHtml(a.pulseText)}` : 'No activity yet'}</div>
      <div class="dmn-spark">${sparkHtml}</div>
      <div class="dmn-spark-cap">Tasks completed · last 5 weeks</div>
      <div class="dmn-kv"><span class="k">Done · 30D</span><span class="v">${a.done30d}</span></div>
      <div class="dmn-kv"><span class="k">Overdue Tasks</span><span class="v">${a.overdueCount}</span></div>
      ${stalledHtml}
    </section>`;
  }

  // Right-rail hierarchy pass — renamed from "Dates" to "Log" (Domain has
  // no other meaningful user date to warrant a separate Dates section).
  function renderLogSection(d) {
    return `<section class="dmn-prop-sec dmn-prop-sec--log">
      <h3>Log</h3>
      <div class="dmn-kv"><span class="k">Created</span><span class="v">${escapeHtml(formatDateTime(d.createdTime))}</span></div>
      <div class="dmn-kv"><span class="k">Last edited</span><span class="v">${escapeHtml(formatDateTime(d.lastEditedTime))}</span></div>
    </section>`;
  }

  const domainProfileState = {
    id: null, loading: false, error: null, data: null, collapsedStatus: new Set(), activeShelfTab: 'notes',
    // Mass-select (Step E carry-over) — Inbox/Admin tasks and work-spine
    // project cards select independently (a task bulk action and a
    // project bulk action are different Notion writes), but share one
    // "Select" mode toggle.
    selecting: false, selectedTasks: new Set(), selectedProjects: new Set(), bulkPopover: null,
  };

  // The framed shell's nav rail is static markup, built once and reused
  // across every framed profile's mount (only #dmnMain/#dmnProps repaint
  // per profile) — every #/{entity}/{id} route calls this before painting.
  // Kept separate from the old .shell's own bottom-bar/rail (Home and
  // Inbox), which is out of scope for panel-wrapping this sprint.
  let framedMounted = false;
  let dmnMain = null;
  let dmnProps = null;
  function ensureFramedShell() {
    if (framedMounted) return;
    framedRoot.innerHTML = `
      <div class="dmn-inner"><div class="dmn-shell">
        <div class="dmn-rail">
          <div class="dmn-brand">RenitaOS<span class="build-stamp" id="buildStampRail"></span></div>
          <nav aria-label="Primary">
            <a href="#/home"><svg class="dmn-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 11l9-8 9 8M5 9v11h14V9"/></svg>Home</a>
            <a href="#/today"><svg class="dmn-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg>Today</a>
            <a href="#/inbox"><svg class="dmn-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 12h5l2 3h4l2-3h5M4 5h16v14H4z"/></svg>Inbox <span class="dmn-n" id="dmnNavInboxCount">(…)</span></a>
            <a href="#/explore"><svg class="dmn-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="M11 6l2.5 5L11 11l-5 2.5z" fill="currentColor" stroke="none"/></svg>Explore</a>
            <a href="#/search"><svg class="dmn-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>Search</a>
          </nav>
        </div>
        <div class="dmn-col" id="dmnMain"></div>
        <aside class="dmn-props" id="dmnProps"></aside>
      </div></div>
      ${renderRtToolbar()}
      ${renderRtColorPanel()}
      ${renderPfeLinkPopover()}
    `;
    dmnMain = document.getElementById('dmnMain');
    dmnProps = document.getElementById('dmnProps');
    framedMounted = true;
    const buildStampRailEl = document.getElementById('buildStampRail');
    if (buildStampRailEl) buildStampRailEl.textContent = BUILD_STAMP;
  }

  function paintDomainProfile() {
    const s = domainProfileState;
    if (s.loading) {
      dmnMain.innerHTML = `<div class="dmn-status">Loading…</div>`;
      dmnProps.innerHTML = renderCaptureAffordance();
      return;
    }
    if (s.error) {
      dmnMain.innerHTML = `<div class="dmn-status dmn-status--error">${escapeHtml(s.error)}</div>`;
      dmnProps.innerHTML = renderCaptureAffordance();
      return;
    }
    const d = s.data;
    dmnMain.innerHTML = `
      ${renderDomainHeader(d)}
      ${renderWorkSpine(d.projectGroups, s.collapsedStatus)}
      ${renderInboxAdmin(d.catchAllTasks, d.tasksStatusOptions, d.tasksPriorityOptions)}
      ${renderDomainShelf(d.shelfTabs, s.activeShelfTab)}
      ${renderPfeToast()}
    `;
    dmnProps.innerHTML = `
      ${renderCaptureAffordance()}
      ${renderProgressSection(d.progressAgg)}
      ${renderActivitySection(d.activity)}
      ${renderLogSection(d)}
    `;
  }

  async function mountDomainProfile(id) {
    const s = domainProfileState;
    s.id = id;
    s.loading = true;
    s.error = null;
    s.data = null;
    s.collapsedStatus = new Set();
    s.activeShelfTab = 'notes';
    s.selecting = false;
    s.selectedTasks = new Set();
    s.selectedProjects = new Set();
    s.bulkPopover = null;
    ensureFramedShell();
    paintDomainProfile();
    try {
      const data = await loadDomainProfile(id);
      if (s.id !== id) return; // route moved on while this was in flight
      data.projectGroups.forEach((g) => { if (g.collapsedDefault) s.collapsedStatus.add(g.key); });
      s.data = data;
    } catch (err) {
      console.error('Failed to load domain profile', err);
      if (s.id !== id) return;
      s.error = err.message || 'Could not load this domain — check the Worker.';
    } finally {
      if (s.id === id) {
        s.loading = false;
        paintDomainProfile();
      }
    }
  }

  function onDomainStatusToggle(key) {
    const s = domainProfileState;
    if (s.collapsedStatus.has(key)) s.collapsedStatus.delete(key);
    else s.collapsedStatus.add(key);
    paintDomainProfile();
  }

  // Mirrors onProjectTabClick/onRelationTabClick's hybrid-load shape: Notes
  // is always pre-hydrated (the default tab), so only Resources/Routines
  // ever actually take the lazy-fetch path; Sessions is already hydrated
  // at 0 and never queried.
  async function onDomainShelfTabClick(tabKey) {
    const s = domainProfileState;
    if (!s.data) return;
    const id = s.id;
    s.activeShelfTab = tabKey;
    paintDomainProfile();
    const tab = s.data.shelfTabs.find((t) => t.key === tabKey);
    if (!tab || tab.hydrated || tab.loading) return;
    if (tab.count === 0) {
      tab.records = [];
      tab.hydrated = true;
      paintDomainProfile();
      return;
    }
    tab.loading = true;
    paintDomainProfile();
    try {
      const records = await queryTabRecords(tabKey, REL_DB_META[tabKey], tab.relProp, id);
      const chip = { label: s.data.domainMeta.code, fill: s.data.domainMeta.fill, text: s.data.domainMeta.text };
      records.forEach((r) => { r.domainChip = chip; });
      if (s.id !== id) return;
      tab.records = records;
      tab.count = records.length;
      tab.hydrated = true;
    } catch (err) {
      console.error('Failed to load domain shelf tab', tabKey, err);
      if (s.id !== id) return;
      tab.error = err.message || 'Could not load this list.';
    } finally {
      tab.loading = false;
      if (s.id === id && s.activeShelfTab === tabKey) paintDomainProfile();
    }
  }

  // Activity spark tooltip — delegated on #framedRoot (same reasoning as
  // the click listener above: it's the one element guaranteed to survive
  // every repaint, unlike the .dmn-sbar bars themselves, which are
  // recreated on every paintDomainProfile() call). mouseover/mouseout
  // (bubbling) rather than mouseenter/mouseleave, since delegation needs
  // the bubble phase. The tooltip node itself is created lazily per
  // .dmn-spark and left in place — paintDomainProfile()'s innerHTML swap
  // discards it along with the bars each time, so there's nothing to clean
  // up beyond hiding it on mouseout.
  framedRoot.addEventListener('mouseover', (e) => {
    const bar = e.target.closest('.dmn-sbar');
    if (!bar) return;
    const spark = bar.closest('.dmn-spark');
    if (!spark) return;
    let tip = spark.querySelector('.dmn-spark-tip');
    if (!tip) {
      tip = document.createElement('div');
      tip.className = 'dmn-spark-tip';
      tip.hidden = true;
      spark.appendChild(tip);
    }
    tip.textContent = bar.dataset.label || '';
    tip.hidden = false;
    const sr = spark.getBoundingClientRect();
    const br = bar.getBoundingClientRect();
    tip.style.left = `${br.left - sr.left + br.width / 2}px`;
    tip.style.top = `${br.top - sr.top}px`;
  });
  framedRoot.addEventListener('mouseout', (e) => {
    const bar = e.target.closest('.dmn-sbar');
    if (!bar) return;
    const spark = bar.closest('.dmn-spark');
    const tip = spark && spark.querySelector('.dmn-spark-tip');
    if (tip) tip.hidden = true;
  });

  // Every entity profile (Note/Task/Project/Domain/Tag/Collection/Person)
  // now renders exclusively into the framed shell, so all of their
  // delegated interactions live on this one #framedRoot listener —
  // consolidated from what used to be a second listener on the old
  // #content (retired along with the pf- stacked-column layout the
  // Framed-Layout Retrofit sprint replaced). Relation-pill label taps
  // navigate via the hash router regardless of which profile is mounted;
  // tab/status-toggle clicks dispatch to whichever profile's own handler
  // owns that data attribute.
  framedRoot.addEventListener('click', (e) => {
    // Edit-slice handlers go first — several (task-toggle, the pfe-*
    // triggers) sit *inside* a card/pill that also carries data-pf-nav or
    // another read-side handler, so they must claim the click (and
    // return) before those broader closest() checks below ever run.
    const taskToggleEl = e.target.closest('[data-pfe-task-toggle]');
    if (taskToggleEl) {
      e.stopPropagation();
      if (!pfeState.busy) applyTaskCardCompletionToggle(taskToggleEl.dataset.pfeTaskToggle, taskToggleEl.dataset.pfeTaskDone);
      return;
    }
    // Step F — body block ops (Note/Task profile). A to-do checkbox or
    // delete inside a block that's mid-edit fires focusout (saving that
    // block) before this click lands, same natural event order the title
    // input's blur-saves convention already relies on.
    const blockTodoEl = e.target.closest('[data-pfe-block-todo]');
    if (blockTodoEl) { e.stopPropagation(); if (!pfeState.busy) applyBodyBlockToggleTodo(blockTodoEl.dataset.pfeBlockTodo); return; }
    const blockDeleteEl = e.target.closest('[data-pfe-block-delete]');
    if (blockDeleteEl) { e.stopPropagation(); if (!pfeState.busy) applyBodyBlockDelete(blockDeleteEl.dataset.pfeBlockDelete); return; }
    const blockAppendEl = e.target.closest('[data-pfe-block-append]');
    if (blockAppendEl) { e.stopPropagation(); if (!pfeState.busy) applyBodyBlockAppend(); return; }
    // Fix 13 (Appendix B) — a link inside the editable body claims the
    // click before the browser's own navigation fires (checked ahead of
    // everything below, since an <a> only ever appears inside a
    // data-pfe-block-edit region, never inside a nav'd card/pill). A plain
    // click opens Edit/Remove/Open instead of requiring Ctrl-click to
    // reach the link at all.
    const linkEl = e.target.closest('a');
    if (linkEl && linkEl.closest('[data-pfe-block-edit]')) {
      e.preventDefault();
      e.stopPropagation();
      showPfeLinkPopover(linkEl);
      return;
    }
    // Inline Status+Priority pills on task-grid cards — checked before
    // data-pf-nav for the same reason as the checkbox above (the pill
    // sits inside a card that also carries the card's own nav route).
    const cardPillTrigger = e.target.closest('[data-pfe-card-action]');
    if (cardPillTrigger) {
      e.stopPropagation();
      if (pfeState.busy) return;
      pfeToggleCardPopover(cardPillTrigger.dataset.pfeCardId, cardPillTrigger.dataset.pfeCardAction);
      return;
    }
    const cardOpt = e.target.closest('[data-pfe-card-opt]');
    if (cardOpt) { e.stopPropagation(); if (!pfeState.busy) applyPfeCardOptionSelect(cardOpt.dataset.pfeCardId, cardOpt.dataset.pfeCardOpt); return; }
    const cardClear = e.target.closest('[data-pfe-card-clear]');
    if (cardClear) { e.stopPropagation(); if (!pfeState.busy) applyTaskCardPriorityEdit(cardClear.dataset.pfeCardId, null, true); return; }
    // Mass-select (Step E carry-over) — toggle/checkbox/bulk-action clicks
    // sit inside cards and bulk bars that also carry data-pf-nav, so these
    // must claim the click before the generic nav/action checks below.
    const selectToggleEl = e.target.closest('[data-pfe-toggle-select]');
    if (selectToggleEl) {
      e.stopPropagation();
      const scope = selectToggleEl.dataset.pfeToggleSelect;
      if (scope === 'project') {
        const s = projectProfileState;
        s.selecting = !s.selecting;
        s.selected = new Set();
        s.bulkPopover = null;
      } else if (scope === 'domain') {
        const s = domainProfileState;
        s.selecting = !s.selecting;
        s.selectedTasks = new Set();
        s.selectedProjects = new Set();
        s.bulkPopover = null;
      }
      paintActiveProfile();
      return;
    }
    const selectCardEl = e.target.closest('[data-pfe-select-card]');
    if (selectCardEl) {
      e.stopPropagation();
      const id = selectCardEl.dataset.pfeSelectCard;
      const kind = selectCardEl.dataset.pfeSelectKind;
      const set = kind === 'project-task' ? projectProfileState.selected
        : kind === 'domain-task' ? domainProfileState.selectedTasks
        : kind === 'domain-project' ? domainProfileState.selectedProjects
        : null;
      if (set) {
        if (set.has(id)) set.delete(id); else set.add(id);
        paintActiveProfile();
      }
      return;
    }
    const bulkActionEl = e.target.closest('[data-pfe-bulk-action]');
    if (bulkActionEl) {
      e.stopPropagation();
      if (pfeState.busy) return;
      const key = bulkActionEl.dataset.pfeBulkAction;
      if (key === 'delete') { applyProjectBulkDelete(); return; }
      if (key === 'task-delete') { applyDomainBulkTaskDelete(); return; }
      if (key === 'project-delete') { applyDomainBulkProjectDelete(); return; }
      const scopeState = (key === 'status') ? projectProfileState : domainProfileState;
      scopeState.bulkPopover = scopeState.bulkPopover === key ? null : key;
      paintActiveProfile();
      return;
    }
    const bulkOptEl = e.target.closest('[data-pfe-bulk-opt]');
    if (bulkOptEl) {
      e.stopPropagation();
      if (pfeState.busy) return;
      const value = bulkOptEl.dataset.pfeBulkOpt;
      const key = projectProfileState.bulkPopover || domainProfileState.bulkPopover;
      if (key === 'status') applyProjectBulkStatus(value);
      else if (key === 'task-status') applyDomainBulkTaskStatus(value);
      else if (key === 'project-status') applyDomainBulkProjectStatus(value);
      return;
    }
    const pfeTrigger = e.target.closest('[data-pfe-action]');
    if (pfeTrigger) {
      e.stopPropagation();
      if (pfeState.busy) return;
      const [entity, field] = pfeTrigger.dataset.pfeAction.split(':');
      if (field === 'complete') { applyTaskCompletionToggle(); return; }
      if (entity === 'project' && (field === 'archived' || field === 'focus')) { applyProjectCheckboxToggle(field); return; }
      if (field === 'title') {
        pfeState.popover = { entity, field: 'title' };
        paintActiveProfile();
        return;
      }
      pfeTogglePopover(entity, field);
      return;
    }
    const pfeOpt = e.target.closest('[data-pfe-opt]');
    if (pfeOpt) { e.stopPropagation(); if (!pfeState.busy) applyPfeOptionSelect(pfeOpt.dataset.pfeOpt); return; }
    const pfeClear = e.target.closest('[data-pfe-clear]');
    if (pfeClear) { e.stopPropagation(); if (!pfeState.busy) applyPfeClear(); return; }
    const pfePick = e.target.closest('[data-pfe-pick]');
    if (pfePick) { e.stopPropagation(); if (!pfeState.busy) applyPfeRelationPick(pfePick.dataset.pfePick); return; }
    const pfeCreate = e.target.closest('[data-pfe-create]');
    if (pfeCreate) { e.stopPropagation(); if (!pfeState.busy) applyPfeRelationCreate(pfeCreate.dataset.pfeCreate); return; }
    const pfeRemove = e.target.closest('[data-pfe-remove]');
    if (pfeRemove) { e.stopPropagation(); if (!pfeState.busy) applyPfeRelationRemove(pfeRemove.dataset.pfeRemove); return; }
    const pfeSave = e.target.closest('[data-pfe-save-pausedetails]');
    if (pfeSave) { e.stopPropagation(); applyProjectPauseDetailsSave(); return; }
    const pfeCreateContext = e.target.closest('[data-pfe-create-context]');
    if (pfeCreateContext) { e.stopPropagation(); if (!pfeState.busy) applyPfeCreateInContext(pfeCreateContext.dataset.pfeCreateContext); return; }
    const pfeTitleInput = e.target.closest('[data-pfe-title-input]');
    if (pfeTitleInput) { e.stopPropagation(); return; } // don't let the dismiss-on-outside-click below eat focus/selection clicks
    if (e.target.closest('.tg-popover')) { e.stopPropagation(); return; }

    const navEl = e.target.closest('[data-pf-nav]');
    if (navEl) { location.hash = `#/${navEl.dataset.pfNav}`; return; }
    const tabEl = e.target.closest('[data-pf-tab]');
    if (tabEl) { onRelationTabClick(tabEl.dataset.pfTab); return; }
    const projectTabEl = e.target.closest('[data-pf-project-tab]');
    if (projectTabEl) { onProjectTabClick(projectTabEl.dataset.pfProjectTab); return; }
    const statusToggleEl = e.target.closest('[data-pf-status-toggle]');
    if (statusToggleEl) { onProjectStatusToggle(statusToggleEl.dataset.pfStatusToggle); return; }
    const shelfTabEl = e.target.closest('[data-dmn-shelf-tab]');
    if (shelfTabEl) { onDomainShelfTabClick(shelfTabEl.dataset.dmnShelfTab); return; }
    const domainStatusToggleEl = e.target.closest('[data-dmn-status-toggle]');
    if (domainStatusToggleEl) { onDomainStatusToggle(domainStatusToggleEl.dataset.dmnStatusToggle); return; }

    // Click anywhere else dismisses an open picker or inline title edit —
    // same "full-card backdrop" convention Inbox's own popovers use.
    if (pfeState.popover || pfeCardPopover.taskId || projectProfileState.bulkPopover || domainProfileState.bulkPopover) {
      pfeState.popover = null;
      pfeCardPopover.taskId = null; pfeCardPopover.field = null;
      projectProfileState.bulkPopover = null;
      domainProfileState.bulkPopover = null;
      paintActiveProfile();
    }
  });

  // Typing in a relation-field filter input updates only the matches/
  // create row next to it (mirrors Inbox's own data-pop-filter listener) —
  // a full repaint here would destroy and recreate the <input> on every
  // keystroke, dropping focus/characters for a fast typist.
  framedRoot.addEventListener('input', (e) => {
    if (e.target.matches('[data-pfe-filter]')) {
      pfeState.query = e.target.value;
      const wrap = e.target.closest('.tg-popover');
      const dynamicEl = wrap && wrap.querySelector('.tg-pop-dynamic');
      const desc = pfeActiveRelationField();
      if (dynamicEl && desc) {
        dynamicEl.innerHTML = renderPfeRelationDynamic(pfeLookupPool(desc.dbId), desc.currentIds, desc.allowCreate, desc.label);
      }
    }
  });

  // The native date input inside a date popover (Task Due/Do/Completed,
  // Note Date, Project Start/Target Deadline/Date Completed) — already a
  // local YYYY-MM-DD string verbatim (§7), passed straight through.
  framedRoot.addEventListener('change', (e) => {
    if (e.target.matches('[data-pfe-date-input]') && e.target.value) {
      applyPfeDateInput(e.target.value);
    }
  });

  // Inline title editing — Enter saves, Escape cancels, blur saves (so a
  // stray click elsewhere doesn't silently discard an edit).
  framedRoot.addEventListener('keydown', (e) => {
    if (e.target.matches('[data-pfe-block-edit]')) {
      // Enter inserts a line break within the same block rather than a new
      // block/paragraph — mid-document insertion is out of scope (§10);
      // a genuinely new block only ever comes from "+ add a line".
      if (e.key === 'Enter') { e.preventDefault(); document.execCommand('insertLineBreak'); }
      return;
    }
    if (!e.target.matches('[data-pfe-title-input]')) return;
    if (e.key === 'Enter') { e.preventDefault(); applyPfeTitleSave(e.target.value); }
    else if (e.key === 'Escape') { e.preventDefault(); pfeState.popover = null; paintActiveProfile(); }
  });
  framedRoot.addEventListener('focusout', (e) => {
    if (e.target.matches('[data-pfe-block-edit]')) {
      applyBodyBlockSave(e.target.dataset.pfeBlockEdit, e.target);
      return;
    }
    if (!e.target.matches('[data-pfe-title-input]')) return;
    if (pfeState.popover && pfeState.popover.field === 'title') applyPfeTitleSave(e.target.value);
  });

  // Rich-text selection toolbar (§10) — shown only while the active
  // selection sits inside a body block's contentEditable and isn't
  // collapsed. mousedown (not click) on a toolbar/link-popover button so
  // the button itself never steals focus/selection away from the block
  // before the command runs (also sidesteps a focusout-triggered block
  // save racing the command's own save through withPfeBusy).
  document.addEventListener('selectionchange', () => {
    const toolbar = document.getElementById('pfeRtToolbar');
    if (!toolbar) return;
    const sel = window.getSelection();
    const anchorEl = sel && sel.anchorNode && (sel.anchorNode.nodeType === Node.ELEMENT_NODE ? sel.anchorNode : sel.anchorNode.parentElement);
    const blockEl = anchorEl && anchorEl.closest && anchorEl.closest('[data-pfe-block-edit]');
    if (!blockEl || !sel || sel.isCollapsed || sel.rangeCount === 0) {
      toolbar.hidden = true;
      return;
    }
    const rect = sel.getRangeAt(0).getBoundingClientRect();
    if (!rect || (rect.width === 0 && rect.height === 0)) { toolbar.hidden = true; return; }
    toolbar.hidden = false;
    toolbar.style.left = `${rect.left + rect.width / 2}px`;
    toolbar.style.top = `${rect.top - 8}px`;
  });
  framedRoot.addEventListener('mousedown', (e) => {
    const colorBtn = e.target.closest('[data-pfe-color-cmd]');
    if (colorBtn) { e.preventDefault(); applyColorCommand(colorBtn.dataset.pfeColorCmd); return; }
    const btn = e.target.closest('[data-pfe-rt-cmd]');
    if (btn) { e.preventDefault(); applyRichTextCommand(btn.dataset.pfeRtCmd); return; }
    const linkBtn = e.target.closest('[data-pfe-link-cmd]');
    if (linkBtn) { e.preventDefault(); applyLinkCommand(linkBtn.dataset.pfeLinkCmd); }
  });

  // Fix 14 (Appendix B) — the toolbar (and the Fix 13 link popover, the
  // Fix 15b color panel) must dismiss on every one of: selection collapsed
  // (handled by the selectionchange listener above), editor blur, Escape,
  // a click outside all three floating elements, and scroll. Only some of
  // these fired before.
  function hidePfeFloatingUi() {
    const toolbar = document.getElementById('pfeRtToolbar');
    if (toolbar) toolbar.hidden = true;
    const colorPanel = document.getElementById('pfeColorPanel');
    if (colorPanel) colorPanel.hidden = true;
    hidePfeLinkPopover();
  }
  framedRoot.addEventListener('focusout', (e) => {
    if (e.target.matches('[data-pfe-block-edit]')) hidePfeFloatingUi();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') hidePfeFloatingUi();
  });
  document.addEventListener('mousedown', (e) => {
    if (e.target.closest('[data-pfe-rt-cmd], [data-pfe-link-cmd], [data-pfe-color-cmd], [data-pfe-block-edit], a')) return;
    hidePfeFloatingUi();
  });
  window.addEventListener('scroll', hidePfeFloatingUi, true);

  // --- Views ----------------------------------------------------------------
  // Capture isn't an in-shell route: the nav links straight to capture.html
  // until the Capture screen is migrated in here. Triage is a real screen
  // now, rendered by mountTriage() (async + interactive) instead of a plain
  // VIEWS entry.
  const VIEWS = {
    home: () => `
      <div class="placeholder">
        <div class="placeholder-title">Home</div>
        <div class="placeholder-sub">Coming soon.</div>
      </div>
    `,
  };

  // --- Hash router ------------------------------------------------------
  // Static routes match the whole hash; entity routes are a singular noun
  // + Notion page id (#/note/{id}, #/task/{id}, ...) — parsed by splitting
  // on "/" rather than matched against a fixed list, since the id half is
  // arbitrary. Anything unrecognized (including a bare entity name with no
  // id) falls back to Home rather than erroring.
  const STATIC_ROUTES = ['home', 'inbox'];

  function parseRoute() {
    const hash = location.hash.replace(/^#\/?/, '');
    const segments = hash.split('/').filter(Boolean);
    if (segments.length === 0) return { name: 'home' };
    const [first, second] = segments;
    if (STATIC_ROUTES.includes(first)) return { name: first };
    if (ENTITY_ROUTES.includes(first) && second) return { name: first, id: decodeURIComponent(second) };
    return { name: 'home' };
  }

  // Triage's own click/input/change/wheel listeners below gate on "is this
  // the inbox route" by name alone — kept as a thin wrapper over
  // parseRoute so that plumbing doesn't need to change.
  function currentRoute() {
    return parseRoute().name;
  }

  function render() {
    // "#/triage" was the route's name before the Inbox rename — alias any
    // old link to the new one rather than 404-ing it into Home. Rewriting
    // the hash (rather than just resolving 'inbox' internally) fires
    // hashchange, which re-enters render() with the corrected URL.
    if (location.hash.replace(/^#\/?/, '') === 'triage') {
      location.hash = '#/inbox';
      return;
    }
    // A profile's open picker/inline-title-edit is meaningless once you've
    // navigated away from it (a relation pill's label click, a breadcrumb
    // link, browser back/forward) — clear it on every route change rather
    // than leaving stale state that could otherwise bleed into whichever
    // profile mounts next.
    pfeState.popover = null;
    pfeState.query = '';
    pfeCardPopover.taskId = null; pfeCardPopover.field = null;
    const route = parseRoute();
    document.querySelectorAll('.nav-btn').forEach((btn) => {
      btn.classList.toggle('active', btn.dataset.route === route.name);
    });
    content.classList.toggle('stretch', route.name === 'inbox');
    // The Inbox-triage "N to Sort" pill doesn't belong on a record's own
    // profile (real or still-stubbed) — Home and Inbox keep it.
    inboxPill.classList.toggle('hidden', ENTITY_ROUTES.includes(route.name));
    // Every entity profile (Note/Task/Project/Domain/Tag/Collection/Person)
    // renders into the framed shell as of the Framed-Layout Retrofit sprint
    // — Domain was the only one scoped to it before. body.dmn-route swaps
    // which of .shell / #framedRoot is visible (see the "Framed shell" CSS
    // block); Home and Inbox are explicitly out of scope for panel-wrapping
    // this sprint and keep rendering into #content exactly as before.
    document.body.classList.toggle('dmn-route', ENTITY_ROUTES.includes(route.name));
    // Lets a profile-specific mobile CSS override target just its own
    // route (e.g. Note's "Dates above the body" reorder below) without
    // touching the shared .dmn-col/.dmn-prop-sec--* rules every other
    // profile also uses.
    document.body.dataset.route = route.name;
    if (route.name === 'inbox') {
      mountTriage(content);
    } else if (route.name === 'note') {
      mountNoteProfile(route.id);
    } else if (route.name === 'task') {
      mountTaskProfile(route.id);
    } else if (route.name === 'project') {
      mountProjectProfile(route.id);
    } else if (route.name === 'domain') {
      mountDomainProfile(route.id);
    } else if (route.name === 'tag' || route.name === 'collection' || route.name === 'person') {
      mountRelationProfile(route.name, route.id);
    } else if (ENTITY_ROUTES.includes(route.name)) {
      content.innerHTML = renderEntityStub(route.name);
    } else {
      content.innerHTML = VIEWS[route.name]();
    }
    // The inbox count can change on any screen (Capture adds to it, Triage
    // will resolve it later), so it's refreshed on every route change.
    refreshInboxCount();
  }

  window.addEventListener('hashchange', render);

  if (!location.hash) {
    location.hash = '#/home';
  } else {
    render();
  }
})();
</script>
</body>
</html>
