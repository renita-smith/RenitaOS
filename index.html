      getDatabaseIcon(CONFIG.DB.DOMAINS),
      projectResolution.domainId ? resolveRelationNames(CONFIG.DB.DOMAINS, [projectResolution.domainId]) : Promise.resolve([]),
    ]);
    const domainName = domainRel.length ? domainRel[0].name : null;

    return {
      id: page.id, title, uniqueId, statusName, priorityName, dueDate, doDate, completedDate,
      domainId: projectResolution.domainId, domainName,
      projects: projectResolution.projects, people,
      icons: { projects: projectsIcon, people: peopleIcon, domains: domainsIcon },
      blocks,
      createdTime: page.created_time,
      lastEditedTime: page.last_edited_time,
      // Edit slice — resolved property names + live option lists, memoized
      // via getSchema, so every write below routes through
      // resolveOptionValue/the relation helper instead of re-resolving (or
      // hardcoding) anything.
      statusPropName: tasksStatusSchema.name, statusOptions: tasksStatusSchema.options,
      priorityPropName: tasksPriorityProp, priorityOptions,
      projectsPropName: tasksProjectsProp, peoplePropName: tasksPeopleProp,
      completedPropName: tasksCompletedProp,
      dueDatePropName: dueDateProp, doDatePropName: doDateProp,
    };
  }

  // Only the id is a label; a Domain › Project path (when a project exists)
  // follows it as real navigable links — flat ID-only for a projectless
  // (bare-capture) task.
  function renderTaskHeader(t) {
    const idSpan = `<span class="dmn-crumb-id">${t.uniqueId ? escapeHtml(t.uniqueId) : '—'}</span>`;
    let pathHtml = '';
    if (t.projects.length) {
      const project = t.projects[0];
      const domainSegment = t.domainName
        ? `<a class="dmn-crumb-link" data-pf-nav="domain/${escapeHtml(t.domainId)}">${escapeHtml(t.domainName)}</a><span class="dmn-crumb-sep">›</span>`
        : '';
      pathHtml = `<span class="dmn-crumb-sep">·</span>${domainSegment}<a class="dmn-crumb-link" data-pf-nav="project/${escapeHtml(project.id)}">${escapeHtml(project.name)}</a>`;
    }
    // Hero checkbox IS the Status control (Conventions "Completion") —
    // checking/unchecking writes Status + Completed in one PATCH
    // (applyTaskCompletionToggle). No separate Done checkbox field exists
    // in Notion.
    const isDone = (t.statusName || '').toLowerCase() === 'done';
    return `<div class="dmn-head">
      <div class="dmn-idline">${idSpan}${pathHtml}</div>
      <div class="dmn-title-row">
        <span class="dmn-hero-checkbox${isDone ? ' dmn-hero-checkbox--checked' : ''}" data-pfe-action="task:complete" role="checkbox" aria-checked="${isDone}">${isDone ? '✓' : ''}</span>
        ${renderEditableTitleHtml('task', t.title)}
      </div>
    </div>`;
  }

  // Right-rail hierarchy pass — Status/Priority move to the main column's
  // value-pill row; unchanged renderValuePill markup, just relocated.
  // Priority stays plain text here (not stars) — same as before this pass,
  // Task's own Priority pill never used renderPriorityValue (only Project's
  // does); preserved rather than "fixed" since this slice is a pure reorg.
  // Edit slice: both are now editable value pills — "no destination
  // exists, so the whole pill opens its picker" (Conventions "Pills").
  function renderTaskValuePills(t) {
    const statusPop = pfeOpenFor('task', 'status') ? renderPfeSelectPopover(t.statusOptions, t.statusName, { label: 'Status' }) : '';
    const statusHtml = `<span class="tg-pop-wrap">${renderValuePill(t.statusName ? escapeHtml(t.statusName) : 'No status', 'task:status')}${statusPop}</span>`;
    let priorityHtml;
    if (t.priorityPropName) {
      const priorityPop = pfeOpenFor('task', 'priority') ? renderPfeSelectPopover(t.priorityOptions, t.priorityName, { label: 'Priority', clearable: !!t.priorityName }) : '';
      priorityHtml = `<span class="tg-pop-wrap">${renderValuePill(t.priorityName ? escapeHtml(t.priorityName) : 'No priority', 'task:priority')}${priorityPop}</span>`;
    } else {
      priorityHtml = renderValuePill(t.priorityName ? escapeHtml(t.priorityName) : 'No priority');
    }
    return statusHtml + priorityHtml;
  }

  // DATES — meaningful user dates only; Created/Last edited moved to Log.
  // Due Date/Do Date/Completed are all edit-slice editable (§7); Completed
  // only renders once the schema actually has the property (degrades
  // rather than guessing a name). Rows extracted from the section wrapper
  // so the exact same markup can also be dropped into the mobile
  // value-pill row (see renderValuePillRow's caller in paintTaskProfile)
  // without duplicating the date logic itself.
  function renderTaskDateRows(t) {
    const completedHtml = t.completedPropName ? renderPfeDateRow('Completed', t.completedDate, 'task', 'completed') : '';
    return `${renderPfeDateRow('Due Date', t.dueDate, 'task', 'due')}${renderPfeDateRow('Do Date', t.doDate, 'task', 'do')}${completedHtml}`;
  }
  function renderTaskDates(t) {
    return `<section class="dmn-prop-sec dmn-prop-sec--dates">
      <h3>Dates</h3>
      ${renderTaskDateRows(t)}
    </section>`;
  }

  function renderTaskLog(t) {
    return `<section class="dmn-prop-sec dmn-prop-sec--log">
      <h3>Log</h3>
      <div class="dmn-kv"><span class="k">Created</span><span class="v">${escapeHtml(formatDateTime(t.createdTime))}</span></div>
      <div class="dmn-kv"><span class="k">Last edited</span><span class="v">${escapeHtml(formatDateTime(t.lastEditedTime))}</span></div>
    </section>`;
  }

  // Right-rail hierarchy pass — Task's Properties is now relations only
  // (Status/Priority moved to the main-column pill row): Domain [read-only
  // — no caret, it's a rollup through the project], Project, People
  // (field label renamed from "For" per this pass's spec).
  function renderTaskProperties(t) {
    const domainMeta = t.domainId
      ? (DOMAIN_META.find((d) => normalizeDbId(d.pageId) === normalizeDbId(t.domainId)) || NO_DOMAIN_META)
      : null;
    // Domain is read-only here — deliberately no row at all when empty
    // (there's no project to derive one from), and no caret when present
    // (a task's domain is inherited through its project; you change it by
    // changing the project, never this pill).
    const domainHtml = t.domainName
      ? renderRelPill({
          label: t.domainName, icon: renderChipIcon(t.icons.domains),
          navId: t.domainId, navRoute: 'domain',
          styleAttr: domainMeta ? `background:${domainMeta.fill};color:${domainMeta.text};` : '',
          caret: false,
        })
      : '';
    const domainRow = domainHtml ? renderPropRow('Domain', domainHtml) : '';
    const projectPop = pfeOpenFor('task', 'project') ? renderPfeRelationPopover({
      entity: 'task', field: 'project', label: 'Project',
      members: t.projects, targetDbId: CONFIG.DB.PROJECTS, single: true, allowCreate: true,
    }) : '';
    const projectsHtml = t.projects.length
      ? t.projects.map((p) => renderRelPill({ label: p.name, icon: renderChipIcon(t.icons.projects), navId: p.id, navRoute: 'project', editKey: 'task:project' })).join('')
      : renderGhostPill('Project', 'task:project');
    // Tasks have no Tags relation — Projects/People are the only other
    // relation pills, per the profile spec ("People" label, was "For").
    const peoplePop = pfeOpenFor('task', 'people') ? renderPfeRelationPopover({
      entity: 'task', field: 'people', label: 'People',
      members: t.people, targetDbId: CONFIG.DB.PEOPLE, single: false, allowCreate: true,
    }) : '';
    const peopleHtml = t.people.length
      ? t.people.map((p) => renderRelPill({ label: p.name, icon: renderChipIcon(t.icons.people), navId: p.id, navRoute: 'person', editKey: 'task:people' })).join('')
      : renderGhostPill('People', 'task:people');
    return `<section class="dmn-prop-sec dmn-prop-sec--properties">
      <h3>Properties</h3>
      ${domainRow}
      ${renderPropRow('Project', projectsHtml, projectPop)}
      ${renderPropRow('People', peopleHtml, peoplePop)}
    </section>`;
  }

  // --- Step F — Body block editing with rich text (§10) -------------------
  // Scoped to the block types the app can round-trip (paragraph/heading/
  // list-item/quote/callout/to_do rich_text); everything else (images,
  // tables, code blocks, nested toggles) renders read-only rather than
  // silently dropped, so nothing in the note disappears from view.
  const PFE_EDITABLE_BLOCK_TYPES = [
    'paragraph', 'heading_1', 'heading_2', 'heading_3',
    'bulleted_list_item', 'numbered_list_item', 'quote', 'callout', 'to_do',
  ];

  // Fix 15a (Appendix B) — color/highlight joins the supported annotation
  // set. Notion's actual swatch values (not the app's own muted earth-tone
  // chrome palette — that rule governs UI, not user content, per the
  // fix). `data-pfe-color` carries the exact Notion color name straight
  // through the DOM round-trip, so the serializer never has to reverse-
  // engineer a color name from a CSS value.
  const NOTION_TEXT_COLORS = {
    gray: '#9B9A97', brown: '#64473A', orange: '#D9730D', yellow: '#DFAB01',
    green: '#0F7B6C', blue: '#0B6E99', purple: '#6940A5', pink: '#AD1A72', red: '#E03E3E',
  };
  const NOTION_BG_COLORS = {
    gray_background: '#EBECED', brown_background: '#E9E5E3', orange_background: '#FAEBDD',
    yellow_background: '#FBF3DB', green_background: '#DDEDEA', blue_background: '#DDEBF1',
    purple_background: '#EAE4F2', pink_background: '#F4DFEB', red_background: '#FBE4E4',
  };

  // Existing rich_text runs -> the contentEditable's innerHTML. Only the
  // annotations §10 (+ Fix 15a's color) promise to round-trip are
  // rendered; anything else on a run (underline) is read here only to
  // display today's text and is not carried into the DOM — it survives
  // untouched on every block this editor never dirties, and is the
  // documented fidelity loss on a block that IS actively edited.
  function richTextToEditableHtml(runs) {
    return (runs || []).map((r) => {
      const raw = r.plain_text != null ? r.plain_text : ((r.text && r.text.content) || '');
      let html = escapeHtml(raw).replace(/\n/g, '<br>');
      const ann = r.annotations || {};
      if (ann.code) html = `<code>${html}</code>`;
      if (ann.bold) html = `<b>${html}</b>`;
      if (ann.italic) html = `<i>${html}</i>`;
      if (ann.strikethrough) html = `<s>${html}</s>`;
      if (ann.color && ann.color !== 'default') {
        if (NOTION_BG_COLORS[ann.color]) html = `<span style="background-color:${NOTION_BG_COLORS[ann.color]}" data-pfe-color="${ann.color}">${html}</span>`;
        else if (NOTION_TEXT_COLORS[ann.color]) html = `<span style="color:${NOTION_TEXT_COLORS[ann.color]}" data-pfe-color="${ann.color}">${html}</span>`;
      }
      const url = r.href || (r.text && r.text.link && r.text.link.url) || null;
      if (url) html = `<a href="${escapeHtml(url)}">${html}</a>`;
      return html;
    }).join('');
  }

  // The serializer half — walks the edited contentEditable's live DOM (not
  // a saved HTML string) and rebuilds Notion rich_text runs, tracking
  // bold/italic/strikethrough/code/color/link state down the tree.
  // Adjacent runs sharing identical formatting are merged so a lightly-
  // edited paragraph doesn't explode into one run per character. Any
  // annotation this editor doesn't support (underline) is simply never
  // produced — the §10-documented fidelity loss on blocks this function
  // actually touches.
  function domToRichText(root) {
    const runs = [];
    function walk(node, ann, link) {
      if (node.nodeType === Node.TEXT_NODE) {
        if (node.textContent) runs.push({ text: node.textContent, ann, link });
        return;
      }
      if (node.nodeType !== Node.ELEMENT_NODE) return;
      const tag = node.tagName.toLowerCase();
      if (tag === 'br') { runs.push({ text: '\n', ann, link }); return; }
      const nextAnn = { ...ann };
      let nextLink = link;
      if (tag === 'b' || tag === 'strong') nextAnn.bold = true;
      if (tag === 'i' || tag === 'em') nextAnn.italic = true;
      if (tag === 's' || tag === 'strike' || tag === 'del') nextAnn.strikethrough = true;
      if (tag === 'code') nextAnn.code = true;
      if (tag === 'span' && node.dataset && node.dataset.pfeColor) nextAnn.color = node.dataset.pfeColor;
      if (tag === 'a') nextLink = node.getAttribute('href') || null;
      node.childNodes.forEach((child) => walk(child, nextAnn, nextLink));
    }
    root.childNodes.forEach((child) => walk(child, { bold: false, italic: false, strikethrough: false, code: false, color: 'default' }, null));
    const merged = [];
    for (const r of runs) {
      const last = merged[merged.length - 1];
      if (last && last.link === r.link && JSON.stringify(last.ann) === JSON.stringify(r.ann)) last.text += r.text;
      else merged.push({ ...r });
    }
    return merged.filter((r) => r.text.length).map((r) => ({
      type: 'text',
      text: { content: r.text, link: r.link ? { url: r.link } : null },
      annotations: { bold: r.ann.bold, italic: r.ann.italic, strikethrough: r.ann.strikethrough, underline: false, code: r.ann.code, color: r.ann.color },
    }));
  }

  function activeBodyProfileData() {
    const route = currentRoute();
    if (route === 'note' && noteProfileState.data) return noteProfileState.data;
    if (route === 'task' && taskProfileState.data) return taskProfileState.data;
    return null;
  }

  function renderBodyBlock(block) {
    const type = block.type;
    const id = block.id;
    if (type === 'to_do') {
      const rich = (block.to_do && block.to_do.rich_text) || [];
      const checked = !!(block.to_do && block.to_do.checked);
      return `<div class="pfe-block pfe-block--to_do" data-pfe-block="${escapeHtml(id)}">
        <span class="pfe-block-todo${checked ? ' checked' : ''}" data-pfe-block-todo="${escapeHtml(id)}" role="checkbox" aria-checked="${checked}">${checked ? '✓' : ''}</span>
        <div class="pfe-block-text" contenteditable="true" data-pfe-block-edit="${escapeHtml(id)}" data-pfe-block-type="${type}">${richTextToEditableHtml(rich)}</div>
        <button type="button" class="pfe-block-del" data-pfe-block-delete="${escapeHtml(id)}" aria-label="Delete line">×</button>
      </div>`;
    }
    if (PFE_EDITABLE_BLOCK_TYPES.includes(type)) {
      const rich = (block[type] && block[type].rich_text) || [];
      return `<div class="pfe-block pfe-block--${type}" data-pfe-block="${escapeHtml(id)}">
        <div class="pfe-block-text" contenteditable="true" data-pfe-block-edit="${escapeHtml(id)}" data-pfe-block-type="${type}">${richTextToEditableHtml(rich)}</div>
        <button type="button" class="pfe-block-del" data-pfe-block-delete="${escapeHtml(id)}" aria-label="Delete line">×</button>
      </div>`;
    }
    // Unsupported block type (image, table, code, nested toggle, etc.) —
    // read-only fallback so it stays visible rather than disappearing.
    const fallbackText = (block[type] && block[type].rich_text)
      ? block[type].rich_text.map((r) => r.plain_text).join('')
      : `(${type.replace(/_/g, ' ')})`;
    return `<div class="pfe-block pfe-block--readonly">${escapeHtml(fallbackText)}</div>`;
  }

  function renderBodyBlocks(blocks) {
    const body = (blocks || []).map(renderBodyBlock).join('');
    return `<div class="pfe-body-blocks">${body}<button type="button" class="pfe-block-add" data-pfe-block-append="true">+ add a line</button></div>`;
  }

  function blockRichTextPatchBody(blockType, runs) {
    return { [blockType]: { rich_text: runs } };
  }

  const applyBodyBlockSave = withPfeBusy(async (blockId, el) => {
    const data = activeBodyProfileData();
    if (!data) return;
    const block = data.blocks.find((b) => b.id === blockId);
    if (!block) return;
    const runs = domToRichText(el);
    try {
      await notionRequest(`/v1/blocks/${blockId}`, { method: 'PATCH', body: blockRichTextPatchBody(block.type, runs) });
      block[block.type].rich_text = runs;
    } catch (err) {
      console.error('Failed to save block', err);
      showPfeToast(err.message || 'Could not save that line — try again.');
      paintActiveProfile();
    }
  });

  const applyBodyBlockToggleTodo = withPfeBusy(async (blockId) => {
    const data = activeBodyProfileData();
    if (!data) return;
    const block = data.blocks.find((b) => b.id === blockId);
    if (!block || block.type !== 'to_do') return;
    const checked = !block.to_do.checked;
    try {
      await notionRequest(`/v1/blocks/${blockId}`, { method: 'PATCH', body: { to_do: { checked } } });
      block.to_do.checked = checked;
      paintActiveProfile();
    } catch (err) {
      console.error('Failed to toggle to-do', err);
      showPfeToast(err.message || 'Could not update that line — try again.');
    }
  });

  // Fix 12 (Appendix B) — DELETE fails with a raw network error (the
  // Worker doesn't forward/allow the method), not a Notion validation
  // response like every other write failure here. PATCH is already proven
  // through the Worker, and `{ archived: true }` is the same "delete =
  // archive" result Notion's own DELETE would have produced.
  const applyBodyBlockDelete = withPfeBusy(async (blockId) => {
    const data = activeBodyProfileData();
    if (!data) return;
    try {
      await notionRequest(`/v1/blocks/${blockId}`, { method: 'PATCH', body: { archived: true } });
      data.blocks = data.blocks.filter((b) => b.id !== blockId);
      paintActiveProfile();
    } catch (err) {
      console.error('Failed to delete block', err);
      showPfeToast(err.message || 'Could not delete that line — try again.');
    }
  });

  const applyBodyBlockAppend = withPfeBusy(async () => {
    const data = activeBodyProfileData();
    if (!data) return;
    try {
      const res = await notionRequest(`/v1/blocks/${data.id}/children`, {
        method: 'PATCH',
        body: { children: [{ type: 'paragraph', paragraph: { rich_text: [] } }] },
      });
      const created = res.results && res.results[0];
      if (created) {
        data.blocks.push(created);
        paintActiveProfile();
        const el = Array.from(framedRoot.querySelectorAll('[data-pfe-block-edit]')).find((n) => n.dataset.pfeBlockEdit === created.id);
        if (el) el.focus();
      }
    } catch (err) {
      console.error('Failed to add a line', err);
      showPfeToast(err.message || 'Could not add a line — try again.');
    }
  });

  // Lightweight selection-scoped rich-text toolbar — shown only while the
  // active selection sits inside a body block's contentEditable, per §10's
  // supported inline set (bold/italic/strikethrough/code/link). No native
  // execCommand equivalent exists for inline code/link beyond createLink,
  // so those two wrap the selection by hand.
  function wrapSelectionWithTag(tagName, attrs) {
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return;
    const range = sel.getRangeAt(0);
    const el = document.createElement(tagName);
    if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
    try {
      range.surroundContents(el);
    } catch (e) {
      const frag = range.extractContents();
      el.appendChild(frag);
      range.insertNode(el);
    }
    sel.removeAllRanges();
    const newRange = document.createRange();
    newRange.selectNodeContents(el);
    sel.addRange(newRange);
  }
  function applyRichTextCommand(cmd) {
    if (cmd === 'bold') { document.execCommand('bold'); return; }
    if (cmd === 'italic') { document.execCommand('italic'); return; }
    if (cmd === 'strike') { document.execCommand('strikeThrough'); return; }
    if (cmd === 'code') { wrapSelectionWithTag('code'); return; }
    if (cmd === 'link') {
      const url = window.prompt('Link URL:');
      if (url && url.trim()) wrapSelectionWithTag('a', { href: url.trim() });
      return;
    }
    if (cmd === 'color') { toggleRtColorPanel(); }
  }
  // Fix 15b (Appendix B) — one picker for both text colors and background/
  // highlight variants, immediately after 15a since the color mapping
  // already exists. "Clear color" wraps the selection in a color:inherit
  // span carrying data-pfe-color="default" rather than trying to unwrap
  // any existing color span it might partially overlap — domToRichText's
  // walk always takes the innermost data-pfe-color it finds, so a nested
  // "default" span correctly resets just the re-selected range.
  function toggleRtColorPanel() {
    const panel = document.getElementById('pfeColorPanel');
    const toolbar = document.getElementById('pfeRtToolbar');
    if (!panel || !toolbar) return;
    panel.hidden = !panel.hidden;
    if (!panel.hidden) {
      const rect = toolbar.getBoundingClientRect();
      panel.style.left = `${rect.left}px`;
      panel.style.top = `${rect.bottom + 6}px`;
    }
  }
  function applyColorCommand(colorName) {
    let styleAttr;
    if (colorName === 'default') styleAttr = 'color:inherit;background-color:transparent';
    else if (NOTION_BG_COLORS[colorName]) styleAttr = `background-color:${NOTION_BG_COLORS[colorName]}`;
    else if (NOTION_TEXT_COLORS[colorName]) styleAttr = `color:${NOTION_TEXT_COLORS[colorName]}`;
    else return;
    wrapSelectionWithTag('span', { style: styleAttr, 'data-pfe-color': colorName });
    const panel = document.getElementById('pfeColorPanel');
    if (panel) panel.hidden = true;
  }
  function renderRtToolbar() {
    return `<div class="pfe-rt-toolbar" id="pfeRtToolbar" hidden>
      <button type="button" data-pfe-rt-cmd="bold"><b>B</b></button>
      <button type="button" data-pfe-rt-cmd="italic"><i>I</i></button>
      <button type="button" data-pfe-rt-cmd="strike"><s>S</s></button>
      <button type="button" data-pfe-rt-cmd="code">&lt;/&gt;</button>
      <button type="button" data-pfe-rt-cmd="link">🔗</button>
      <button type="button" data-pfe-rt-cmd="color">🎨</button>
    </div>`;
  }
  function renderRtColorPanel() {
    const textRow = Object.entries(NOTION_TEXT_COLORS)
      .map(([name, hex]) => `<button type="button" class="pfe-color-swatch" data-pfe-color-cmd="${name}" style="background:${hex}" title="${name}" aria-label="${name} text"></button>`)
      .join('');
    const bgRow = Object.entries(NOTION_BG_COLORS)
      .map(([name, hex]) => `<button type="button" class="pfe-color-swatch" data-pfe-color-cmd="${name}" style="background:${hex}" title="${name.replace('_background', '')} highlight" aria-label="${name.replace('_background', '')} highlight"></button>`)
      .join('');
    return `<div class="pfe-color-panel" id="pfeColorPanel" hidden>
      <div class="pfe-color-row">${textRow}</div>
      <div class="pfe-color-row">${bgRow}</div>
      <button type="button" class="pfe-color-clear" data-pfe-color-cmd="default">Clear color</button>
    </div>`;
  }

  // Fix 13 (Appendix B) — a link inside the editable body needs an escape
  // hatch that isn't "hold Ctrl and hope" (the browser's own contentEditable
  // convention for reaching a link without just placing the caret). A plain
  // click opens this small popover instead; Open/Edit/Remove cover the one
  // thing each does. Same one-shared-floating-element pattern as the rich-
  // text toolbar — positioned in JS, not tied to any profile's render state.
  let pfeLinkPopoverTarget = null;
  function renderPfeLinkPopover() {
    return `<div class="pfe-link-popover" id="pfeLinkPopover" hidden>
      <button type="button" data-pfe-link-cmd="edit">Edit</button>
      <button type="button" data-pfe-link-cmd="remove">Remove</button>
      <button type="button" data-pfe-link-cmd="open">Open</button>
    </div>`;
  }
  function showPfeLinkPopover(linkEl) {
    pfeLinkPopoverTarget = linkEl;
    const popEl = document.getElementById('pfeLinkPopover');
    if (!popEl) return;
    const rect = linkEl.getBoundingClientRect();
    popEl.hidden = false;
    popEl.style.left = `${rect.left + rect.width / 2}px`;
    popEl.style.top = `${rect.top - 8}px`;
  }
  function hidePfeLinkPopover() {
    pfeLinkPopoverTarget = null;
    const popEl = document.getElementById('pfeLinkPopover');
    if (popEl) popEl.hidden = true;
  }
  function applyLinkCommand(cmd) {
    const linkEl = pfeLinkPopoverTarget;
    if (!linkEl) return;
    const blockEditEl = linkEl.closest('[data-pfe-block-edit]');
    if (cmd === 'open') { window.open(linkEl.href, '_blank', 'noopener'); hidePfeLinkPopover(); return; }
    if (cmd === 'remove') {
      const parent = linkEl.parentNode;
      while (linkEl.firstChild) parent.insertBefore(linkEl.firstChild, linkEl);
      parent.removeChild(linkEl);
    } else if (cmd === 'edit') {
      const url = window.prompt('Link URL:', linkEl.getAttribute('href') || '');
      if (!url || !url.trim()) { hidePfeLinkPopover(); return; }
      linkEl.setAttribute('href', url.trim());
    }
    hidePfeLinkPopover();
    if (blockEditEl) applyBodyBlockSave(blockEditEl.dataset.pfeBlockEdit, blockEditEl);
  }

  const noteProfileState = { id: null, loading: false, error: null, data: null };

  function paintNoteProfile() {
    if (noteProfileState.loading) {
      dmnMain.innerHTML = `<div class="dmn-status">Loading…</div>`;
      dmnProps.innerHTML = renderCaptureAffordance();
      return;
    }
    if (noteProfileState.error) {
      dmnMain.innerHTML = `<div class="dmn-status dmn-status--error">${escapeHtml(noteProfileState.error)}</div>`;
      dmnProps.innerHTML = renderCaptureAffordance();
      return;
    }
    const n = noteProfileState.data;
    const bodyHtml = renderBodyBlocks(n.blocks);
    dmnMain.innerHTML = `${renderNoteHeader(n)}${renderValuePillRow(renderNoteValuePills(n) + `<span class="dmn-datepills-inline">${renderNoteDateRows(n)}</span>`)}<section class="dmn-sec">${bodyHtml}</section>${renderPfeToast()}`;
    dmnProps.innerHTML = `${renderCaptureAffordance()}${renderNoteDates(n)}${renderNoteProperties(n)}${renderNoteLog(n)}`;
  }

  async function mountNoteProfile(id) {
    noteProfileState.id = id;
    noteProfileState.loading = true;
    noteProfileState.error = null;
    noteProfileState.data = null;
    ensureFramedShell();
    paintNoteProfile();
    try {
      const data = await loadNoteProfile(id);
      if (noteProfileState.id !== id) return; // route moved on while this was in flight
      noteProfileState.data = data;
    } catch (err) {
      console.error('Failed to load note profile', err);
      if (noteProfileState.id !== id) return;
      noteProfileState.error = err.message || 'Could not load this note — check the Worker.';
    } finally {
      if (noteProfileState.id === id) {
        noteProfileState.loading = false;
        paintNoteProfile();
      }
    }
  }

  const taskProfileState = { id: null, loading: false, error: null, data: null };

  function paintTaskProfile() {

      dmnProps.innerHTML = renderCaptureAffordance();

    dmnProps.innerHTML = `${renderCaptureAffordance()}${renderTaskDates(t)}${renderTaskProperties(t)}${renderTaskLog(t)}`;
