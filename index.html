      icons: { projects: projectsIcon, people: peopleIcon, domains: domainsIcon },
      body,
      createdTime: page.created_time,
      lastEditedTime: page.last_edited_time,
    };
  }

  function renderTaskProfile(t) {
    const domainMeta = t.domainId
      ? (DOMAIN_META.find((d) => normalizeDbId(d.pageId) === normalizeDbId(t.domainId)) || NO_DOMAIN_META)
      : null;
    // Domain is read-only here — deliberately no ghost when empty (there's
    // no project to add), and no caret when present (a task's domain is
    // inherited through its project; you change it by changing the
    // project, never this pill).
    const domainPillHtml = t.domainName
      ? renderRelPill({
          label: t.domainName, icon: renderChipIcon(t.icons.domains),
          navId: t.domainId, navRoute: 'domain',
          styleAttr: domainMeta ? `background:${domainMeta.fill};color:${domainMeta.text};` : '',
          caret: false,
        })
      : '';
    const projectsHtml = t.projects.length
      ? t.projects.map((p) => renderRelPill({ label: p.name, icon: renderChipIcon(t.icons.projects), navId: p.id, navRoute: 'project' })).join('')
      : renderGhostPill('Project');
    // Tasks have no Tags relation — Projects/People ("For") are the only
    // other relation pills, per the profile spec.
    const peopleHtml = t.people.length
      ? t.people.map((p) => renderRelPill({ label: p.name, icon: renderChipIcon(t.icons.people), navId: p.id, navRoute: 'person' })).join('')
      : renderGhostPill('For');
    const relPillsHtml = domainPillHtml + projectsHtml + peopleHtml;

    const statusHtml = renderValuePill(t.statusName ? escapeHtml(t.statusName) : 'No status');
    // Priority displays as stars per RenitaOS-Conventions.md's pill rules
    // ("Priority displays as stars rather than a color") — rendered
    // verbatim from the live option value, never a guessed numeric-to-star
    // mapping, so it already reads as stars if that's how the option is
    // configured in Notion.
    const priorityHtml = renderValuePill(t.priorityName ? escapeHtml(t.priorityName) : 'No priority');
    const valuePillsHtml = statusHtml + priorityHtml;
    const dividerHtml = relPillsHtml ? '<span class="pf-pill-divider"></span>' : '';

    const metaHtml = `<div class="pf-meta-grid">
      <div class="pf-meta-col">
        <div class="pf-meta-label">Due Date</div>
        <div class="pf-meta-value pf-meta-value--date"><span class="pf-meta-date-icon">🗓</span>${t.dueDate && t.dueDate.start ? escapeHtml(formatDateShort(t.dueDate.start)) : '—'}</div>
        <div class="pf-meta-label">Do Date</div>
        <div class="pf-meta-value pf-meta-value--date"><span class="pf-meta-date-icon">🗓</span>${t.doDate && t.doDate.start ? escapeHtml(formatDateShort(t.doDate.start)) : '—'}</div>
      </div>
      <div class="pf-meta-col">
        <div class="pf-meta-label">Created</div>
        <div class="pf-meta-value pf-meta-value--muted">${escapeHtml(formatDateTime(t.createdTime))}</div>
        <div class="pf-meta-label">Last edited</div>
        <div class="pf-meta-value pf-meta-value--muted">${escapeHtml(formatDateTime(t.lastEditedTime))}</div>
      </div>
    </div>`;

    const bodyHtml = t.body ? `<div class="pf-body">${escapeHtml(t.body)}</div>` : `<div class="pf-body pf-body--empty">(empty)</div>`;

    // Only the id is a label; a Domain › Project path (when a project
    // exists) follows it as real navigable links — flat ID-only for a
    // projectless (bare-capture) task.
    const idSpan = `<span class="pf-crumb--id">${t.uniqueId ? escapeHtml(t.uniqueId) : '—'}</span>`;
    let pathHtml = '';
    if (t.projects.length) {
      const project = t.projects[0];
      const domainSegment = t.domainName
        ? `<span class="pf-crumb-link" data-pf-nav="domain/${escapeHtml(t.domainId)}">${escapeHtml(t.domainName)}</span><span class="sep">›</span>`
        : '';
      pathHtml = `<span class="sep">·</span>${domainSegment}<span class="pf-crumb-link" data-pf-nav="project/${escapeHtml(project.id)}">${escapeHtml(project.name)}</span>`;
    }
    const crumbHtml = `<div class="pf-crumb">${idSpan}${pathHtml}</div>`;

    // Hero checkbox is a status mirror, render-only — checking/unchecking
    // writes nothing this slice (that lands with the Status/Completed
    // write in the edit slice).
    const isDone = (t.statusName || '').toLowerCase() === 'done';
    const heroHtml = `<div class="pf-hero-row">
      <span class="pf-hero-checkbox${isDone ? ' pf-hero-checkbox--checked' : ''}" aria-hidden="true">${isDone ? '✓' : ''}</span>
      <div class="serif pf-hero">${escapeHtml(t.title || 'Untitled')}</div>
    </div>`;

    return `<div class="pf-view">
      ${crumbHtml}
      ${heroHtml}
      <div class="pf-pillrow">${relPillsHtml}${dividerHtml}${valuePillsHtml}</div>
      ${metaHtml}
      ${bodyHtml}
    </div>`;
  }

  const noteProfileState = { id: null, loading: false, error: null, data: null };

  function paintNoteProfile(container) {
    if (noteProfileState.loading) {
      container.innerHTML = `<div class="pf-view"><div class="tg-status">Loading…</div></div>`;
      return;
    }
    if (noteProfileState.error) {
      container.innerHTML = `<div class="pf-view"><div class="tg-status tg-status--error">${escapeHtml(noteProfileState.error)}</div></div>`;
      return;
    }
    container.innerHTML = renderNoteProfile(noteProfileState.data);
  }

  async function mountNoteProfile(container, id) {
    noteProfileState.id = id;
    noteProfileState.loading = true;
    noteProfileState.error = null;
    noteProfileState.data = null;
    paintNoteProfile(container);
    try {
      const data = await loadNoteProfile(id);
      if (noteProfileState.id !== id) return; // route moved on while this was in flight
      noteProfileState.data = data;
    } catch (err) {
      console.error('Failed to load note profile', err);
      if (noteProfileState.id !== id) return;
      noteProfileState.error = err.message || 'Could not load this note — check the Worker.';
    } finally {
      if (noteProfileState.id === id) {
        noteProfileState.loading = false;
        paintNoteProfile(container);
      }
    }
  }

  const taskProfileState = { id: null, loading: false, error: null, data: null };

  function paintTaskProfile(container) {
    if (taskProfileState.loading) {
      container.innerHTML = `<div class="pf-view"><div class="tg-status">Loading…</div></div>`;
      return;
    }
    if (taskProfileState.error) {
      container.innerHTML = `<div class="pf-view"><div class="tg-status tg-status--error">${escapeHtml(taskProfileState.error)}</div></div>`;
      return;
    }
    container.innerHTML = renderTaskProfile(taskProfileState.data);
  }

  async function mountTaskProfile(container, id) {
    taskProfileState.id = id;
    taskProfileState.loading = true;
    taskProfileState.error = null;
    taskProfileState.data = null;
    paintTaskProfile(container);
    try {
      const data = await loadTaskProfile(id);
      if (taskProfileState.id !== id) return; // route moved on while this was in flight
      taskProfileState.data = data;
    } catch (err) {
      console.error('Failed to load task profile', err);
      if (taskProfileState.id !== id) return;
      taskProfileState.error = err.message || 'Could not load this task — check the Worker.';
    } finally {
      if (taskProfileState.id === id) {
        taskProfileState.loading = false;
        paintTaskProfile(container);
      }
    }
  }

  // --- Relation-list profiles (Tag, Collection, Person) — read/navigate
  // only, no writes to Notion. Conventions.md's "Tabbed relation-lists"
  // pattern: one shared component — flat ID handle, serif name hero, a tab
  // row (one tab per referencing database), and the active tab's list of
  // dense bordered rows. Reuses the note/task profiles' schema-resolution
  // helpers (relationPropertyName, titlePropertyName, uniqueIdPropertyName,
  // DOMAIN_META) rather than re-deriving any of it.
  //
  // REL_DB_META is the shared registry of every database that can appear as
  // a tab across the three consumers — keyed by tab key, not by consumer,
  // since the same databases repeat across tag/collection/person's tab
  // sets. `route` is the entity route its rows navigate to; Resources has
  // none yet (same foundation-slice gap as the Note profile's Resources
  // pills), so its rows render without a navigable label.
  const REL_DB_META = {
    notes:       { label: 'Notes',       dbId: CONFIG.DB.NOTES,       route: 'note' },
    tasks:       { label: 'Tasks',       dbId: CONFIG.DB.TASKS,       route: 'task' },
    projects:    { label: 'Projects',    dbId: CONFIG.DB.PROJECTS,    route: 'project' },
    people:      { label: 'People',      dbId: CONFIG.DB.PEOPLE,      route: 'person' },
    tags:        { label: 'Tags',        dbId: CONFIG.DB.TAGS,        route: 'tag' },
    collections: { label: 'Collections', dbId: CONFIG.DB.COLLECTIONS, route: 'collection' },
    resources:   { label: 'Resources',   dbId: CONFIG.DB.RESOURCES,   route: null },
  };

  // Per RenitaOS-Conventions.md's "Tabbed relation-lists" — the tab set and
  // order for each consumer. First entry is always the default/active tab
  // (Notes, in every set). Tasks appears only on Person; Tags/Collections
  // carry no Tasks tab (tasks are "for" people, never tags/collections).
  const RELATION_TAB_SETS = {
    tag: ['notes', 'projects', 'people', 'collections', 'resources'],
    collection: ['notes', 'people', 'tags', 'projects', 'resources'],
    person: ['notes', 'tasks', 'projects', 'collections', 'tags'],
  };

  const RELATION_PROFILE_CONSUMERS = {
    tag: { dbId: CONFIG.DB.TAGS, label: 'Tag' },
    collection: { dbId: CONFIG.DB.COLLECTIONS, label: 'Collection' },
    person: { dbId: CONFIG.DB.PEOPLE, label: 'Person' },
  };

  // A row's domain chip is resolved structurally, same as the Note/Task
  // profiles: Notes carries its own Domain (relation-or-select, see
  // getNotesDomainProp); Projects carries a direct Domain relation; a Task
  // has no Domain field of its own, so it's read via its first Project's
  // Domain (resolveTaskProjectAndDomain, already used by the Task profile).
  // Every other referencing database (People/Tags/Collections/Resources)
  // has no Domain to resolve — returns null, and the row renders title + ID
  // only, per spec.
  async function resolveRowDomainChip(tabKey, page) {
    if (tabKey === 'notes') {
      const domainProp = await getNotesDomainProp(CONFIG.DB.NOTES);
      if (!domainProp) return null;
      const propVal = page.properties[domainProp.name];
      if (domainProp.type === 'relation') {
        const relIds = (propVal && propVal.relation) || [];
        const domainId = relIds[0] ? relIds[0].id : null;
        if (!domainId) return null;
        const meta = DOMAIN_META.find((d) => normalizeDbId(d.pageId) === normalizeDbId(domainId));
        return meta ? { label: meta.code, fill: meta.fill, text: meta.text } : null;
      }
      const selName = propVal && propVal.select && propVal.select.name;
      if (!selName) return null;
      const meta = DOMAIN_META.find((d) => d.code === selName);
      return meta
        ? { label: meta.code, fill: meta.fill, text: meta.text }
        : { label: selName, fill: NO_DOMAIN_META.fill, text: NO_DOMAIN_META.text };
    }
    if (tabKey === 'projects') {
      const domainRelProp = await relationPropertyName(CONFIG.DB.PROJECTS, CONFIG.DB.DOMAINS);
      const relIds = (page.properties[domainRelProp] || {}).relation || [];
      const domainId = relIds[0] ? relIds[0].id : null;
      if (!domainId) return null;
      const meta = DOMAIN_META.find((d) => normalizeDbId(d.pageId) === normalizeDbId(domainId));
      return meta ? { label: meta.code, fill: meta.fill, text: meta.text } : null;
    }
    if (tabKey === 'tasks') {
      const tasksProjectsProp = await relationPropertyName(CONFIG.DB.TASKS, CONFIG.DB.PROJECTS);
      const projectIds = ((page.properties[tasksProjectsProp] || {}).relation || []).map((r) => r.id);
      const { domainId } = await resolveTaskProjectAndDomain(projectIds);
      if (!domainId) return null;
      const meta = DOMAIN_META.find((d) => normalizeDbId(d.pageId) === normalizeDbId(domainId));
      return meta ? { label: meta.code, fill: meta.fill, text: meta.text } : null;
    }
    return null;
  }

  // Minimal-payload count query for a not-yet-hydrated tab — trims each
  // result to the referencing database's title property (filter_properties
  // takes property IDs, not names) since only `results.length` is needed.
  // Still pages through has_more so the count is accurate past one page.
  async function queryTabCount(meta, relProp, pageId) {
    const titleProp = await titlePropertyName(meta.dbId);
    const db = await getSchema(meta.dbId);
    const titlePropId = db.properties[titleProp] && db.properties[titleProp].id;
    const pages = await queryAllPages(
      meta.dbId,
      { property: relProp, relation: { contains: pageId } },
      titlePropId ? [titlePropId] : undefined
    );
    return pages.length;
  }

  // Full record fetch for the default tab (eager) or a tab being opened for
  // the first time (lazy) — one query, doubling as both the row data and
  // that tab's authoritative count.
  async function queryTabRecords(tabKey, meta, relProp, pageId) {
    const pages = await queryAllPages(meta.dbId, { property: relProp, relation: { contains: pageId } });
    const [titleProp, uniqueIdProp] = await Promise.all([
      titlePropertyName(meta.dbId),
      uniqueIdPropertyName(meta.dbId),
    ]);
    return Promise.all(pages.map(async (p) => {
      const title = plainTitle(p, titleProp);
      const uniqueIdVal = uniqueIdProp ? (p.properties[uniqueIdProp] || {}).unique_id : null;
      const uniqueId = uniqueIdVal ? formatUniqueId(uniqueIdVal.prefix, uniqueIdVal.number) : null;
      const domainChip = await resolveRowDomainChip(tabKey, p);
      return { id: p.id, title, uniqueId, domainChip, route: meta.route };
    }));
  }

  // Loads the record's own header (ID handle + title) plus every tab: the
  // default (Notes) tab gets its full records eagerly (which also yields
  // its count for free); every other tab gets only its count. A referencing
  // database that turns out to have no relation property targeting this
  // consumer database (shouldn't happen given the fixed tab sets above, but
  // schemas drift) fails that one tab softly — 0, clickable, empty state —
  // rather than breaking the whole profile.
  async function loadRelationProfileBase(entityKey, pageId) {
    const consumer = RELATION_PROFILE_CONSUMERS[entityKey];
    const [page, titleProp, uniqueIdProp] = await Promise.all([
      notionRequest(`/v1/pages/${pageId}`),
      titlePropertyName(consumer.dbId),
      uniqueIdPropertyName(consumer.dbId),
    ]);
    const title = plainTitle(page, titleProp);
    const uniqueIdVal = uniqueIdProp ? (page.properties[uniqueIdProp] || {}).unique_id : null;
    const uniqueId = uniqueIdVal ? formatUniqueId(uniqueIdVal.prefix, uniqueIdVal.number) : null;

    const tabKeys = RELATION_TAB_SETS[entityKey];
    const tabs = await Promise.all(tabKeys.map(async (tabKey, idx) => {
      const meta = REL_DB_META[tabKey];
      let relProp = null;
      try {
        relProp = await relationPropertyName(meta.dbId, consumer.dbId);
      } catch (err) {
        console.error(`No relation on "${tabKey}" targeting ${entityKey}`, err);
        return { key: tabKey, label: meta.label, route: meta.route, relProp: null, unavailable: true, count: 0, records: [], hydrated: true, loading: false, error: null };
      }
      if (idx === 0) {
        const records = await queryTabRecords(tabKey, meta, relProp, pageId);
        return { key: tabKey, label: meta.label, route: meta.route, relProp, unavailable: false, count: records.length, records, hydrated: true, loading: false, error: null };
      }
      const count = await queryTabCount(meta, relProp, pageId);
      return { key: tabKey, label: meta.label, route: meta.route, relProp, unavailable: false, count, records: null, hydrated: false, loading: false, error: null };
    }));

    return { id: page.id, title, uniqueId, consumerLabel: consumer.label, tabs };
  }

  function renderRelationRow(r) {
    const navAttr = r.route ? ` data-pf-nav="${r.route}/${escapeHtml(r.id)}"` : '';
    const domainChipHtml = r.domainChip
      ? `<span class="pf-row-domain" style="background:${r.domainChip.fill};color:${r.domainChip.text};">${escapeHtml(r.domainChip.label)}</span>`
      : '';
    return `<div class="pf-row${r.route ? ' pf-row--nav' : ''}"${navAttr}>
      <div class="pf-row-main">
        <span class="pf-row-title">${escapeHtml(r.title || 'Untitled')}</span>
        <span class="pf-row-id">${r.uniqueId ? escapeHtml(r.uniqueId) : '—'}</span>
      </div>
      ${domainChipHtml}
    </div>`;
  }

  function renderRelationTabPanel(tab, consumerLabel) {
    const countHtml = `<div class="pf-tab-panel-count">${escapeHtml(tab.label)}<span class="pf-tab-n">${tab.count}</span></div>`;
    let bodyHtml;
    if (tab.loading) {
      bodyHtml = `<div class="tg-status">Loading…</div>`;
    } else if (tab.error) {
      bodyHtml = `<div class="tg-status tg-status--error">${escapeHtml(tab.error)}</div>`;
    } else if (!tab.records || !tab.records.length) {
      bodyHtml = `<div class="pf-tab-empty">No ${escapeHtml(tab.label.toLowerCase())} reference this ${escapeHtml(consumerLabel.toLowerCase())} yet.</div>`;
    } else {
      bodyHtml = `<div class="pf-row-list">${tab.records.map(renderRelationRow).join('')}</div>`;
    }
    return `<div class="pf-tab-panel">${countHtml}${bodyHtml}</div>`;
  }

  function renderRelationProfile(state) {
    const d = state.data;
    const crumbHtml = `<div class="pf-crumb pf-crumb--id">${d.uniqueId ? escapeHtml(d.uniqueId) : '—'}</div>`;
    const heroHtml = `<div class="serif pf-hero">${escapeHtml(d.title || 'Untitled')}</div>`;
    // All tabs always render, even at 0 — per the Conventions.md's "Empty
    // tabs are shown greyed with a 0, never hidden" rule (here: plain, not
    // greyed-and-disabled, since 0-count tabs stay fully clickable).
    const tabsHtml = `<div class="pf-tabs" role="tablist">${d.tabs.map((t) => `
        <button type="button" class="pf-tab${t.key === state.activeTab ? ' pf-tab--active' : ''}" data-pf-tab="${t.key}" role="tab" aria-selected="${t.key === state.activeTab}">
          <span class="pf-tab-label">${escapeHtml(t.label)}</span>
          <span class="pf-tab-n">${t.count}</span>
        </button>`).join('')}</div>`;
    const activeTab = d.tabs.find((t) => t.key === state.activeTab) || d.tabs[0];
    const panelHtml = renderRelationTabPanel(activeTab, d.consumerLabel);

    return `<div class="pf-view">
      ${crumbHtml}
      ${heroHtml}
      ${tabsHtml}
      ${panelHtml}
    </div>`;
  }

  const relationProfileState = { entityKey: null, id: null, loading: false, error: null, data: null, activeTab: null };

  function paintRelationProfile(container) {
    const s = relationProfileState;
    if (s.loading) {
      container.innerHTML = `<div class="pf-view"><div class="tg-status">Loading…</div></div>`;
      return;
    }
    if (s.error) {
      container.innerHTML = `<div class="pf-view"><div class="tg-status tg-status--error">${escapeHtml(s.error)}</div></div>`;
      return;
    }
    container.innerHTML = renderRelationProfile(s);
  }

  async function mountRelationProfile(container, entityKey, id) {
    const s = relationProfileState;
    s.entityKey = entityKey;
    s.id = id;
    s.loading = true;
    s.error = null;
    s.data = null;
    s.activeTab = null;
    paintRelationProfile(container);
    try {
      const data = await loadRelationProfileBase(entityKey, id);
      if (s.id !== id || s.entityKey !== entityKey) return; // route moved on while this was in flight
      s.data = data;
      s.activeTab = data.tabs.length ? data.tabs[0].key : null;
    } catch (err) {
      console.error('Failed to load relation profile', err);
      if (s.id !== id || s.entityKey !== entityKey) return;
      s.error = err.message || 'Could not load this record — check the Worker.';
    } finally {
      if (s.id === id && s.entityKey === entityKey) {
        s.loading = false;
        paintRelationProfile(container);
      }
    }
  }

  // Switching tabs is instant for an already-hydrated tab (just repaints);
  // a not-yet-opened tab shows its own "Loading…" in place while its full
  // record list is fetched, then caches so re-opening it never re-fetches.
  // A tab already known to be empty (count 0 from the eager pass) skips the
  // network round-trip entirely — there's nothing a full query would find.
  async function onRelationTabClick(tabKey) {
    const s = relationProfileState;
    if (!s.data) return;
    const entityKey = s.entityKey;
    const id = s.id;
    s.activeTab = tabKey;
    paintRelationProfile(content);
    const tab = s.data.tabs.find((t) => t.key === tabKey);
    if (!tab || tab.hydrated || tab.loading || tab.unavailable) return;
    if (tab.count === 0) {
      tab.records = [];
      tab.hydrated = true;
      paintRelationProfile(content);
      return;
    }
    tab.loading = true;
    paintRelationProfile(content);
    try {
      const records = await queryTabRecords(tab.key, REL_DB_META[tab.key], tab.relProp, id);
      if (s.entityKey !== entityKey || s.id !== id) return;
      tab.records = records;
      tab.count = records.length;
      tab.hydrated = true;
    } catch (err) {
      console.error('Failed to load relation tab', tabKey, err);
      if (s.entityKey !== entityKey || s.id !== id) return;
      tab.error = err.message || 'Could not load this list.';
    } finally {
      tab.loading = false;
      if (s.entityKey === entityKey && s.id === id && s.activeTab === tabKey) paintRelationProfile(content);
    }
  }

  // Relation-pill label taps (any profile) navigate via the hash router,
  // regardless of which route is currently mounted — unlike the Triage
  // click delegation below, which is gated to the inbox route only. Tab
  // clicks on a relation-list profile are handled the same delegated way.
  content.addEventListener('click', (e) => {
    const navEl = e.target.closest('[data-pf-nav]');
    if (navEl) { location.hash = `#/${navEl.dataset.pfNav}`; return; }
    const tabEl = e.target.closest('[data-pf-tab]');
    if (tabEl) onRelationTabClick(tabEl.dataset.pfTab);
  });

  // --- Views ----------------------------------------------------------------
  // Capture isn't an in-shell route: the nav links straight to capture.html
  // until the Capture screen is migrated in here. Triage is a real screen
  // now, rendered by mountTriage() (async + interactive) instead of a plain
  // VIEWS entry.
  const VIEWS = {
    home: () => `
      <div class="placeholder">
        <div class="placeholder-title">Home</div>
        <div class="placeholder-sub">Coming soon.</div>
      </div>
    `,
  };

  // --- Hash router ------------------------------------------------------
  // Static routes match the whole hash; entity routes are a singular noun
  // + Notion page id (#/note/{id}, #/task/{id}, ...) — parsed by splitting
  // on "/" rather than matched against a fixed list, since the id half is
  // arbitrary. Anything unrecognized (including a bare entity name with no
  // id) falls back to Home rather than erroring.
  const STATIC_ROUTES = ['home', 'inbox'];

  function parseRoute() {
    const hash = location.hash.replace(/^#\/?/, '');
    const segments = hash.split('/').filter(Boolean);
    if (segments.length === 0) return { name: 'home' };
    const [first, second] = segments;
    if (STATIC_ROUTES.includes(first)) return { name: first };
    if (ENTITY_ROUTES.includes(first) && second) return { name: first, id: decodeURIComponent(second) };
    return { name: 'home' };
  }

  // Triage's own click/input/change/wheel listeners below gate on "is this
  // the inbox route" by name alone — kept as a thin wrapper over
  // parseRoute so that plumbing doesn't need to change.
  function currentRoute() {
    return parseRoute().name;
  }

  function render() {
    // "#/triage" was the route's name before the Inbox rename — alias any
    // old link to the new one rather than 404-ing it into Home. Rewriting
    // the hash (rather than just resolving 'inbox' internally) fires
    // hashchange, which re-enters render() with the corrected URL.
    if (location.hash.replace(/^#\/?/, '') === 'triage') {
      location.hash = '#/inbox';
      return;
    }
    const route = parseRoute();
    document.querySelectorAll('.nav-btn').forEach((btn) => {
      btn.classList.toggle('active', btn.dataset.route === route.name);
    });
    content.classList.toggle('stretch', route.name === 'inbox');
    content.classList.toggle('profile', REAL_PROFILE_ROUTES.includes(route.name));
    // The Inbox-triage "N to Sort" pill doesn't belong on a record's own
    // profile (real or still-stubbed) — Home and Inbox keep it.
    inboxPill.classList.toggle('hidden', ENTITY_ROUTES.includes(route.name));
    if (route.name === 'inbox') {
      mountTriage(content);
    } else if (route.name === 'note') {
      mountNoteProfile(content, route.id);
    } else if (route.name === 'task') {
      mountTaskProfile(content, route.id);
    } else if (route.name === 'tag' || route.name === 'collection' || route.name === 'person') {
      mountRelationProfile(content, route.name, route.id);
    } else if (ENTITY_ROUTES.includes(route.name)) {
      content.innerHTML = renderEntityStub(route.name);
    } else {
      content.innerHTML = VIEWS[route.name]();
    }
    // The inbox count can change on any screen (Capture adds to it, Triage
    // will resolve it later), so it's refreshed on every route change.
    refreshInboxCount();
  }

  window.addEventListener('hashchange', render);

  if (!location.hash) {
    location.hash = '#/home';
  } else {
    render();
  }
})();
</script>
</body>
</html>
