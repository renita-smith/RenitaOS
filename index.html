      ? `<div class="tg-pop-opt tg-pop-opt--create" data-pop-value="${escapeHtml(q)}" data-pop-create="true">+ Create "${escapeHtml(q)}"</div>`
      : '';
    return `${createHtml}<div class="tg-pop-list">${optsHtml}</div>`;
  }

  function renderTagPopover(card) {
    const tagIconHtml = renderChipIcon(triageState.data.icons.tags);
    const currentHtml = card.tags.length
      ? `<div class="tg-pop-current">${card.tagIds.map((id, i) => `<span class="tg-pop-pill">${tagIconHtml}#${escapeHtml(card.tags[i] || '')}<span class="x" data-pop-remove-tag="${escapeHtml(id)}">×</span></span>`).join('')}</div>`
      : '';
    return `<div class="tg-popover">
      ${currentHtml}
      <input type="text" class="tg-pop-input" data-pop-filter placeholder="Filter or create a tag…" value="${escapeHtml(triageState.popoverQuery || '')}">
      <div class="tg-pop-dynamic">${renderTagPopoverDynamic(card)}</div>
    </div>`;
  }

  function renderDuePopover(card) {
    const optsHtml = quickDueOptions().map((o) => `<div class="tg-pop-opt" data-pop-value="${o.iso}">${o.label}</div>`).join('');
    const clearHtml = card.due ? `<div class="tg-pop-opt tg-pop-opt--clear" data-pop-value="" data-pop-clear="true">Clear due date</div>` : '';
    return `<div class="tg-popover">
      <div class="tg-pop-label">Due date</div>
      <div class="tg-pop-list">${optsHtml}</div>
      <input type="date" class="tg-pop-date" data-pop-date-input value="${card.due ? escapeHtml(card.due) : ''}">
      ${clearHtml}
    </div>`;
  }

  // Existing-project matches only — Triage never creates a new Project.
  function renderProjectPopoverDynamic(card) {
    const q = (triageState.popoverQuery || '').trim().toLowerCase();
    const matches = triageState.data.projects.list.filter((p) => p.id !== card.projectId && p.name.toLowerCase().includes(q));
    const optsHtml = matches.map((p) => `<div class="tg-pop-opt" data-pop-value="${escapeHtml(p.id)}">${escapeHtml(p.name)}</div>`).join('');
    return `<div class="tg-pop-list">${optsHtml}</div>`;
  }

  function renderProjectPopover(card) {
    const clearHtml = card.projectName ? `<div class="tg-pop-opt tg-pop-opt--clear" data-pop-value="" data-pop-clear="true">Remove project</div>` : '';
    return `<div class="tg-popover">
      ${clearHtml}
      <input type="text" class="tg-pop-input" data-pop-filter placeholder="Filter projects…" value="${escapeHtml(triageState.popoverQuery || '')}">
      <div class="tg-pop-dynamic">${renderProjectPopoverDynamic(card)}</div>
    </div>`;
  }

  function renderDomainPopover(card) {
    const current = card.domainCode;
    const opts = DOMAIN_META.map((d) => `<div class="tg-type-opt${d.code === current ? ' on' : ''}" data-pop-value="${d.code}" style="background:${d.fill};color:${d.text};">${d.code}</div>`).join('');
    const clearHtml = current ? `<div class="tg-pop-opt tg-pop-opt--clear" data-pop-value="" data-pop-clear="true">Remove domain</div>` : '';
    return `<div class="tg-popover"><div class="tg-pop-label">Domain</div><div class="tg-type-strip">${opts}</div>${clearHtml}</div>`;
  }

  // Notes' Domain picker — existing domains only, read live from the
  // Domains DB (triageState.data.domains), same "assign existing, never
  // create" rule as Project assignment. data-pop-value carries the domain's
  // page id; applyNoteSetDomain looks its name back up from that same live
  // list, so this works whether the underlying property is a relation or a
  // select (no plumbing here needs to know which).
  function renderNoteDomainPopover(card) {
    const domainList = triageState.data.domains.list;
    const opts = domainList.map((d) => {
      const meta = DOMAIN_META.find((m) => m.pageId === d.id) || DOMAIN_META.find((m) => m.code === d.name) || NO_DOMAIN_META;
      const isOn = card.domainId ? d.id === card.domainId : d.name === card.domainName;
      return `<div class="tg-type-opt${isOn ? ' on' : ''}" data-pop-value="${escapeHtml(d.id)}" style="background:${meta.fill};color:${meta.text};">${escapeHtml(d.name)}</div>`;
    }).join('');
    const clearHtml = card.domainName ? `<div class="tg-pop-opt tg-pop-opt--clear" data-pop-value="" data-pop-clear="true">Remove domain</div>` : '';
    return `<div class="tg-popover"><div class="tg-pop-label">Domain</div><div class="tg-type-strip">${opts}</div>${clearHtml}</div>`;
  }

  // Per-card Status editing (Tasks) — options come live from the same
  // statusOptions the bulk Status action uses, never hardcoded.
  function renderCardStatusPopover(card, track) {
    const options = triageState.data.statusOptions[track] || [];
    const optsHtml = options.map((o) => `<div class="tg-pop-opt${o.name === card.status ? ' on' : ''}" data-pop-value="${escapeHtml(o.name)}">${escapeHtml(o.name)}</div>`).join('');
    return `<div class="tg-popover"><div class="tg-pop-label">Status</div><div class="tg-pop-list">${optsHtml}</div></div>`;
  }

  // Notes' Date is auto-set to today on capture and always adjustable —
  // same quick options as the Task Due popover, no "clear" (it's never
  // meant to be empty), plus a native date input for a specific day.
  function renderNoteDatePopover(card) {
    const optsHtml = quickDueOptions().map((o) => `<div class="tg-pop-opt" data-pop-value="${o.iso}">${o.label}</div>`).join('');
    return `<div class="tg-popover">
      <div class="tg-pop-label">Date</div>
      <div class="tg-pop-list">${optsHtml}</div>
      <input type="date" class="tg-pop-date" data-pop-date-input value="${card.date ? escapeHtml(card.date) : ''}">
    </div>`;
  }

  function renderToast() {
    return triageState.toast ? `<div class="tg-toast">${escapeHtml(triageState.toast)}</div>` : '';
  }

  function renderSnackbar() {
    return triageState.snackbar
      ? `<div class="tg-snackbar"><span>${escapeHtml(triageState.snackbar)}</span><span class="undo" data-undo>Undo</span></div>`
      : '';
  }

  // Opening a bin snapshots which card IDs belong to it. Edits within the
  // bin (Type/Project changes can move a card to a different bin) don't
  // make the card vanish mid-sort — it stays until you back out and reopen,
  // or Refresh clears it — matching "the card does not vanish" for
  // qualification, applied consistently to reclassification too.
  function openBin(key) {
    const bins = triageState.track === 'notes' ? groupNotes(triageState.data.notesCards) : groupTasks(triageState.data.tasksCards);
    const bin = bins.find((b) => b.key === key);
    if (!bin) return;
    triageState.openBin = key;
    triageState.openBinMeta = bin;
    triageState.pinnedIds = bin.cards.map((c) => c.id);
    triageState.popover = null;
    triageState.popoverQuery = '';
    triageState.removedBatch = null;
    triageState.justClearedCount = null;
    clearTimeout(snackbarTimer);
    triageState.snackbar = null;
    triageState.selecting = false;
    triageState.selected = new Set();
    triageState.bulkPopover = null;
    triageState.swipedCardId = null;
    // The mobile bin list can run taller than the viewport (one full-width
    // row per bin) — without this, opening a bin low in that list leaves
    // its header and cards scrolled out of view below the fold, with
    // nothing on screen to show the tap did anything. paintTriage's own
    // scroll handling below is for the opposite case (preserve position
    // during in-place edits), so this is a one-shot override consumed on
    // the very next paint.
    triageState.scrollToOpenedBin = true;
    paintTriage();
  }

  // Shown below the chip row before any bin is opened yet — same on mobile
  // and desktop — and as a defensive fallback if renderBinScreen is ever
  // called with no bin open.
  function renderBinEmptyState() {
    return `<div class="tg-view"><div class="tg-status">Select a bin to start sorting.</div></div>`;
  }

  function renderBinScreen(data) {
    const { track, openBinMeta, pinnedIds } = triageState;
    if (!openBinMeta) { triageState.openBin = null; return renderBinEmptyState(); }

    const allCards = track === 'notes' ? data.notesCards : data.tasksCards;
    const cardsById = new Map(allCards.map((c) => [c.id, c]));
    const cards = pinnedIds.map((id) => cardsById.get(id)).filter(Boolean);
    const qualifiedFn = track === 'notes' ? noteQualified : taskQualified;
    const qualifiedCount = cards.filter(qualifiedFn).length;

    const cardsHtml = cards.map((c) => (track === 'notes' ? renderNoteCard(c) : renderTaskCard(c))).join('');

    return `
      <div class="tg-view${triageState.selecting ? ' selecting' : ''}">
        <div class="tg-bin-head">
          <div class="tg-row tg-between">
            <div class="tg-link" data-back><span class="tg-chevleft">‹</span> Bins</div>
            <button type="button" class="tg-btn-select${triageState.selecting ? ' on' : ''}" data-toggle-select>${triageState.selecting ? 'Done' : 'Select'}</button>
          </div>
          <div class="tg-bin-title-row">
            ${track === 'notes' ? `<span class="tg-icon-slot">${ICONS[openBinMeta.icon] || ''}</span>` : ''}
            <span class="serif tg-bin-title">${escapeHtml(openBinMeta.label)}</span>
            <span class="tg-bin-n">· ${cards.length}</span>
          </div>
        </div>
        ${cards.length ? `
          <div class="tg-refresh-bar" style="visibility:${qualifiedCount > 0 ? 'visible' : 'hidden'};">
            <span class="tg-dot-ready"></span>
            <span class="lbl">${qualifiedCount} ready to clear</span>
            <button type="button" class="tg-btn-refresh" data-refresh${triageState.busy ? ' disabled' : ''}>${triageState.busy ? 'Clearing…' : 'Refresh'}</button>
          </div>
          <div class="tg-stack">${cardsHtml}</div>
        ` : `
          <div class="tg-zero">
            <div class="tg-zero-panel">
              <div class="tg-zero-eyebrow">${escapeHtml(openBinMeta.label)} · clear</div>
              <div class="serif tg-zero-line">All sorted.<br>Nothing left in this bin.</div>
              <div class="tg-zero-stat">${escapeHtml(formatDateLong())}${triageState.justClearedCount ? ` · you cleared ${triageState.justClearedCount} just now.` : ''}</div>
            </div>
          </div>
        `}
        ${renderBulkBar()}
        ${renderSnackbar()}
        ${renderToast()}
      </div>
    `;
  }

  function renderCheckbox(card) {
    if (!triageState.selecting) return '';
    const checked = triageState.selected.has(card.id);
    return `<div class="tg-checkbox${checked ? ' checked' : ''}" data-select-card="${card.id}">${checked ? '✓' : ''}</div>`;
  }

  function renderBulkBar() {
    if (!triageState.selecting) return '';
    const count = triageState.selected.size;
    const track = triageState.track;
    const actions = track === 'notes'
      ? [{ key: 'tag', label: 'Tag' }, { key: 'status', label: 'Status' }, { key: 'delete', label: 'Delete' }]
      : [{ key: 'status', label: 'Status' }, { key: 'project', label: 'Project' }, { key: 'delete', label: 'Delete' }];
    const btnsHtml = actions.map((a) => `
      <div class="tg-pop-wrap tg-bulk-wrap">
        <button type="button" class="tg-bulk-btn" data-bulk-action="${a.key}"${count === 0 || triageState.busy ? ' disabled' : ''}>${a.label}</button>
        ${triageState.bulkPopover === a.key ? renderBulkPopover(a.key) : ''}
      </div>`).join('');
    return `<div class="tg-bulk-bar">
      <div class="tg-bulk-cnt">${count} selected</div>
      <div class="tg-bulk-actions">${btnsHtml}</div>
    </div>`;
  }

  function renderBulkTagPopoverDynamic() {
    const q = (triageState.popoverQuery || '').trim();
    const ql = q.toLowerCase();
    const matches = triageState.data.tags.list.filter((t) => t.name.toLowerCase().includes(ql));
    const optsHtml = matches.map((t) => `<div class="tg-pop-opt" data-pop-value="${escapeHtml(t.id)}">${renderChipIcon(triageState.data.icons.tags)}#${escapeHtml(t.name)}</div>`).join('');
    const exact = q && triageState.data.tags.list.some((t) => t.name.toLowerCase() === ql);
    const createHtml = q && !exact
      ? `<div class="tg-pop-opt tg-pop-opt--create" data-pop-value="${escapeHtml(q)}" data-pop-create="true">+ Create "${escapeHtml(q)}"</div>`
      : '';
    return `${createHtml}<div class="tg-pop-list">${optsHtml}</div>`;
  }

  // Existing-project matches only — Triage never creates a new Project.
  function renderBulkProjectPopoverDynamic() {
    const q = (triageState.popoverQuery || '').trim().toLowerCase();
    const matches = triageState.data.projects.list.filter((p) => p.name.toLowerCase().includes(q));
    const optsHtml = matches.map((p) => `<div class="tg-pop-opt" data-pop-value="${escapeHtml(p.id)}">${escapeHtml(p.name)}</div>`).join('');
    return `<div class="tg-pop-list">${optsHtml}</div>`;
  }

  function renderBulkPopover(key) {
    if (key === 'tag') {
      return `<div class="tg-popover tg-popover--up">
        <input type="text" class="tg-pop-input" data-pop-filter placeholder="Add a tag to all selected…" value="${escapeHtml(triageState.popoverQuery || '')}">
        <div class="tg-pop-dynamic">${renderBulkTagPopoverDynamic()}</div>
      </div>`;
    }
    if (key === 'project') {
      return `<div class="tg-popover tg-popover--up">
        <input type="text" class="tg-pop-input" data-pop-filter placeholder="Set project for all selected…" value="${escapeHtml(triageState.popoverQuery || '')}">
        <div class="tg-pop-dynamic">${renderBulkProjectPopoverDynamic()}</div>
      </div>`;
    }
    if (key === 'status') {
      const options = triageState.data.statusOptions[triageState.track] || [];
      const optsHtml = options.map((o) => `<div class="tg-pop-opt" data-pop-value="${escapeHtml(o.name)}">${escapeHtml(o.name)}</div>`).join('');
      return `<div class="tg-popover tg-popover--up"><div class="tg-pop-label">Set status</div><div class="tg-pop-list">${optsHtml}</div></div>`;
    }
    return '';
  }

  let triageToastTimer = null;
  function showTriageToast(message) {
    triageState.toast = message;
    paintTriage();
    clearTimeout(triageToastTimer);
    triageToastTimer = setTimeout(() => { triageState.toast = null; paintTriage(); }, 3000);
  }

  // Undo window stays open until the snackbar auto-dismisses — after that
  // the removal is final, matching a typical snackbar's single-chance
  // undo. Shared by Refresh and single-note delete — both just leave a
  // triageState.removedBatch for applyUndo to act on.
  let snackbarTimer = null;
  function showUndoSnackbar(message) {
    triageState.snackbar = message;
    paintTriage();
    clearTimeout(snackbarTimer);
    snackbarTimer = setTimeout(() => {
      triageState.snackbar = null;
      triageState.removedBatch = null;
      paintTriage();
    }, 6000);
  }

  // Serializes writes and re-paints once done — prevents a second tap from
  // firing a write while the first is still in flight.
  async function withBusy(fn) {
    if (triageState.busy) return;
    triageState.busy = true;
    try {
      await fn();
    } finally {
      triageState.busy = false;
      paintTriage();
    }
  }

  // Refresh clears every currently-qualified card in the open bin at once:
  // writes each one's Status from Inbox to its next natural status (§5),
  // removes them from view, and leaves a single-undo snackbar. Undo reverts
  // the Status write and restores the cards — to the same bin, if you're
  // still looking at it.
  function applyRefresh() {
    return withBusy(async () => {
      const { track, pinnedIds } = triageState;
      const allCards = track === 'notes' ? triageState.data.notesCards : triageState.data.tasksCards;
      const cardsById = new Map(allCards.map((c) => [c.id, c]));
      const cards = pinnedIds.map((id) => cardsById.get(id)).filter(Boolean);
      const qualifiedFn = track === 'notes' ? noteQualified : taskQualified;
      const ready = cards.filter(qualifiedFn);
      if (!ready.length) return;

      const databaseId = track === 'notes' ? CONFIG.DB.NOTES : CONFIG.DB.TASKS;
      const targetName = track === 'notes' ? CONFIG.NOTE_STATUS_PROCESSED : CONFIG.TASK_STATUS_PROCESSED;
      try {
        const { name: statusPropertyName, value: processedValue } = await getStatusTarget(databaseId, targetName);
        for (const card of ready) {
          // eslint-disable-next-line no-await-in-loop
          await notionRequest(`/v1/pages/${card.id}`, { method: 'PATCH', body: { properties: { [statusPropertyName]: { status: { name: processedValue } } } } });
        }
        const clearedIds = new Set(ready.map((c) => c.id));
        if (track === 'notes') {
          triageState.data.notesCards = triageState.data.notesCards.filter((c) => !clearedIds.has(c.id));
        } else {
          triageState.data.tasksCards = triageState.data.tasksCards.filter((c) => !clearedIds.has(c.id));
        }
        triageState.pinnedIds = triageState.pinnedIds.filter((id) => !clearedIds.has(id));
        triageState.removedBatch = { kind: 'refresh', track, cards: ready, statusPropertyName };
        triageState.justClearedCount = ready.length;
        showUndoSnackbar(`${ready.length} cleared · inbox lighter`);
      } catch (err) {
        console.error('Failed to refresh', err);
        showTriageToast(err.message || 'Could not clear cards — try again.');
      }
    });
  }

  // Deletes a single note. Destructive, so this ARCHIVES the page
  // (Notion's own soft-delete: `archived: true` moves it to Trash) rather
  // than a hard delete — the exact same PATCH is reversible with
  // `archived: false`, so undo restores it precisely, reusing the same
  // removedBatch/snackbar plumbing Refresh uses (kind: 'delete' instead of
  // 'refresh' is all applyUndo needs to know which write to reverse).
  // Bulk delete is out of scope — this is reached only via the
  // swipe-revealed trash affordance on one card at a time.
  function applyNoteDelete(cardId) {
    return withBusy(async () => {
      const card = triageState.data.notesCards.find((c) => c.id === cardId);
      if (!card) return;
      try {
        await notionRequest(`/v1/pages/${cardId}`, { method: 'PATCH', body: { archived: true } });
        triageState.data.notesCards = triageState.data.notesCards.filter((c) => c.id !== cardId);
        triageState.pinnedIds = triageState.pinnedIds.filter((id) => id !== cardId);
        triageState.swipedCardId = null;
        triageState.removedBatch = { kind: 'delete', track: 'notes', cards: [card] };
        showUndoSnackbar('Note deleted');
        refreshInboxCount();
      } catch (err) {
        console.error('Failed to delete note', err);
        showTriageToast(err.message || 'Could not delete — try again.');
      }
    });
  }

  function applyUndo() {
    return withBusy(async () => {
      const batch = triageState.removedBatch;
      if (!batch) return;
      try {
        if (batch.kind === 'delete') {
          for (const card of batch.cards) {
            // eslint-disable-next-line no-await-in-loop
            await notionRequest(`/v1/pages/${card.id}`, { method: 'PATCH', body: { archived: false } });
          }
        } else {
          const databaseId = batch.track === 'notes' ? CONFIG.DB.NOTES : CONFIG.DB.TASKS;
          const { value: inboxValue } = await getInboxStatusFilter(databaseId);
          for (const card of batch.cards) {
            // eslint-disable-next-line no-await-in-loop
            await notionRequest(`/v1/pages/${card.id}`, { method: 'PATCH', body: { properties: { [batch.statusPropertyName]: { status: { name: inboxValue } } } } });
          }
        }
        if (batch.track === 'notes') {
          triageState.data.notesCards = [...triageState.data.notesCards, ...batch.cards];
        } else {
          triageState.data.tasksCards = [...triageState.data.tasksCards, ...batch.cards];
        }
        // Only reappear in the currently open bin if you're still looking
        // at the same track/bin the removal happened in.
        if (triageState.track === batch.track && triageState.openBin !== null) {
          triageState.pinnedIds = [...triageState.pinnedIds, ...batch.cards.map((c) => c.id)];
        }
        triageState.removedBatch = null;
        triageState.justClearedCount = null;
        clearTimeout(snackbarTimer);
        triageState.snackbar = null;
        if (batch.kind === 'delete') refreshInboxCount();
      } catch (err) {
        console.error('Failed to undo', err);
        showTriageToast(err.message || 'Could not undo — try again.');
      }
    });
  }

  // Type is a multi_select — toggling one option adds it if the note
  // doesn't already carry it, or removes it if it does, and writes the
  // FULL resulting array (Notion's multi_select PATCH always replaces the
  // whole set, so a partial write would silently drop every other type).
  // `type` is always one of triageState.data.typeOptions' exact strings
  // (fetched live from the schema), never a hardcoded/bare name.
  function applyNoteToggleType(cardId, type) {
    return withBusy(async () => {
      const card = triageState.data.notesCards.find((c) => c.id === cardId);
      if (!card) return;
      const newTypes = card.types.includes(type) ? card.types.filter((t) => t !== type) : [...card.types, type];
      try {
        await notionRequest(`/v1/pages/${cardId}`, { method: 'PATCH', body: { properties: { [CONFIG.NOTES_PROP.TYPE]: { multi_select: newTypes.map((name) => ({ name })) } } } });
        card.types = newTypes;
        triageState.popover = null;
      } catch (err) {
        console.error('Failed to update Type', err);
        showTriageToast(err.message || 'Could not update Type — try again.');
      }
    });
  }

  function applyNoteExistingTag(cardId, tagId) {
    return withBusy(async () => {
      const card = triageState.data.notesCards.find((c) => c.id === cardId);
      if (!card) return;
      const newIds = card.tagIds.includes(tagId) ? card.tagIds : [...card.tagIds, tagId];
      try {
        await notionRequest(`/v1/pages/${cardId}`, { method: 'PATCH', body: { properties: { [triageState.data.schema.notesTagsProp]: { relation: newIds.map((id) => ({ id })) } } } });
        card.tagIds = newIds;
        card.tags = newIds.map((id) => triageState.data.tags.byId.get(id)).filter(Boolean);
        triageState.popover = null;
      } catch (err) {
        console.error('Failed to add tag', err);
        showTriageToast(err.message || 'Could not add tag — try again.');
      }
    });
  }

  function applyNoteNewTag(cardId, rawName) {
    return withBusy(async () => {
      const name = rawName.trim();
      if (!name) return;
      const card = triageState.data.notesCards.find((c) => c.id === cardId);
      if (!card) return;
      try {
        const page = await notionRequest('/v1/pages', { method: 'POST', body: { parent: { database_id: CONFIG.DB.TAGS }, properties: { [triageState.data.schema.tagTitleProp]: { title: [{ text: { content: name } }] } } } });
        triageState.data.tags.list.push({ id: page.id, name });
        triageState.data.tags.byId.set(page.id, name);
        const newIds = [...card.tagIds, page.id];
        await notionRequest(`/v1/pages/${cardId}`, { method: 'PATCH', body: { properties: { [triageState.data.schema.notesTagsProp]: { relation: newIds.map((id) => ({ id })) } } } });
        card.tagIds = newIds;
        card.tags = newIds.map((id) => triageState.data.tags.byId.get(id)).filter(Boolean);
        triageState.popover = null;
      } catch (err) {
        console.error('Failed to create tag', err);
        showTriageToast(err.message || 'Could not create tag — try again.');
      }
    });
  }

  function applyNoteRemoveTag(cardId, tagId) {

      try {
        await notionRequest(`/v1/pages/${cardId}`, { method: 'PATCH', body: { properties: { [triageState.data.schema.notesTagsProp]: { relation: newIds.map((id) => ({ id })) } } } });
        card.tagIds = newIds;
        card.tags = newIds.map((id) => triageState.data.tags.byId.get(id)).filter(Boolean);

  function applyTaskDue(cardId, iso) {

        const card = triageState.data.tasksCards.find((c) => c.id === cardId);

        triageState.popover = null;
      } catch (err) {

  function applyTaskClearDueDate(cardId) {
    return withBusy(async () => {
      try {
        await notionRequest(`/v1/pages/${cardId}`, { method: 'PATCH', body: { properties: { [CONFIG.TASKS_PROP.DUE_DATE]: { date: null } } } });
        const card = triageState.data.tasksCards.find((c) => c.id === cardId);
        if (card) card.due = null;
        triageState.popover = null;

  }

  // Clears the task's Project relation entirely — used both by the
  // Project popover's "Remove project" and the Domain popover's "Remove
  // domain" (Domain has no field of its own; it's purely derived from
  // Project, so clearing either one is the same underlying write).
  function applyTaskClearProject(cardId) {
    return withBusy(async () => {
      try {
        await notionRequest(`/v1/pages/${cardId}`, { method: 'PATCH', body: { properties: { [triageState.data.schema.tasksProjectsProp]: { relation: [] } } } });
        const card = triageState.data.tasksCards.find((c) => c.id === cardId);
        if (card) { card.projectId = null; card.projectName = null; card.domainCode = null; }
        triageState.popover = null;
      } catch (err) {
        console.error('Failed to clear Project', err);
        showTriageToast(err.message || 'Could not clear Project — try again.');
      }
    });
  }

  // Assigns a Domain directly by linking the task to that Domain's
  // catch-all "Inbox/Admin" project (§4) — the same mechanism Capture uses
  // when a capture has a %domain but no specific !project.
  function applyTaskSetDomain(cardId, domainCode) {
    return withBusy(async () => {
      const meta = DOMAIN_META.find((d) => d.code === domainCode);
      if (!meta) return;
      try {
        await notionRequest(`/v1/pages/${cardId}`, { method: 'PATCH', body: { properties: { [triageState.data.schema.tasksProjectsProp]: { relation: [{ id: meta.catchAllProjectId }] } } } });
        const card = triageState.data.tasksCards.find((c) => c.id === cardId);
        const info = triageState.data.projects.byId.get(meta.catchAllProjectId);
        if (card) {
          card.projectId = meta.catchAllProjectId;
          card.projectName = info ? info.name : `${domainCode} · Inbox/Admin`;
          card.domainCode = domainCode;
        }
        triageState.popover = null;
      } catch (err) {
        console.error('Failed to set Domain', err);
        showTriageToast(err.message || 'Could not set Domain — try again.');
      }
    });
  }

  // Per-card Status (Tasks) — same rule as bulk/Refresh: moving off Inbox
  // drops the card out of the live Inbox data/pinned view immediately.
  function applyTaskStatus(cardId, statusName) {
    return withBusy(async () => {
      try {
        const { name: statusPropertyName, value: inboxValue } = await getInboxStatusFilter(CONFIG.DB.TASKS);
        await notionRequest(`/v1/pages/${cardId}`, { method: 'PATCH', body: { properties: { [statusPropertyName]: { status: { name: statusName } } } } });
        if (statusName !== inboxValue) {
          triageState.data.tasksCards = triageState.data.tasksCards.filter((c) => c.id !== cardId);
          triageState.pinnedIds = triageState.pinnedIds.filter((id) => id !== cardId);
        } else {
          const card = triageState.data.tasksCards.find((c) => c.id === cardId);
          if (card) card.status = statusName;
        }
        triageState.popover = null;
      } catch (err) {
        console.error('Failed to set Status', err);
        showTriageToast(err.message || 'Could not set Status — try again.');
      }
    });
  }

  function applyNoteDate(cardId, iso) {
    return withBusy(async () => {
      try {
        await notionRequest(`/v1/pages/${cardId}`, { method: 'PATCH', body: { properties: { [CONFIG.NOTES_PROP.DATE]: { date: { start: iso } } } } });
        const card = triageState.data.notesCards.find((c) => c.id === cardId);
        if (card) card.date = iso;
        triageState.popover = null;
      } catch (err) {
        console.error('Failed to set Date', err);
        showTriageToast(err.message || 'Could not set Date — try again.');
      }
    });
  }

  // Domain is optional on notes — never part of the qualified test, and
  // Refresh is untouched by it. Writes according to whatever the schema
  // actually resolved (triageState.data.notesDomainProp): a relation write
  // for a relation property, a select write for a select property. Assigns
  // from the live Domains list only — no create-new affordance here, same
  // as Project assignment.
  function applyNoteSetDomain(cardId, domainId) {
    return withBusy(async () => {
      const card = triageState.data.notesCards.find((c) => c.id === cardId);
      const prop = triageState.data.notesDomainProp;
      if (!card || !prop) return;
      const domainName = triageState.data.domains.byId.get(domainId) || null;
      const body = prop.type === 'relation'
        ? { properties: { [prop.name]: { relation: [{ id: domainId }] } } }
        : { properties: { [prop.name]: { select: { name: domainName } } } };
      try {
        await notionRequest(`/v1/pages/${cardId}`, { method: 'PATCH', body });
        card.domainId = prop.type === 'relation' ? domainId : null;
        card.domainName = domainName;
        triageState.popover = null;
      } catch (err) {
        console.error('Failed to set Domain', err);
        showTriageToast(err.message || 'Could not set Domain — try again.');
      }
    });
  }

  function applyNoteClearDomain(cardId) {
    return withBusy(async () => {
      const card = triageState.data.notesCards.find((c) => c.id === cardId);
      const prop = triageState.data.notesDomainProp;
      if (!card || !prop) return;
      const body = prop.type === 'relation'
        ? { properties: { [prop.name]: { relation: [] } } }
        : { properties: { [prop.name]: { select: null } } };
      try {
        await notionRequest(`/v1/pages/${cardId}`, { method: 'PATCH', body });
        card.domainId = null;
        card.domainName = null;
        triageState.popover = null;
      } catch (err) {
        console.error('Failed to clear Domain', err);
        showTriageToast(err.message || 'Could not clear Domain — try again.');
      }
    });
  }

  function applyTaskExistingProject(cardId, projectId) {
    return withBusy(async () => {
      try {
        await notionRequest(`/v1/pages/${cardId}`, { method: 'PATCH', body: { properties: { [triageState.data.schema.tasksProjectsProp]: { relation: [{ id: projectId }] } } } });
        const card = triageState.data.tasksCards.find((c) => c.id === cardId);
        const info = triageState.data.projects.byId.get(projectId);
        if (card) {
          card.projectId = projectId;
          card.projectName = info ? info.name : null;
          card.domainCode = info ? info.domainCode : null;
        }
        triageState.popover = null;
      } catch (err) {
        console.error('Failed to set Project', err);
        showTriageToast(err.message || 'Could not set Project — try again.');
      }
    });
  }

  function handlePopoverSelect(value, isCreate, isClear) {
    if (!triageState.popover) return;
    const { cardId, field } = triageState.popover;
    if (field === 'type') return applyNoteToggleType(cardId, value);
    if (field === 'tag') return isCreate ? applyNoteNewTag(cardId, value) : applyNoteExistingTag(cardId, value);
    if (field === 'due') return isClear ? applyTaskClearDueDate(cardId) : applyTaskDue(cardId, value);
    if (field === 'project') return isClear ? applyTaskClearProject(cardId) : applyTaskExistingProject(cardId, value);
    if (field === 'domain') return isClear ? applyTaskClearProject(cardId) : applyTaskSetDomain(cardId, value);
    if (field === 'status') return applyTaskStatus(cardId, value);
    if (field === 'date') return applyNoteDate(cardId, value);
    if (field === 'notedomain') return isClear ? applyNoteClearDomain(cardId) : applyNoteSetDomain(cardId, value);
  }

  // --- Select mode / bulk actions ------------------------------------------
  // Clears the selection + closes the bulk popover after a bulk write, but
  // (unlike per-card edits) leaves Select mode itself on, so you can queue
  // up another bulk action on a fresh selection right away.
  function finishBulkAction(message) {
    triageState.selected = new Set();
    triageState.bulkPopover = null;
    triageState.popoverQuery = '';
    showTriageToast(message);
  }

  function applyBulkTag(tagId) {
    return withBusy(async () => {
      const ids = [...triageState.selected];
      const cardsById = new Map(triageState.data.notesCards.map((c) => [c.id, c]));
      try {
        for (const id of ids) {
          const card = cardsById.get(id);
          if (!card || card.tagIds.includes(tagId)) continue;
          const newIds = [...card.tagIds, tagId];
          // eslint-disable-next-line no-await-in-loop
          await notionRequest(`/v1/pages/${id}`, { method: 'PATCH', body: { properties: { [triageState.data.schema.notesTagsProp]: { relation: newIds.map((i) => ({ id: i })) } } } });
          card.tagIds = newIds;
          card.tags = newIds.map((i) => triageState.data.tags.byId.get(i)).filter(Boolean);
        }
        finishBulkAction(`${ids.length} updated`);
      } catch (err) {
        console.error('Bulk tag failed', err);
        showTriageToast(err.message || 'Could not tag all selected — try again.');
      }
    });
  }

  function applyBulkNewTag(rawName) {
    return withBusy(async () => {
      const name = rawName.trim();
      if (!name) return;
      try {
        const page = await notionRequest('/v1/pages', { method: 'POST', body: { parent: { database_id: CONFIG.DB.TAGS }, properties: { [triageState.data.schema.tagTitleProp]: { title: [{ text: { content: name } }] } } } });
        triageState.data.tags.list.push({ id: page.id, name });
        triageState.data.tags.byId.set(page.id, name);
        const ids = [...triageState.selected];
        const cardsById = new Map(triageState.data.notesCards.map((c) => [c.id, c]));
        for (const id of ids) {
          const card = cardsById.get(id);
          if (!card) continue;
          const newIds = [...card.tagIds, page.id];
          // eslint-disable-next-line no-await-in-loop
          await notionRequest(`/v1/pages/${id}`, { method: 'PATCH', body: { properties: { [triageState.data.schema.notesTagsProp]: { relation: newIds.map((i) => ({ id: i })) } } } });
          card.tagIds = newIds;
          card.tags = newIds.map((i) => triageState.data.tags.byId.get(i)).filter(Boolean);
        }
        finishBulkAction(`${ids.length} updated`);
      } catch (err) {
        console.error('Bulk create tag failed', err);
        showTriageToast(err.message || 'Could not create tag — try again.');
      }
    });
  }

  function applyBulkProject(projectId) {
    return withBusy(async () => {
      const ids = [...triageState.selected];
      const info = triageState.data.projects.byId.get(projectId);
      try {
        for (const id of ids) {
          // eslint-disable-next-line no-await-in-loop
          await notionRequest(`/v1/pages/${id}`, { method: 'PATCH', body: { properties: { [triageState.data.schema.tasksProjectsProp]: { relation: [{ id: projectId }] } } } });
          const card = triageState.data.tasksCards.find((c) => c.id === id);
          if (card) { card.projectId = projectId; card.projectName = info ? info.name : null; card.domainCode = info ? info.domainCode : null; }
        }
        finishBulkAction(`${ids.length} updated`);
      } catch (err) {
        console.error('Bulk Project failed', err);
        showTriageToast(err.message || 'Could not set Project for all selected — try again.');
      }
    });
  }

  // Sets Status directly for every selected card (both tracks) — bypassing
  // qualify + Refresh entirely. If the target isn't Inbox, those cards drop
  // out of the live Inbox data/pinned view, same as Refresh does.
  function applyBulkStatus(statusName) {
    return withBusy(async () => {
      const track = triageState.track;
      const databaseId = track === 'notes' ? CONFIG.DB.NOTES : CONFIG.DB.TASKS;
      const ids = [...triageState.selected];
      try {
        const { name: statusPropertyName, value: inboxValue } = await getInboxStatusFilter(databaseId);
        for (const id of ids) {
          // eslint-disable-next-line no-await-in-loop
          await notionRequest(`/v1/pages/${id}`, { method: 'PATCH', body: { properties: { [statusPropertyName]: { status: { name: statusName } } } } });
        }
        if (statusName !== inboxValue) {
          const clearedIds = new Set(ids);
          if (track === 'notes') {
            triageState.data.notesCards = triageState.data.notesCards.filter((c) => !clearedIds.has(c.id));
          } else {
            triageState.data.tasksCards = triageState.data.tasksCards.filter((c) => !clearedIds.has(c.id));
          }
          triageState.pinnedIds = triageState.pinnedIds.filter((id) => !clearedIds.has(id));
        }
        finishBulkAction(`${ids.length} updated`);
      } catch (err) {
        console.error('Bulk Status failed', err);
        showTriageToast(err.message || 'Could not set Status for all selected — try again.');
      }
    });
  }

  // Archives every selected card in the current track — same reversible
  // archive (`archived: true`) as the single swipe-delete, batched. Prior
  // state for each card is captured before the writes go out so undo can
  // restore the whole batch; the removedBatch/applyUndo plumbing is the
  // exact same one Refresh and single delete already share, just with more
  // than one card in it. Sequential writes (not Promise.all), matching
  // every other bulk action here, to respect Notion's rate limit. Unlike
  // the other bulk actions, Delete has no options to pick — it has no
  // popover and fires directly off the button tap.
  function applyBulkDelete() {
    return withBusy(async () => {
      const track = triageState.track;
      const ids = [...triageState.selected];
      if (!ids.length) return;
      const allCards = track === 'notes' ? triageState.data.notesCards : triageState.data.tasksCards;
      const cardsById = new Map(allCards.map((c) => [c.id, c]));
      const cards = ids.map((id) => cardsById.get(id)).filter(Boolean);
      if (!cards.length) return;
      try {
        for (const card of cards) {
          // eslint-disable-next-line no-await-in-loop
          await notionRequest(`/v1/pages/${card.id}`, { method: 'PATCH', body: { archived: true } });
        }
        const deletedIds = new Set(cards.map((c) => c.id));
        if (track === 'notes') {
          triageState.data.notesCards = triageState.data.notesCards.filter((c) => !deletedIds.has(c.id));
        } else {
          triageState.data.tasksCards = triageState.data.tasksCards.filter((c) => !deletedIds.has(c.id));
        }
        triageState.pinnedIds = triageState.pinnedIds.filter((id) => !deletedIds.has(id));
        triageState.removedBatch = { kind: 'delete', track, cards };
        triageState.selected = new Set();
        triageState.bulkPopover = null;
        triageState.popoverQuery = '';
        showUndoSnackbar(`${cards.length} deleted`);
        refreshInboxCount();
      } catch (err) {
        console.error('Bulk delete failed', err);
        showTriageToast(err.message || 'Could not delete all selected — try again.');
      }
    });
  }

  function handleBulkPopoverSelect(value, isCreate) {
    const key = triageState.bulkPopover;
    if (!key) return;
    if (key === 'tag') return isCreate ? applyBulkNewTag(value) : applyBulkTag(value);
    if (key === 'project') return applyBulkProject(value);
    if (key === 'status') return applyBulkStatus(value);
  }

  const triageState = {
    track: 'notes', openBin: null, openBinMeta: null, pinnedIds: [],
    data: null, loading: false, error: null,
    popover: null, popoverQuery: '', toast: null, busy: false,
    snackbar: null, removedBatch: null, justClearedCount: null,
    selecting: false, selected: new Set(), bulkPopover: null,
    swipedCardId: null, scrollToOpenedBin: false,
  };
  let triageContainer = null;

  // A popover always renders at "left: 0" relative to its trigger's wrap.
  // For a trigger sitting far enough right (the 2nd/3rd bulk button, or a
  // right-side chip like Due/Status), the fixed-width popover can extend
  // past .tg-view's edge — which clips it invisibly, since .tg-view has
  // overflow: hidden. Shift it left just enough to stay in bounds (and
  // re-clamp so that shift doesn't itself push it past the left edge).
  // Bounds against the popover's OWN .tg-view ancestor, not just "the
  // first one in the document" — the desktop layout can have two .tg-view
  // panes on screen at once (overview + opened bin).
  function adjustPopoverPosition() {
    if (!triageContainer) return;
    const popEl = triageContainer.querySelector('.tg-popover');
    if (!popEl) return;
    const viewEl = popEl.closest('.tg-view');
    if (!viewEl) return;
    popEl.style.left = '0px';
    const margin = 8;
    const popRect = popEl.getBoundingClientRect();
    const viewRect = viewEl.getBoundingClientRect();
    const naturalLeft = popRect.left;
    const maxLeft = viewRect.right - margin - popRect.width;
    const minLeft = viewRect.left + margin;
    // Clamp the popover's natural (left: 0) position into [minLeft, maxLeft]
    // in viewport coordinates, then convert that back into a CSS offset.
    const finalLeft = Math.max(minLeft, Math.min(naturalLeft, maxLeft));
    const shift = finalLeft - naturalLeft;
    if (shift) popEl.style.left = `${shift}px`;
  }

  // Every interaction (opening a popover, picking a value, toggling a
  // checkbox...) re-renders by replacing #content's innerHTML wholesale,
  // which recreates the scrollable card stack (and #content itself) as
  // fresh DOM nodes starting at scrollTop 0 — from the user's view, tapping
  // any pill snapped the list back to the top. Save + restore both
  // potentially-scrolled containers around the replace; this runs
  // synchronously before the browser paints, so there's no visible jump.
  //
  // Both panes (overview + opened bin) are always rendered into the DOM
  // together, wrapped in .tg-layout: on mobile, CSS shows only the one
  // named by data-active-pane — tap a bin to swap the list for its cards,
  // "‹ Bins" to swap back, exactly like the original single-screen design.
  // At the desktop breakpoint, CSS shows both together instead, stacked in
  // one column (chip row on top, bin content below). The JS/state model is
  // identical either way — only which pane(s) are visible, and how much
  // room the chip row gets, differs by viewport width.
  function paintTriage() {
    if (!triageContainer) return;
    const prevStack = triageContainer.querySelector('.tg-stack');
    const stackScrollTop = prevStack ? prevStack.scrollTop : 0;
    const containerScrollTop = triageContainer.scrollTop;
    const scrollToOpenedBin = triageState.scrollToOpenedBin;
    triageState.scrollToOpenedBin = false;

    if (triageState.loading) {
      triageContainer.innerHTML = `<div class="tg-view"><div class="tg-status">Loading Triage…</div></div>`;
      return;
    }
    if (triageState.error) {
      triageContainer.innerHTML = `<div class="tg-view"><div class="tg-status tg-status--error">${escapeHtml(triageState.error)}<br><button type="button" class="tg-btn-refresh" data-retry style="cursor:pointer;opacity:1;margin-top:10px;">Retry</button></div></div>`;
      return;
    }

    const isBinOpen = triageState.openBin !== null && !!triageState.openBinMeta;
    const overviewHtml = renderOverview(triageState.data);
    const binHtml = isBinOpen ? renderBinScreen(triageState.data) : renderBinEmptyState();

    triageContainer.innerHTML = `
      <div class="tg-view">
        <div class="tg-layout" data-active-pane="${isBinOpen ? 'bin' : 'overview'}">
          <div class="tg-pane tg-pane-overview">${overviewHtml}</div>
          <div class="tg-pane tg-pane-bin">${binHtml}</div>
        </div>
      </div>
    `;

    if (!scrollToOpenedBin) {
      triageContainer.scrollTop = containerScrollTop;
      const newStack = triageContainer.querySelector('.tg-stack');
      if (newStack) newStack.scrollTop = stackScrollTop;
    }

    // Re-assert one frame later too — on touch devices a tap can leave
    // native momentum/rubber-band scrolling still in flight, which can
    // override the synchronous set above before the next paint. Cheap and
    // a no-op when nothing was still in motion.
    requestAnimationFrame(() => {
      if (scrollToOpenedBin) {
        const binHead = triageContainer.querySelector('.tg-bin-head');
        if (binHead) binHead.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } else {
        triageContainer.scrollTop = containerScrollTop;
        const stackNow = triageContainer.querySelector('.tg-stack');
        if (stackNow) stackNow.scrollTop = stackScrollTop;
      }
      adjustPopoverPosition();
    });
  }

  async function loadAndPaintTriage() {
    triageState.loading = true;
    triageState.error = null;
    paintTriage();
    try {
      triageState.data = await loadTriageData();
    } catch (err) {
      console.error('Failed to load Triage data', err);
      triageState.error = err.message || 'Could not load Triage data — check the Worker.';
    } finally {
      triageState.loading = false;
      paintTriage();
    }
  }

  function mountTriage(container) {
    triageContainer = container;
    triageState.track = 'notes';
    triageState.openBin = null;
    triageState.openBinMeta = null;
    triageState.pinnedIds = [];
    triageState.popover = null;
    triageState.popoverQuery = '';
    triageState.toast = null;
    triageState.busy = false;
    triageState.snackbar = null;
    triageState.removedBatch = null;
    triageState.justClearedCount = null;
    clearTimeout(snackbarTimer);
    triageState.selecting = false;
    triageState.selected = new Set();
    triageState.bulkPopover = null;
    loadAndPaintTriage();
  }

  // --- Swipe-to-delete (notes) ------------------------------------------
  // A drag on `.tg-card-swipeable` translates the card directly via an
  // inline style for a smooth 1:1 follow — no re-render mid-drag. Only the
  // FINAL open/closed outcome is committed to state
  // (triageState.swipedCardId) and painted once, which is what lets the
  // revealed state survive an unrelated repaint elsewhere (editing a
  // different card, a toast timing out, ...) without extra bookkeeping.
  // Pointer events (not separate touch/mouse handling) so this works the
  // same via touch or mouse-drag.
  const SWIPE_OPEN_PX = 84;
  let swipeDrag = null;

  content.addEventListener('pointerdown', (e) => {
    if (currentRoute() !== 'inbox') return;
    // Select mode has its own tap-to-check interaction (and its own future
    // bulk delete) — swipe-to-delete is only for the normal sorting flow.
    if (triageState.selecting) return;
    // Resolved at the WRAP level (covers both the card and its trash
    // button) so a press on the now-revealed trash button of the
    // currently-open card counts as "still this card," not "elsewhere" —
    // otherwise this would close the swipe out from under the trash
    // button before its own click ever gets a chance to land.
    const rawWrapEl = e.target.closest('.tg-swipe-wrap');
    const targetCardId = rawWrapEl ? rawWrapEl.dataset.swipeCard : null;
    const pressedCard = e.target.closest('.tg-card-swipeable');

    // Starting a press anywhere other than the currently-open card closes
    // it first — via a direct class removal, NOT paintTriage(). A full
    // repaint here would replace #content wholesale, including whatever
    // element was just pressed (e.g. the Back button); Chromium silently
    // drops the click that would otherwise follow pointerup when its own
    // mousedown target got removed from the document first. Closing this
    // way touches only the previously-open card, so nothing else's click
    // ever gets suppressed.
    if (triageState.swipedCardId && triageState.swipedCardId !== targetCardId) {
      const openWrapEl = content.querySelector(`.tg-swipe-wrap[data-swipe-card="${CSS.escape(triageState.swipedCardId)}"]`);
      const openCardEl = openWrapEl && openWrapEl.querySelector('.tg-card-swipeable');
      if (openCardEl) openCardEl.classList.remove('swiped');
      triageState.swipedCardId = null;
    }

    // Only actually start a drag when the press landed on the card itself
    // (not the trash button, not empty space).
    if (!targetCardId || !pressedCard) { swipeDrag = null; return; }
    const wrapEl = content.querySelector(`.tg-swipe-wrap[data-swipe-card="${CSS.escape(targetCardId)}"]`);
    const cardEl = wrapEl && wrapEl.querySelector('.tg-card-swipeable');
    if (!cardEl) { swipeDrag = null; return; }
    swipeDrag = { cardId: targetCardId, cardEl, startX: e.clientX, startY: e.clientY, dx: 0, dragging: false };
  });

  content.addEventListener('pointermove', (e) => {
    if (!swipeDrag) return;
    const dx = e.clientX - swipeDrag.startX;
    const dy = e.clientY - swipeDrag.startY;
    if (!swipeDrag.dragging) {
      // Wait for a clearly horizontal gesture before committing — a real
      // hand rarely swipes on a perfectly flat line, so bailing out (or
      // committing) the instant either axis first crosses a small
      // threshold made this misfire on ordinary vertical wobble at the
      // start of an intended swipe. Instead keep re-checking every move:
      // once dx has genuinely pulled ahead of dy, treat it as a swipe;
      // until then, do nothing and let an actual vertical scroll (if
      // that's what it turns out to be) proceed untouched, since
      // preventDefault is never called on a non-dragging move.
      if (Math.abs(dx) < 10 || Math.abs(dx) < Math.abs(dy)) return;
      swipeDrag.dragging = true;
      swipeDrag.cardEl.classList.add('dragging');
      // Once this is confirmed as a real drag (not a tap), capture the
      // pointer to the card so every subsequent move/up for it is routed
      // straight to this element regardless of what's visually underneath
      // the cursor. Without this, a drag starting over the card's own text
      // could end up with its pointerup silently lost/misrouted, leaving
      // the card stuck mid-drag — capture is the standard fix for exactly
      // that class of unreliability in custom pointer-driven gestures.
      swipeDrag.cardEl.setPointerCapture(e.pointerId);
    }
    // Once this is confirmed as a horizontal drag, stop the browser's own
    // default handling of the move (e.g. a mouse drag starting a native
    // text selection over the card's body text) from fighting the
    // transform below.
    e.preventDefault();
    swipeDrag.dx = dx;
    const base = triageState.swipedCardId === swipeDrag.cardId ? -SWIPE_OPEN_PX : 0;
    const translate = Math.max(-SWIPE_OPEN_PX, Math.min(0, base + dx));
    swipeDrag.cardEl.style.transform = `translateX(${translate}px)`;
  });

  function endSwipeDrag() {
    if (!swipeDrag) return;
    const { cardEl, cardId, dragging, dx } = swipeDrag;
    cardEl.classList.remove('dragging');
    if (dragging) {
      const base = triageState.swipedCardId === cardId ? -SWIPE_OPEN_PX : 0;
      const finalTranslate = Math.max(-SWIPE_OPEN_PX, Math.min(0, base + dx));
      cardEl.style.transform = '';
      triageState.swipedCardId = finalTranslate < -SWIPE_OPEN_PX / 2 ? cardId : null;
      paintTriage();
    }
    swipeDrag = null;
  }
  content.addEventListener('pointerup', endSwipeDrag);
  content.addEventListener('pointercancel', endSwipeDrag);

  // A trackpad two-finger horizontal swipe never fires pointerdown/move/up
  // at all — it's a `wheel` event stream (deltaX/deltaY), so the drag
  // logic above never engages for it no matter how correct it is. Wheel
  // gestures also have no explicit "end" event the way a pointer drag has
  // pointerup: a swipe is just a burst of wheel events that stops, so the
  // end of the gesture is detected by a short pause with no further
  // horizontal delta, via a debounce timer.
  const WHEEL_GESTURE_END_MS = 150;
  let wheelSwipe = null;

  function endWheelSwipe() {
    if (!wheelSwipe) return;
    const { cardEl, cardId, dx } = wheelSwipe;
    cardEl.classList.remove('dragging');
    const base = triageState.swipedCardId === cardId ? -SWIPE_OPEN_PX : 0;
    const finalTranslate = Math.max(-SWIPE_OPEN_PX, Math.min(0, base + dx));
    cardEl.style.transform = '';
    triageState.swipedCardId = finalTranslate < -SWIPE_OPEN_PX / 2 ? cardId : null;
    paintTriage();
    wheelSwipe = null;
  }

  content.addEventListener('wheel', (e) => {
    if (currentRoute() !== 'inbox') return;
    if (triageState.selecting) return;
    const wrapEl = e.target.closest('.tg-swipe-wrap');
    const cardId = wrapEl ? wrapEl.dataset.swipeCard : null;
    if (!wheelSwipe && !cardId) return;

    // Not yet tracking a gesture on this element: only take over once the
    // scroll is clearly horizontal-dominant, so ordinary vertical list
    // scrolling over a card (the common case) passes through untouched.
    if (!wheelSwipe) {
      if (Math.abs(e.deltaX) <= Math.abs(e.deltaY)) return;
      const cardEl = wrapEl.querySelector('.tg-card-swipeable');
      if (!cardEl) return;
      if (triageState.swipedCardId && triageState.swipedCardId !== cardId) {
        const openWrapEl = content.querySelector(`.tg-swipe-wrap[data-swipe-card="${CSS.escape(triageState.swipedCardId)}"]`);
        const openCardEl = openWrapEl && openWrapEl.querySelector('.tg-card-swipeable');
        if (openCardEl) openCardEl.classList.remove('swiped');
        triageState.swipedCardId = null;
      }
      cardEl.classList.add('dragging');
      wheelSwipe = { cardId, cardEl, dx: 0, timer: null };
    }

    e.preventDefault();
    clearTimeout(wheelSwipe.timer);
    // Natural (default) trackpad scrolling reports a positive deltaX when
    // fingers move left, matching the deltaX-increases-scrollLeft
    // convention — so a leftward swipe (deltaX > 0) should push the card
    // further toward its open (negative translateX) position.
    wheelSwipe.dx -= e.deltaX;
    const base = triageState.swipedCardId === wheelSwipe.cardId ? -SWIPE_OPEN_PX : 0;
    const translate = Math.max(-SWIPE_OPEN_PX, Math.min(0, base + wheelSwipe.dx));
    wheelSwipe.cardEl.style.transform = `translateX(${translate}px)`;
    wheelSwipe.timer = setTimeout(endWheelSwipe, WHEEL_GESTURE_END_MS);
  }, { passive: false });

  // Event delegation for Triage interactions — attached once to #content.
  content.addEventListener('click', (e) => {
    if (currentRoute() !== 'inbox') return;

    // A chip/ghost that opens (or closes, if already open) a popover.
    const chipTrigger = e.target.closest('[data-chip-action]');
    if (chipTrigger) {
      e.stopPropagation();
      if (triageState.busy) return;
      const cardId = chipTrigger.dataset.cardId;
      const field = chipTrigger.dataset.chipAction;
      if (popoverOpenFor(cardId, field)) {
        triageState.popover = null;
      } else {
        triageState.popover = { cardId, field };
        triageState.popoverQuery = '';
      }
      paintTriage();
      return;
    }

    // Notes and Tasks both open in-app now (#/note/{id}, #/task/{id});
    // every other future entity still opens its full Notion URL in a new
    // tab until its profile exists. Resolved by card id at click time
    // rather than embedding a target in the markup, so each track's
    // target can keep evolving independently without touching the markup
    // that triggers it.
    const openRecordBtn = e.target.closest('[data-open-record]');
    if (openRecordBtn) {
      e.stopPropagation();
      const cardId = openRecordBtn.dataset.openRecord;
      if (triageState.track === 'notes') {
        location.hash = `#/note/${cardId}`;
        return;
      }
      if (triageState.track === 'tasks') {
        location.hash = `#/task/${cardId}`;
        return;
      }
      return;
    }

    // The trash affordance revealed by swiping a note card left.
    const deleteBtn = e.target.closest('[data-delete-card]');
    if (deleteBtn) {
      e.stopPropagation();
      if (triageState.busy) return;
      applyNoteDelete(deleteBtn.dataset.deleteCard);
      return;
    }

    // The × on an individual assigned-tag pill inside the tag popover.
    const removeTagBtn = e.target.closest('[data-pop-remove-tag]');
    if (removeTagBtn) {
      e.stopPropagation();
      if (triageState.busy || !triageState.popover) return;
      applyNoteRemoveTag(triageState.popover.cardId, removeTagBtn.dataset.popRemoveTag);
      return;
    }

    // An option row inside an open popover — a bulk popover if one is
    // open, else a per-card one (the two are mutually exclusive).
    const popOpt = e.target.closest('[data-pop-value]');
    if (popOpt) {
      e.stopPropagation();
      if (triageState.busy) return;
      if (triageState.bulkPopover) {
        handleBulkPopoverSelect(popOpt.dataset.popValue, popOpt.dataset.popCreate === 'true');
      } else {
        handlePopoverSelect(popOpt.dataset.popValue, popOpt.dataset.popCreate === 'true', popOpt.dataset.popClear === 'true');
      }
      return;
    }

    // Clicking inside the popover but not on an option (e.g. the filter
    // input) shouldn't dismiss it.
    if (e.target.closest('.tg-popover')) { e.stopPropagation(); return; }

    const trackBtn = e.target.closest('[data-track]');
    if (trackBtn) {
      triageState.track = trackBtn.dataset.track;
      triageState.popover = null;
      triageState.bulkPopover = null;
      paintTriage();
      return;
    }

    const binEl = e.target.closest('[data-bin-key]');
    if (binEl) { triageState.track = binEl.dataset.binTrack; openBin(binEl.dataset.binKey); return; }

    const back = e.target.closest('[data-back]');
    if (back) {
      triageState.openBin = null;
      triageState.openBinMeta = null;
      triageState.popover = null;
      triageState.selecting = false;
      triageState.selected = new Set();
      triageState.bulkPopover = null;
      triageState.swipedCardId = null;
      paintTriage();
      return;
    }

    const retry = e.target.closest('[data-retry]');
    if (retry) { loadAndPaintTriage(); return; }

    const refreshBtn = e.target.closest('[data-refresh]');
    if (refreshBtn) { if (!triageState.busy) applyRefresh(); return; }

    const undoBtn = e.target.closest('[data-undo]');
    if (undoBtn) { if (!triageState.busy) applyUndo(); return; }

    const toggleSelect = e.target.closest('[data-toggle-select]');
    if (toggleSelect) {
      triageState.selecting = !triageState.selecting;
      triageState.selected = new Set();
      triageState.bulkPopover = null;
      triageState.popover = null;
      triageState.swipedCardId = null;
      paintTriage();
      return;
    }

    const selectCard = e.target.closest('[data-select-card]');
    if (selectCard) {
      e.stopPropagation();
      const id = selectCard.dataset.selectCard;
      if (triageState.selected.has(id)) triageState.selected.delete(id); else triageState.selected.add(id);
      paintTriage();
      return;
    }

    const bulkTrigger = e.target.closest('[data-bulk-action]');
    if (bulkTrigger) {
      e.stopPropagation();
      if (triageState.busy || triageState.selected.size === 0) return;
      const key = bulkTrigger.dataset.bulkAction;
      // Delete has no options to choose — it has no popover, unlike every
      // other bulk action, and fires directly off the tap (relying on the
      // undo snackbar as its safety net, same as Refresh and single delete).
      if (key === 'delete') { applyBulkDelete(); return; }
      triageState.bulkPopover = triageState.bulkPopover === key ? null : key;
      triageState.popover = null;
      triageState.popoverQuery = '';
      paintTriage();
      return;
    }

    // Click anywhere else on the screen dismisses an open popover — the
    // "full-card backdrop" from the build spec, without a dedicated overlay
    // element since popovers already re-render fresh on every paint.
    if (triageState.popover || triageState.bulkPopover) {
      triageState.popover = null;
      triageState.bulkPopover = null;
      paintTriage();
    }
  });

  // Typing in a tag/project filter input updates only the matches/create
  // row next to it (`.tg-pop-dynamic`), not the whole screen — a full
  // paintTriage() here would destroy and recreate the <input> on every
  // keystroke, and a fast typist could out-run the refocus, dropping
  // characters. Leaving the input's own DOM node untouched means focus
  // and caret position never move.
  content.addEventListener('input', (e) => {
    if (currentRoute() !== 'inbox') return;
    if (!e.target.matches('[data-pop-filter]')) return;
    triageState.popoverQuery = e.target.value;
    const dynamicEl = triageContainer && triageContainer.querySelector('.tg-pop-dynamic');
    if (!dynamicEl) return;
    if (triageState.bulkPopover === 'tag') dynamicEl.innerHTML = renderBulkTagPopoverDynamic();
    else if (triageState.bulkPopover === 'project') dynamicEl.innerHTML = renderBulkProjectPopoverDynamic();
    else if (triageState.popover && triageState.popover.field === 'tag') {
      const card = triageState.data.notesCards.find((c) => c.id === triageState.popover.cardId);
      if (card) dynamicEl.innerHTML = renderTagPopoverDynamic(card);
    } else if (triageState.popover && triageState.popover.field === 'project') {
      const card = triageState.data.tasksCards.find((c) => c.id === triageState.popover.cardId);
      if (card) dynamicEl.innerHTML = renderProjectPopoverDynamic(card);
    }
  });

  // The native date input in the Due/Date popover ("Pick a date…") —
  // per-card only (Due on tasks, Date on notes); bulk has no date action.
  content.addEventListener('change', (e) => {
    if (currentRoute() !== 'inbox') return;
    if (!e.target.matches('[data-pop-date-input]') || !e.target.value) return;
    if (triageState.popover && triageState.popover.field === 'date') {
      applyNoteDate(triageState.popover.cardId, e.target.value);
    } else if (triageState.popover) {
      applyTaskDue(triageState.popover.cardId, e.target.value);
    }
  });

  // --- Entity profiles — read/navigate-only foundation slice ---------------
  // Every #/{entity}/{id} route lands here. Note and Task are wired for
  // real against Notion; Tag/Collection/Person share the tabbed
  // relation-list profile below (see "Relation-list profiles"); Project and
  // Domain are still minimal placeholders. This slice writes nothing —
  // editing pills/tabs attach next slice.
  const ENTITY_ROUTES = ['note', 'task', 'project', 'domain', 'person', 'tag', 'collection'];
  const ENTITY_LABELS = { note: 'Note', task: 'Task', project: 'Project', domain: 'Domain', person: 'Person', tag: 'Tag', collection: 'Collection' };
  // Routes with a real profile (vs. still a "coming soon" stub) get the
  // top-aligned .profile content treatment instead of the stub's centered
  // placeholder look — see .shell-content.profile.
  const REAL_PROFILE_ROUTES = ['note', 'task', 'tag', 'collection', 'person'];

  function renderEntityStub(entityName) {
    const label = ENTITY_LABELS[entityName] || entityName;
    return `<div class="placeholder"><div class="placeholder-title">${escapeHtml(label)} profile — coming soon</div></div>`;
  }

  // A page's timestamp fields (created_time/last_edited_time) are absolute
  // instants (they carry a real UTC offset, unlike the date-only Date
  // field elsewhere in this file) — safe to hand straight to `new Date()`
  // and read back in local time, unlike formatDateShort's manual parsing.
  function formatDateTime(iso) {
    const d = new Date(iso);
    const MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    const h12 = ((d.getHours() + 11) % 12) + 1;
    const ampm = d.getHours() < 12 ? 'AM' : 'PM';
    const mins = String(d.getMinutes()).padStart(2, '0');
    return `${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} · ${h12}:${mins} ${ampm}`;
  }

  // Relation properties only carry ids — resolve each linked page's title
  // individually rather than querying the whole target database, since a
  // single profile only ever needs the handful of records it actually
  // links to. A relation pointing at a since-archived/deleted page fails
  // softly (dropped from the list) instead of breaking the whole profile.
  async function resolveRelationNames(databaseId, ids) {
    if (!ids.length) return [];
    const titleProp = await titlePropertyName(databaseId);
    const pages = await Promise.all(ids.map(async (id) => {
      try { return await notionRequest(`/v1/pages/${id}`); } catch (err) { console.error('Failed to resolve relation page', id, err); return null; }
    }));
    return pages.filter(Boolean).map((p) => ({ id: p.id, name: plainTitle(p, titleProp) })).filter((p) => p.name);
  }

  // A task's Domain isn't its own field — it only exists via its Project's
  // own Domain relation (never a task-level rollup), so resolving a task's
  // project(s) and its domain is one combined lookup: fetch the linked
  // project page(s), then read the FIRST one's own Domain relation.
  async function resolveTaskProjectAndDomain(projectIds) {
    if (!projectIds.length) return { projects: [], domainId: null };
    const [projectTitleProp, projectsDomainsProp] = await Promise.all([
      titlePropertyName(CONFIG.DB.PROJECTS),
      relationPropertyName(CONFIG.DB.PROJECTS, CONFIG.DB.DOMAINS),
    ]);
    const pages = await Promise.all(projectIds.map(async (id) => {
      try { return await notionRequest(`/v1/pages/${id}`); } catch (err) { console.error('Failed to resolve project page', id, err); return null; }
    }));
    const resolvedPages = pages.filter(Boolean);
    const projects = resolvedPages.map((p) => ({ id: p.id, name: plainTitle(p, projectTitleProp) })).filter((p) => p.name);
    const firstProjectPage = resolvedPages[0] || null;
    let domainId = null;
    if (firstProjectPage) {
      const domRel = (firstProjectPage.properties[projectsDomainsProp] || {}).relation || [];
      domainId = domRel[0] ? domRel[0].id : null;
    }
    return { projects, domainId };
  }

  async function loadNoteProfile(pageId) {
    const page = await notionRequest(`/v1/pages/${pageId}`);

    const [
      notesTitleProp, notesStatusSchema, notesDomainProp, notesUniqueIdProp,
      notesProjectsProp, notesPeopleProp, notesTagsProp, notesCollectionsProp, notesResourcesProp,
    ] = await Promise.all([
      titlePropertyName(CONFIG.DB.NOTES),
      getStatusSchema(CONFIG.DB.NOTES),
      getNotesDomainProp(CONFIG.DB.NOTES),
      uniqueIdPropertyName(CONFIG.DB.NOTES),
      relationPropertyName(CONFIG.DB.NOTES, CONFIG.DB.PROJECTS),
      relationPropertyName(CONFIG.DB.NOTES, CONFIG.DB.PEOPLE),
      relationPropertyName(CONFIG.DB.NOTES, CONFIG.DB.TAGS),
      relationPropertyName(CONFIG.DB.NOTES, CONFIG.DB.COLLECTIONS),
      relationPropertyName(CONFIG.DB.NOTES, CONFIG.DB.RESOURCES),
    ]);

    const title = plainTitle(page, notesTitleProp);
    const statusProp = page.properties[notesStatusSchema.name];
    const statusName = (statusProp && statusProp.status && statusProp.status.name) || null;
    const types = ((page.properties[CONFIG.NOTES_PROP.TYPE] || {}).multi_select || []).map((o) => o.name);
    const date = (page.properties[CONFIG.NOTES_PROP.DATE] || {}).date || null;

    // "{prefix}-{number}" e.g. "NOTE-247" — both halves read live off the
    // property value itself, never hardcoded (the prefix is whatever the
    // Notion database's unique_id property is actually configured with).
    // formatUniqueId guarantees the joining hyphen is the plain ASCII one
    // Notion's own URL slug and ID search require, never a smart-typography
    // substitute (see its own comment).
    const uniqueIdVal = notesUniqueIdProp ? (page.properties[notesUniqueIdProp] || {}).unique_id : null;
    const uniqueId = uniqueIdVal ? formatUniqueId(uniqueIdVal.prefix, uniqueIdVal.number) : null;

    // Same either-relation-or-select handling as Triage's note cards (see
    // getNotesDomainProp above) — resolved structurally, never assumed.
    let domainId = null;
    let domainName = null;
    if (notesDomainProp) {
      const propVal = page.properties[notesDomainProp.name];
      if (notesDomainProp.type === 'relation') {
        const relIds = (propVal && propVal.relation) || [];
        domainId = relIds[0] ? relIds[0].id : null;
      } else {
        const sel = propVal && propVal.select;
        domainName = sel ? sel.name : null;
      }
    }

    const projectIds = ((page.properties[notesProjectsProp] || {}).relation || []).map((r) => r.id);
    const peopleIds = ((page.properties[notesPeopleProp] || {}).relation || []).map((r) => r.id);
    const tagIds = ((page.properties[notesTagsProp] || {}).relation || []).map((r) => r.id);
    const collectionIds = ((page.properties[notesCollectionsProp] || {}).relation || []).map((r) => r.id);
    const resourceIds = ((page.properties[notesResourcesProp] || {}).relation || []).map((r) => r.id);

    const [
      projects, people, tags, collections, resources, domainRel, body,
      projectsIcon, peopleIcon, tagsIcon, collectionsIcon, resourcesIcon, domainsIcon,
    ] = await Promise.all([
      resolveRelationNames(CONFIG.DB.PROJECTS, projectIds),
      resolveRelationNames(CONFIG.DB.PEOPLE, peopleIds),
      resolveRelationNames(CONFIG.DB.TAGS, tagIds),
      resolveRelationNames(CONFIG.DB.COLLECTIONS, collectionIds),
      resolveRelationNames(CONFIG.DB.RESOURCES, resourceIds),
      domainId ? resolveRelationNames(CONFIG.DB.DOMAINS, [domainId]) : Promise.resolve([]),
      fetchPageBodyText(pageId),
      // One shared icon per relation-pill category — the database's own
      // icon, memoized via getSchema, same pattern loadTriageData uses.
      getDatabaseIcon(CONFIG.DB.PROJECTS),
      getDatabaseIcon(CONFIG.DB.PEOPLE),
      getDatabaseIcon(CONFIG.DB.TAGS),
      getDatabaseIcon(CONFIG.DB.COLLECTIONS),
      getDatabaseIcon(CONFIG.DB.RESOURCES),
      getDatabaseIcon(CONFIG.DB.DOMAINS),
    ]);
    if (domainRel.length) domainName = domainRel[0].name;

    return {
      id: page.id, title, uniqueId, statusName, types, date,
      domainId, domainName,
      projects, people, tags, collections, resources,
      icons: { projects: projectsIcon, people: peopleIcon, tags: tagsIcon, collections: collectionsIcon, resources: resourcesIcon, domains: domainsIcon },
      body,
      createdTime: page.created_time,
      lastEditedTime: page.last_edited_time,
    };
  }

  // A relation pill's LABEL is the only navigable hit area this slice — the
  // caret renders (so the two-hit-area shape is already in place for next
  // slice's picker) but has no handler yet. Domain is the only category
  // that ever carries a styleAttr (its earth tone); everything else stays
  // plain olive-on-sage via .pf-pill's own default. `caret: false` opts a
  // pill out of the caret entirely (not just inert) — Task's Domain pill,
  // whose value is read-only always (a rollup through its project, never
  // directly editable), is the one deliberate use of this.
  function renderRelPill({ label, icon, navId, navRoute, styleAttr, caret = true }) {
    const styleAttrHtml = styleAttr ? ` style="${styleAttr}"` : '';
    if (!navId || !navRoute) {
      return `<span class="pf-pill"${styleAttrHtml}>${icon || ''}${escapeHtml(label)}</span>`;
    }
    const caretHtml = caret ? '<span class="pf-pill-caret" aria-hidden="true">⌄</span>' : '';
    return `<span class="pf-pill pf-pill--rel"${styleAttrHtml}><span class="pf-pill-label" data-pf-nav="${navRoute}/${escapeHtml(navId)}">${icon || ''}${escapeHtml(label)}</span>${caretHtml}</span>`;
  }

  function renderValuePill(innerHtml) {
    return `<span class="pf-pill pf-pill--value">${innerHtml}</span>`;
  }

  // The labeled empty-slot pill for a relation field with nothing linked
  // yet — read-side only, no tap action (see .pf-pill--ghost).
  function renderGhostPill(fieldLabel) {
    return `<span class="pf-pill pf-pill--ghost">+ ${escapeHtml(fieldLabel)}</span>`;
  }

  function renderNoteProfile(n) {
    // pageId in DOMAIN_META is stored dashless (copied from a Notion URL);
    // the Notion API always returns relation ids WITH dashes — normalizeDbId
    // (already used the same way for database-id matching elsewhere in this
    // file) strips both sides down to the same shape before comparing, so a
    // real Domain reliably resolves to its earth tone instead of silently
    // falling back to the neutral "no domain" grey.
    const domainMeta = n.domainId
      ? (DOMAIN_META.find((d) => normalizeDbId(d.pageId) === normalizeDbId(n.domainId)) || NO_DOMAIN_META)
      : (n.domainName ? (DOMAIN_META.find((d) => d.code === n.domainName) || NO_DOMAIN_META) : null);
    // All six relation fields always show a pill — populated ones as solid,
    // navigable pills; empty ones as a labeled ghost slot (read-side only,
    // no add action yet) — so the field frame reads complete either way.
    const domainPillHtml = n.domainName
      ? renderRelPill({
          label: n.domainName, icon: renderChipIcon(n.icons.domains),
          navId: n.domainId, navRoute: 'domain',
          styleAttr: domainMeta ? `background:${domainMeta.fill};color:${domainMeta.text};` : '',
        })
      : renderGhostPill('Domain');
    const projectsHtml = n.projects.length
      ? n.projects.map((p) => renderRelPill({ label: p.name, icon: renderChipIcon(n.icons.projects), navId: p.id, navRoute: 'project' })).join('')
      : renderGhostPill('Project');
    const peopleHtml = n.people.length
      ? n.people.map((p) => renderRelPill({ label: p.name, icon: renderChipIcon(n.icons.people), navId: p.id, navRoute: 'person' })).join('')
      : renderGhostPill('Person');
    const tagsHtml = n.tags.length
      ? n.tags.map((t) => renderRelPill({ label: t.name, icon: renderChipIcon(n.icons.tags), navId: t.id, navRoute: 'tag' })).join('')
      : renderGhostPill('Tag');
    const collectionsHtml = n.collections.length
      ? n.collections.map((c) => renderRelPill({ label: c.name, icon: renderChipIcon(n.icons.collections), navId: c.id, navRoute: 'collection' })).join('')
      : renderGhostPill('Collection');
    // Resources has no #/resource/{id} route in this foundation slice (not
    // part of the seven shared routes) — populated pills render without a
    // navigable label until that route exists.
    const resourcesHtml = n.resources.length
      ? n.resources.map((r) => renderRelPill({ label: r.name, icon: renderChipIcon(n.icons.resources) })).join('')
      : renderGhostPill('Resource');
    const relPillsHtml = domainPillHtml + projectsHtml + peopleHtml + tagsHtml + collectionsHtml + resourcesHtml;

    // Date dropped from the pill row — it lives in the meta grid only now,
    // so it isn't shown twice.
    const typeHtml = n.types.length
      ? n.types.map((t) => {
          const { icon, name } = splitTrailingEmoji(t);
          return renderValuePill(`${icon ? `<span class="pf-pill-icon">${escapeHtml(icon)}</span>` : ''}${escapeHtml(name)}`);
        }).join('')
      : renderValuePill('No type');
    const statusHtml = renderValuePill(n.statusName ? escapeHtml(n.statusName) : 'No status');
    const valuePillsHtml = typeHtml + statusHtml;
    const dividerHtml = relPillsHtml ? '<span class="pf-pill-divider"></span>' : '';

    const metaHtml = `<div class="pf-meta-grid">
      <div class="pf-meta-col">
        <div class="pf-meta-label">Date</div>
        <div class="pf-meta-value pf-meta-value--date"><span class="pf-meta-date-icon">🗓</span>${n.date && n.date.start ? escapeHtml(formatDateShort(n.date.start)) : '—'}</div>
      </div>
      <div class="pf-meta-col">
        <div class="pf-meta-label">Created</div>
        <div class="pf-meta-value pf-meta-value--muted">${escapeHtml(formatDateTime(n.createdTime))}</div>
        <div class="pf-meta-label">Last edited</div>
        <div class="pf-meta-value pf-meta-value--muted">${escapeHtml(formatDateTime(n.lastEditedTime))}</div>
      </div>
    </div>`;

    const bodyHtml = n.body ? `<div class="pf-body">${escapeHtml(n.body)}</div>` : `<div class="pf-body pf-body--empty">(empty)</div>`;

    // Notes are cross-cutting (many domains/projects can share one note),
    // so there's no structural parent to build a breadcrumb path from —
    // just the note's own unique-id handle ("NOTE-247"), read-only.
    const crumbHtml = `<div class="pf-crumb pf-crumb--id">${n.uniqueId ? escapeHtml(n.uniqueId) : '—'}</div>`;
    const heroHtml = `<div class="serif pf-hero">${escapeHtml(n.title || 'Untitled')}</div>`;

    return `<div class="pf-view">
      ${crumbHtml}
      ${heroHtml}
      <div class="pf-pillrow">${relPillsHtml}${dividerHtml}${valuePillsHtml}</div>
      ${metaHtml}
      ${bodyHtml}
    </div>`;
  }

  async function loadTaskProfile(pageId) {
    const page = await notionRequest(`/v1/pages/${pageId}`);

    const [
      tasksTitleProp, tasksStatusSchema, tasksUniqueIdProp, tasksPriorityProp,
      tasksProjectsProp, tasksPeopleProp,
    ] = await Promise.all([
      titlePropertyName(CONFIG.DB.TASKS),
      getStatusSchema(CONFIG.DB.TASKS),
      uniqueIdPropertyName(CONFIG.DB.TASKS),
      getTasksPriorityProp(CONFIG.DB.TASKS),
      relationPropertyName(CONFIG.DB.TASKS, CONFIG.DB.PROJECTS),
      relationPropertyName(CONFIG.DB.TASKS, CONFIG.DB.PEOPLE),
    ]);

    const title = plainTitle(page, tasksTitleProp);
    const statusProp = page.properties[tasksStatusSchema.name];
    const statusName = (statusProp && statusProp.status && statusProp.status.name) || null;
    const priorityProp = tasksPriorityProp ? page.properties[tasksPriorityProp] : null;
    const priorityName = (priorityProp && priorityProp.select && priorityProp.select.name) || null;
    const dueDate = (page.properties[CONFIG.TASKS_PROP.DUE_DATE] || {}).date || null;
    const doDate = (page.properties[CONFIG.TASKS_PROP.DO_DATE] || {}).date || null;

    const uniqueIdVal = tasksUniqueIdProp ? (page.properties[tasksUniqueIdProp] || {}).unique_id : null;
    const uniqueId = uniqueIdVal ? formatUniqueId(uniqueIdVal.prefix, uniqueIdVal.number) : null;

    const projectIds = ((page.properties[tasksProjectsProp] || {}).relation || []).map((r) => r.id);
    const peopleIds = ((page.properties[tasksPeopleProp] || {}).relation || []).map((r) => r.id);

    // Sequential: domain resolution depends on which project(s) resolve
    // first (see resolveTaskProjectAndDomain), so it can't join the
    // Promise.all below until that's known.
    const projectResolution = await resolveTaskProjectAndDomain(projectIds);

    const [people, body, projectsIcon, peopleIcon, domainsIcon, domainRel] = await Promise.all([
      resolveRelationNames(CONFIG.DB.PEOPLE, peopleIds),
      fetchPageBodyText(pageId),
      getDatabaseIcon(CONFIG.DB.PROJECTS),
      getDatabaseIcon(CONFIG.DB.PEOPLE),
      getDatabaseIcon(CONFIG.DB.DOMAINS),
      projectResolution.domainId ? resolveRelationNames(CONFIG.DB.DOMAINS, [projectResolution.domainId]) : Promise.resolve([]),
    ]);
    const domainName = domainRel.length ? domainRel[0].name : null;

    return {
      id: page.id, title, uniqueId, statusName, priorityName, dueDate, doDate,
      domainId: projectResolution.domainId, domainName,
      projects: projectResolution.projects, people,
