  async function mountTaskProfile(id) {
    taskProfileState.id = id;
    taskProfileState.loading = true;
    taskProfileState.error = null;
    taskProfileState.data = null;
    ensureFramedShell();
    paintTaskProfile();
    try {
      const data = await loadTaskProfile(id);
      if (taskProfileState.id !== id) return; // route moved on while this was in flight
      taskProfileState.data = data;
    } catch (err) {
      console.error('Failed to load task profile', err);
      if (taskProfileState.id !== id) return;
      taskProfileState.error = err.message || 'Could not load this task — check the Worker.';
    } finally {
      if (taskProfileState.id === id) {
        taskProfileState.loading = false;
        paintTaskProfile();
      }
    }
  }

  // --- Relation-list profiles (Tag, Collection, Person) — read/navigate
  // only, no writes to Notion. Conventions.md's "Tabbed relation-lists"
  // pattern: one shared component — flat ID handle, serif name hero, a tab
  // row (one tab per referencing database), and the active tab's list of
  // dense bordered rows. Reuses the note/task profiles' schema-resolution
  // helpers (relationPropertyName, titlePropertyName, uniqueIdPropertyName,
  // DOMAIN_META) rather than re-deriving any of it.
  //
  // REL_DB_META is the shared registry of every database that can appear as
  // a tab across the three consumers — keyed by tab key, not by consumer,
  // since the same databases repeat across tag/collection/person's tab
  // sets. `route` is the entity route its rows navigate to; Resources has
  // none yet (same foundation-slice gap as the Note profile's Resources
  // pills), so its rows render without a navigable label.
  const REL_DB_META = {
    notes:       { label: 'Notes',       dbId: CONFIG.DB.NOTES,       route: 'note' },
    tasks:       { label: 'Tasks',       dbId: CONFIG.DB.TASKS,       route: 'task' },
    projects:    { label: 'Projects',    dbId: CONFIG.DB.PROJECTS,    route: 'project' },
    people:      { label: 'People',      dbId: CONFIG.DB.PEOPLE,      route: 'person' },
    tags:        { label: 'Tags',        dbId: CONFIG.DB.TAGS,        route: 'tag' },
    collections: { label: 'Collections', dbId: CONFIG.DB.COLLECTIONS, route: 'collection' },
    resources:   { label: 'Resources',   dbId: CONFIG.DB.RESOURCES,   route: null },
    // Added for the Domain profile's reference shelf (Domain-Profile-Build-
    // Brief §5.5). Routines has no drill-through profile yet, same gap as
    // Resources. Sessions is registered for completeness (schema/label) but
    // is never queried this slice — no session data flows until the logging
    // Shortcut exists.
    routines:    { label: 'Routines',    dbId: CONFIG.DB.ROUTINES,    route: null },
    sessions:    { label: 'Sessions',    dbId: CONFIG.DB.SESSIONS,    route: null },
  };

  // Per RenitaOS-Conventions.md's "Tabbed relation-lists" — the tab set and
  // order for each consumer. First entry is always the default/active tab
  // (Notes, in every set). Tasks appears only on Person; Tags/Collections
  // carry no Tasks tab (tasks are "for" people, never tags/collections).
  const RELATION_TAB_SETS = {
    tag: ['notes', 'projects', 'people', 'collections', 'resources'],
    collection: ['notes', 'people', 'tags', 'projects', 'resources'],
    person: ['notes', 'tasks', 'projects', 'collections', 'tags'],
  };

  const RELATION_PROFILE_CONSUMERS = {
    tag: { dbId: CONFIG.DB.TAGS, label: 'Tag' },
    collection: { dbId: CONFIG.DB.COLLECTIONS, label: 'Collection' },
    person: { dbId: CONFIG.DB.PEOPLE, label: 'Person' },
  };

  // A row's domain chip is resolved structurally, same as the Note/Task
  // profiles: Notes carries its own Domain (relation-or-select, see
  // getNotesDomainProp); Projects carries a direct Domain relation; a Task
  // has no Domain field of its own, so it's read via its first Project's
  // Domain (resolveTaskProjectAndDomain, already used by the Task profile).
  // Every other referencing database (People/Tags/Collections/Resources)
  // has no Domain to resolve — returns null, and the row renders title + ID
  // only, per spec.
  async function resolveRowDomainChip(tabKey, page) {
    if (tabKey === 'notes') {
      const domainProp = await getNotesDomainProp(CONFIG.DB.NOTES);
      if (!domainProp) return null;
      const propVal = page.properties[domainProp.name];
      if (domainProp.type === 'relation') {
        const relIds = (propVal && propVal.relation) || [];
        const domainId = relIds[0] ? relIds[0].id : null;
        if (!domainId) return null;
        const meta = DOMAIN_META.find((d) => normalizeDbId(d.pageId) === normalizeDbId(domainId));
        return meta ? { label: meta.code, fill: meta.fill, text: meta.text } : null;
      }
      const selName = propVal && propVal.select && propVal.select.name;
      if (!selName) return null;
      const meta = DOMAIN_META.find((d) => d.code === selName);
      return meta
        ? { label: meta.code, fill: meta.fill, text: meta.text }
        : { label: selName, fill: NO_DOMAIN_META.fill, text: NO_DOMAIN_META.text };
    }
    if (tabKey === 'projects') {
      const domainRelProp = await relationPropertyName(CONFIG.DB.PROJECTS, CONFIG.DB.DOMAINS);
      const relIds = (page.properties[domainRelProp] || {}).relation || [];
      const domainId = relIds[0] ? relIds[0].id : null;
      if (!domainId) return null;
      const meta = DOMAIN_META.find((d) => normalizeDbId(d.pageId) === normalizeDbId(domainId));
      return meta ? { label: meta.code, fill: meta.fill, text: meta.text } : null;
    }
    if (tabKey === 'tasks') {
      const tasksProjectsProp = await relationPropertyName(CONFIG.DB.TASKS, CONFIG.DB.PROJECTS);
      const projectIds = ((page.properties[tasksProjectsProp] || {}).relation || []).map((r) => r.id);
      const { domainId } = await resolveTaskProjectAndDomain(projectIds);
      if (!domainId) return null;
      const meta = DOMAIN_META.find((d) => normalizeDbId(d.pageId) === normalizeDbId(domainId));
      return meta ? { label: meta.code, fill: meta.fill, text: meta.text } : null;
    }
    return null;
  }

  // Minimal-payload count query for a not-yet-hydrated tab — trims each
  // result to the referencing database's title property (filter_properties
  // takes property IDs, not names) since only `results.length` is needed.
  // Still pages through has_more so the count is accurate past one page.
  async function queryTabCount(meta, relProp, pageId) {
    const titleProp = await titlePropertyName(meta.dbId);
    const db = await getSchema(meta.dbId);
    const titlePropId = db.properties[titleProp] && db.properties[titleProp].id;
    const pages = await queryAllPages(
      meta.dbId,
      { property: relProp, relation: { contains: pageId } },
      titlePropId ? [titlePropId] : undefined
    );
    return pages.length;
  }

  // Full record fetch for the default tab (eager) or a tab being opened for
  // the first time (lazy) — one query, doubling as both the row data and
  // that tab's authoritative count.
  async function queryTabRecords(tabKey, meta, relProp, pageId) {
    const pages = await queryAllPages(meta.dbId, { property: relProp, relation: { contains: pageId } });
    const [titleProp, uniqueIdProp] = await Promise.all([
      titlePropertyName(meta.dbId),
      uniqueIdPropertyName(meta.dbId),
    ]);
    return Promise.all(pages.map(async (p) => {
      const title = plainTitle(p, titleProp);
      const uniqueIdVal = uniqueIdProp ? (p.properties[uniqueIdProp] || {}).unique_id : null;
      const uniqueId = uniqueIdVal ? formatUniqueId(uniqueIdVal.prefix, uniqueIdVal.number) : null;
      const domainChip = await resolveRowDomainChip(tabKey, p);
      const row = { id: p.id, title, uniqueId, domainChip, route: meta.route };
      // Notes-tab-only: carries its Types along for the by-Type grouping
      // below — read straight off the page object already fetched above
      // (CONFIG.NOTES_PROP.TYPE, same non-relation property name the Note
      // profile itself reads), no extra request.
      if (tabKey === 'notes') {
        row.types = ((p.properties[CONFIG.NOTES_PROP.TYPE] || {}).multi_select || []).map((o) => o.name);
      }
      return row;
    }));
  }

  // Same ordering source Inbox's own bins use (groupNotes above, via
  // loadTriageData's typeOptions) — the Notes database's live Type-option
  // order, resolved through the shared getMultiSelectOptions/getSchema
  // cache. Not a new query in practice: queryTabRecords already triggers a
  // Notes-schema fetch for titlePropertyName/uniqueIdPropertyName, and
  // getSchema's cache is keyed by database id and shared by every caller
  // (schemaCache.set stores the in-flight promise itself, so concurrent
  // callers join it rather than firing a second request) — this just reads
  // from that same fetch.
  async function getNotesTypeOrder() {
    const options = await getMultiSelectOptions(CONFIG.DB.NOTES, CONFIG.NOTES_PROP.TYPE);
    return options.map((o) => o.name);
  }

  // Groups the Notes tab's already-fetched records by Type — display only.
  // A multi-Type note is pushed into EVERY one of its Type groups —
  // intentional double-count, unlike Inbox's bins which file a multi-Type
  // note under its first Type only — which is why the tab's own count and
  // the sum of group counts can legitimately disagree (see the caption in
  // renderNotesTabGrouped). Reuses splitTrailingEmoji and the
  // NO_GROUP/"No Type" convention verbatim from Inbox's own note-type bins
  // (groupNotes above). Ordered by `typeOrder` (getNotesTypeOrder, above)
  // exactly as groupNotes orders Inbox's bins — the database's declared
  // Type order, "No Type" always last — so the Notes tab and Inbox present
  // types identically. Falls back to descending count only if typeOrder
  // wasn't available (shouldn't happen — it's always fetched alongside the
  // tab's records).
  function groupNotesByType(records, typeOrder) {
    const byType = new Map();
    records.forEach((r) => {
      const types = r.types && r.types.length ? r.types : [NO_GROUP];
      types.forEach((t) => {
        if (!byType.has(t)) byType.set(t, []);
        byType.get(t).push(r);
      });
    });
    let orderedKeys;
    if (typeOrder && typeOrder.length) {
      orderedKeys = typeOrder.filter((t) => byType.has(t));
      if (byType.has(NO_GROUP)) orderedKeys.push(NO_GROUP);
    } else {
      orderedKeys = Array.from(byType.keys()).sort((a, b) => byType.get(b).length - byType.get(a).length);
    }
    return orderedKeys.map((key) => {
      const { name, icon } = key === NO_GROUP ? { name: 'No Type', icon: '' } : splitTrailingEmoji(key);
      return { key, name, icon, records: byType.get(key) };
    });
  }

  // Loads the record's own header (ID handle + title) plus every tab: the
  // default (Notes) tab gets its full records eagerly (which also yields
  // its count for free); every other tab gets only its count. A referencing
  // database that turns out to have no relation property targeting this
  // consumer database (shouldn't happen given the fixed tab sets above, but
  // schemas drift) fails that one tab softly — 0, clickable, empty state —
  // rather than breaking the whole profile.
  async function loadRelationProfileBase(entityKey, pageId) {
    const consumer = RELATION_PROFILE_CONSUMERS[entityKey];
    // Collection's Type value pill (right-rail hierarchy pass) — resolved
    // by keyword, same principle as every other select property in this
    // file, never hardcoded. getSchema is memoized, so this piggybacks on
    // the same schema fetch titlePropertyName/uniqueIdPropertyName already
    // trigger below — no additional network round-trip. Tag/Person never
    // resolve this (no value pills, per spec), regardless of whether their
    // own databases happen to have a similarly-named property.
    const [page, titleProp, uniqueIdProp, typeProp] = await Promise.all([
      notionRequest(`/v1/pages/${pageId}`),
      titlePropertyName(consumer.dbId),
      uniqueIdPropertyName(consumer.dbId),
      entityKey === 'collection' ? getSelectPropByKeyword(consumer.dbId, 'type') : Promise.resolve(null),
    ]);
    const title = plainTitle(page, titleProp);
    const uniqueIdVal = uniqueIdProp ? (page.properties[uniqueIdProp] || {}).unique_id : null;
    const uniqueId = uniqueIdVal ? formatUniqueId(uniqueIdVal.prefix, uniqueIdVal.number) : null;
    const typeName = typeProp ? (((page.properties[typeProp] || {}).select || {}).name || null) : null;

    const tabKeys = RELATION_TAB_SETS[entityKey];
    const tabs = await Promise.all(tabKeys.map(async (tabKey, idx) => {
      const meta = REL_DB_META[tabKey];
      let relProp = null;
      try {
        relProp = await relationPropertyName(meta.dbId, consumer.dbId);
      } catch (err) {
        console.error(`No relation on "${tabKey}" targeting ${entityKey}`, err);
        return { key: tabKey, label: meta.label, route: meta.route, relProp: null, unavailable: true, count: 0, records: [], typeOrder: null, hydrated: true, loading: false, error: null };
      }
      if (idx === 0) {
        const [records, typeOrder] = await Promise.all([
          queryTabRecords(tabKey, meta, relProp, pageId),
          tabKey === 'notes' ? getNotesTypeOrder() : Promise.resolve(null),
        ]);
        return { key: tabKey, label: meta.label, route: meta.route, relProp, unavailable: false, count: records.length, records, typeOrder, hydrated: true, loading: false, error: null };
      }
      const count = await queryTabCount(meta, relProp, pageId);
      return { key: tabKey, label: meta.label, route: meta.route, relProp, unavailable: false, count, records: null, typeOrder: null, hydrated: false, loading: false, error: null };
    }));

    // created_time/last_edited_time were already sitting on the fetched
    // page object — surfaced here (no new query) for the framed shell's
    // right-rail Log section, which this trio didn't have before.
    return {
      id: page.id, title, uniqueId, consumerLabel: consumer.label, tabs,
      typeName, hasTypeProp: !!typeProp,
      createdTime: page.created_time, lastEditedTime: page.last_edited_time,
    };
  }

  function renderRelationRow(r) {
    const navAttr = r.route ? ` data-pf-nav="${r.route}/${escapeHtml(r.id)}"` : '';
    const domainChipHtml = r.domainChip
      ? `<span class="pf-row-domain" style="background:${r.domainChip.fill};color:${r.domainChip.text};">${escapeHtml(r.domainChip.label)}</span>`
      : '';
    return `<div class="pf-row${r.route ? ' pf-row--nav' : ''}"${navAttr}>
      <div class="pf-row-main">
        <span class="pf-row-title">${escapeHtml(r.title || 'Untitled')}</span>
        <span class="pf-row-id">${r.uniqueId ? escapeHtml(r.uniqueId) : '—'}</span>
      </div>
      ${domainChipHtml}
    </div>`;
  }

  // Notes-tab-only subheader treatment: emoji + name (Inbox's own
  // bin-chip presentation, via splitTrailingEmoji) + a count in the same
  // sans "tg-count-mono" numeric-data treatment Inbox's chips/counts use
  // everywhere else. Rows underneath are untouched — renderRelationRow,
  // same as the flat-list tabs.
  function renderNotesTabGrouped(records, typeOrder) {
    const groups = groupNotesByType(records, typeOrder);
    const captionHtml = `<div class="pf-notes-caption">${records.length} note${records.length === 1 ? '' : 's'} · counted under each type</div>`;
    const groupsHtml = groups.map((g) => `
      <div class="pf-note-group">
        <div class="pf-note-group-head">
          <span class="pf-note-group-label">${g.icon ? `${escapeHtml(g.icon)} ` : ''}${escapeHtml(g.name)}</span>
          <span class="pf-note-group-n tg-count-mono">${g.records.length}</span>
        </div>
        <div class="pf-row-list">${g.records.map(renderRelationRow).join('')}</div>
      </div>
    `).join('');
    return `${captionHtml}${groupsHtml}`;
  }

  function renderRelationTabPanel(tab, consumerLabel) {
    const countHtml = `<div class="pf-tab-panel-count">${escapeHtml(tab.label)}<span class="pf-tab-n">${tab.count}</span></div>`;
    let bodyHtml;
    if (tab.loading) {
      bodyHtml = `<div class="tg-status">Loading…</div>`;
    } else if (tab.error) {
      bodyHtml = `<div class="tg-status tg-status--error">${escapeHtml(tab.error)}</div>`;
    } else if (!tab.records || !tab.records.length) {
      bodyHtml = `<div class="pf-tab-empty">No ${escapeHtml(tab.label.toLowerCase())} reference this ${escapeHtml(consumerLabel.toLowerCase())} yet.</div>`;
    } else if (tab.key === 'notes') {
      bodyHtml = renderNotesTabGrouped(tab.records, tab.typeOrder);
    } else {
      bodyHtml = `<div class="pf-row-list">${tab.records.map(renderRelationRow).join('')}</div>`;
    }
    return `<div class="pf-tab-panel">${countHtml}${bodyHtml}</div>`;
  }

  function renderRelationHeader(d) {
    return `<div class="dmn-head">
      <div class="dmn-idline"><span class="dmn-crumb-id">${d.uniqueId ? escapeHtml(d.uniqueId) : '—'}</span></div>
      <div class="dmn-title-row"><h1 class="dmn-title">${escapeHtml(d.title || 'Untitled')}</h1></div>
    </div>`;
  }

  // Right-rail hierarchy pass — the only value pill any of this trio ever
  // carries is Collection's Type (resolved in loadRelationProfileBase by
  // keyword; Tag/Person never resolve it, per spec, regardless of their own
  // schema). Omitted entirely — not even a "No type" fallback — when the
  // Collections database doesn't have a Type property at all, vs. shown
  // with the usual fallback when the property exists but this page's value
  // doesn't.
  function renderRelationValuePills(d) {
    if (!d.hasTypeProp) return '';
    return renderValuePill(d.typeName ? escapeHtml(d.typeName) : 'No type');
  }

  // No Dates section for this trio — none of the three currently resolve
  // a meaningful user-facing date (loaders are unchanged this sprint).
  // Properties is relations-only and only present when there's something
  // to show — "sparse rails are fine," per the brief, "the frame already
  // handles this on Domain" — so this trio's own Properties stays empty
  // until a relation-style field is added for one of them.
  function renderRelationProperties() {
    return '';
  }

  function renderRelationLog(d) {
    return `<section class="dmn-prop-sec dmn-prop-sec--log">
      <h3>Log</h3>
      <div class="dmn-kv"><span class="k">Created</span><span class="v">${escapeHtml(formatDateTime(d.createdTime))}</span></div>
      <div class="dmn-kv"><span class="k">Last edited</span><span class="v">${escapeHtml(formatDateTime(d.lastEditedTime))}</span></div>
    </section>`;
  }

  const relationProfileState = { entityKey: null, id: null, loading: false, error: null, data: null, activeTab: null };

  function paintRelationProfile() {
    const s = relationProfileState;
    if (s.loading) {
      dmnMain.innerHTML = `<div class="dmn-status">Loading…</div>`;
      dmnProps.innerHTML = renderCaptureAffordance();
      return;
    }
    if (s.error) {
      dmnMain.innerHTML = `<div class="dmn-status dmn-status--error">${escapeHtml(s.error)}</div>`;
      dmnProps.innerHTML = renderCaptureAffordance();
      return;
    }
    const d = s.data;
    // All tabs always render, even at 0 — per the Conventions.md's "Empty
    // tabs are shown greyed with a 0, never hidden" rule (here: plain, not
    // greyed-and-disabled, since 0-count tabs stay fully clickable).
    const tabsHtml = `<div class="pf-tabs" role="tablist">${d.tabs.map((t) => `
        <button type="button" class="pf-tab${t.key === s.activeTab ? ' pf-tab--active' : ''}" data-pf-tab="${t.key}" role="tab" aria-selected="${t.key === s.activeTab}">
          <span class="pf-tab-label">${escapeHtml(t.label)}</span>
          <span class="pf-tab-n">${t.count}</span>
        </button>`).join('')}</div>`;
    const activeTab = d.tabs.find((t) => t.key === s.activeTab) || d.tabs[0];
    const panelHtml = renderRelationTabPanel(activeTab, d.consumerLabel);

    dmnMain.innerHTML = `${renderRelationHeader(d)}${renderValuePillRow(renderRelationValuePills(d))}<section class="dmn-sec">${tabsHtml}${panelHtml}</section>`;
    dmnProps.innerHTML = `${renderCaptureAffordance()}${renderRelationProperties()}${renderRelationLog(d)}`;
  }

  async function mountRelationProfile(entityKey, id) {
    const s = relationProfileState;
    s.entityKey = entityKey;
    s.id = id;
    s.loading = true;
    s.error = null;
    s.data = null;
    s.activeTab = null;
    ensureFramedShell();
    paintRelationProfile();
    try {
      const data = await loadRelationProfileBase(entityKey, id);
      if (s.id !== id || s.entityKey !== entityKey) return; // route moved on while this was in flight
      s.data = data;
      s.activeTab = data.tabs.length ? data.tabs[0].key : null;
    } catch (err) {
      console.error('Failed to load relation profile', err);
      if (s.id !== id || s.entityKey !== entityKey) return;
      s.error = err.message || 'Could not load this record — check the Worker.';
    } finally {
      if (s.id === id && s.entityKey === entityKey) {
        s.loading = false;
        paintRelationProfile();
      }
    }
  }

  // Switching tabs is instant for an already-hydrated tab (just repaints);
  // a not-yet-opened tab shows its own "Loading…" in place while its full
  // record list is fetched, then caches so re-opening it never re-fetches.
  // A tab already known to be empty (count 0 from the eager pass) skips the
  // network round-trip entirely — there's nothing a full query would find.
  async function onRelationTabClick(tabKey) {
    const s = relationProfileState;
    if (!s.data) return;
    const entityKey = s.entityKey;
    const id = s.id;
    s.activeTab = tabKey;
    paintRelationProfile();
    const tab = s.data.tabs.find((t) => t.key === tabKey);
    if (!tab || tab.hydrated || tab.loading || tab.unavailable) return;
    if (tab.count === 0) {
      tab.records = [];
      tab.hydrated = true;
      paintRelationProfile();
      return;
    }
    tab.loading = true;
    paintRelationProfile();
    try {
      const [records, typeOrder] = await Promise.all([
        queryTabRecords(tab.key, REL_DB_META[tab.key], tab.relProp, id),
        tab.key === 'notes' ? getNotesTypeOrder() : Promise.resolve(null),
      ]);
      if (s.entityKey !== entityKey || s.id !== id) return;
      tab.records = records;
      tab.typeOrder = typeOrder;
      tab.count = records.length;
      tab.hydrated = true;
    } catch (err) {
      console.error('Failed to load relation tab', tabKey, err);
      if (s.entityKey !== entityKey || s.id !== id) return;
      tab.error = err.message || 'Could not load this list.';
    } finally {
      tab.loading = false;
      if (s.entityKey === entityKey && s.id === id && s.activeTab === tabKey) paintRelationProfile();
    }
  }

  // --- Project profile — read/navigate only, no writes to Notion. ----------
  // Two tabs only (Tasks default, Notes), unlike the tag/collection/person
  // trio's five-tab set above — so this doesn't reuse
  // RELATION_TAB_SETS/loadRelationProfileBase wholesale. The Notes tab's
  // shape (dense rows grouped by Type) is identical to every other profile's
  // Notes tab, so it reuses REL_DB_META.notes + queryTabRecords/queryTabCount/
  // getNotesTypeOrder/renderRelationTabPanel outright. Tasks needs its own
  // fetch (Status + Due Date per row) and its own status-grouped card
  // render, so that half is bespoke.

  // Generic keyword resolvers, same principle as getTasksPriorityProp above
  // (type match first, keyword second — never a hardcoded emoji-prefixed
  // name) but not specific to one database, since Projects carries its own
  // Priority/date/rollup properties under different exact names.
  async function getSelectPropByKeyword(databaseId, keyword) {
    const db = await getSchema(databaseId);
    const target = normalizePropKeyword(keyword);
    const entry = Object.entries(db.properties).find(
      ([name, prop]) => prop.type === 'select' && normalizePropKeyword(name).includes(target)
    );
    return entry ? entry[0] : null;
  }
  // Returns null (never throws) when the schema doesn't have this date yet —
  // Date Archived/Date Paused are pending schema additions per the build
  // spec, and every other date field should degrade the same way rather
  // than special-casing those two.
  async function getDatePropByKeyword(databaseId, keyword) {
    const db = await getSchema(databaseId);
    const target = normalizePropKeyword(keyword);
    const entry = Object.entries(db.properties).find(
      ([name, prop]) => prop.type === 'date' && normalizePropKeyword(name).includes(target)
    );
    return entry ? entry[0] : null;
  }
  async function getRollupPropByKeyword(databaseId, keyword) {
    const db = await getSchema(databaseId);
    const target = normalizePropKeyword(keyword);
    const entry = Object.entries(db.properties).find(
      ([name, prop]) => prop.type === 'rollup' && normalizePropKeyword(name).includes(target)
    );
    return entry ? entry[0] : null;
  }

  // A rollup's value can come back shaped as a single aggregated number (the
  // expected case for both Progress and No of Tasks) or, if the rollup is
  // configured to surface the original property instead of aggregating it,
  // as an array — array.length is the best-effort fallback for a count in
  // that shape. Anything else (unset property, no rollup at all) is null,
  // never a guessed 0, so the summary line can tell "no data" apart from
  // "zero tasks".
  function readRollupNumber(page, propName) {
    if (!propName) return null;
    const prop = page.properties[propName];
    if (!prop || !prop.rollup) return null;
    const r = prop.rollup;
    if (r.type === 'number') return r.number;
    if (r.type === 'array' && Array.isArray(r.array)) return r.array.length;
    return null;
  }

  // Priority displays as stars per RenitaOS-Conventions.md, mapped from the
  // High/Med/Low keyword in the live option's own string (never a hardcoded
  // exact match, since the real value is likely emoji-suffixed like Tasks'
  // Priority). Falls back to the plain label when the keyword doesn't
  // resolve, rather than guessing a star count.
  function priorityStarCount(priorityName) {
    const n = (priorityName || '').toLowerCase();
    if (n.includes('high')) return 3;
    if (n.includes('med')) return 2;
    if (n.includes('low')) return 1;
    return null;
  }
  function renderPriorityValue(priorityName) {
    const count = priorityStarCount(priorityName);
    if (count == null) return escapeHtml(priorityName || 'No priority');
    return `<span class="pf-priority-stars" aria-label="${escapeHtml(priorityName)}">${'★'.repeat(count)}${'☆'.repeat(3 - count)}</span>`;
  }

  // Status precedence for the meta grid's one contextual date row — stop at
  // first match, driven by the Status VALUE (not the separate "Archived"
  // operational flag, which stays off-profile this phase per the ghost/
  // flag rule). Date Archived/Date Paused are read whenever that property
  // exists, regardless of whether Notion has a live "Archived" status value
  // yet — this just never matches until it does, per "treat a missing
  // property as simply absent."
  // Fix 7 (Appendix A) — Archived is its own checkbox, never a Status
  // value (Project Status is Not Started/In Progress/Paused/Done only —
  // there is no "Archived" status string), so `p.statusName === 'archived'`
  // could never match; archiving an already-Done project kept showing
  // Date Completed forever, even though Date Archived was correctly
  // written in Notion. Precedence now checks the Archived checkbox first,
  // matching Addendum-2's Archived -> Done -> Paused -> hidden order, and
  // re-picks fresh on every render since it reads live state, not a
  // cached selection — no write changes, display-only.
  function projectContextualDateRow(p) {
    // Date Completed is user-editable (a catch-up day just means tapping
    // it) — Date Archived/Date Paused are auto-stamped by the status
    // transition only (§8), never hand-edited, so those two stay read-only
    // even in this contextual slot.
    if (p.archivedChecked) return { label: 'Date Archived', date: p.archivedDate, editable: false };
    const s = (p.statusName || '').toLowerCase();
    if (s === 'done') return { label: 'Date Completed', date: p.completedDate, editable: true, field: 'completed' };
    if (s === 'paused') return { label: 'Date Paused', date: p.pausedDate, editable: false };
    return null;
  }

  // Archived/Focus (§ Step D) are both plain checkboxes on the Projects DB
  // — resolved by keyword first (Archived, Focus), falling back to "the
  // other checkbox that isn't Archived" for Focus so a workspace that
  // still has the old "Priority?" name (pre-rename, per the Worksheet)
  // keeps working without a hardcoded property name.
  async function getProjectCheckboxProps(databaseId) {
    const db = await getSchema(databaseId);
    const checkboxes = Object.entries(db.properties).filter(([, prop]) => prop.type === 'checkbox').map(([name]) => name);
    const archived = checkboxes.find((n) => n.toLowerCase().includes('archived')) || null;
    const focus = checkboxes.find((n) => n !== archived && n.toLowerCase().includes('focus'))
      || checkboxes.find((n) => n !== archived) || null;
    return { archived, focus };
  }
  function plainRichText(page, propName) {
    if (!propName) return '';
    const arr = (page.properties[propName] || {}).rich_text || [];
    return arr.map((t) => t.plain_text).join('');
  }

  async function loadProjectProfile(pageId) {
    const page = await notionRequest(`/v1/pages/${pageId}`);

    const [
      projTitleProp, projStatusSchema, projUniqueIdProp,
      projDomainProp, projPeopleProp, projCollectionsProp, projPriorityProp,
      startDateProp, deadlineProp, completedDateProp, archivedDateProp, pausedDateProp,
      progressProp, noOfTasksProp, doneCountProp,
      tasksProjectsProp, notesProjectsProp,
      domainsIcon, peopleIcon, collectionsIcon,
      checkboxProps, pauseDetailsProp,
    ] = await Promise.all([
      titlePropertyName(CONFIG.DB.PROJECTS),
      getStatusSchema(CONFIG.DB.PROJECTS),
      uniqueIdPropertyName(CONFIG.DB.PROJECTS),
      relationPropertyName(CONFIG.DB.PROJECTS, CONFIG.DB.DOMAINS),
      relationPropertyName(CONFIG.DB.PROJECTS, CONFIG.DB.PEOPLE),
      relationPropertyName(CONFIG.DB.PROJECTS, CONFIG.DB.COLLECTIONS),
      getSelectPropByKeyword(CONFIG.DB.PROJECTS, 'priority'),
      getDatePropByKeyword(CONFIG.DB.PROJECTS, 'start'),
      getDatePropByKeyword(CONFIG.DB.PROJECTS, 'deadline'),
      getDatePropByKeyword(CONFIG.DB.PROJECTS, 'completed'),
      getDatePropByKeyword(CONFIG.DB.PROJECTS, 'archived'),
      getDatePropByKeyword(CONFIG.DB.PROJECTS, 'paused'),
      getRollupPropByKeyword(CONFIG.DB.PROJECTS, 'progress'),
      getRollupPropByKeyword(CONFIG.DB.PROJECTS, 'tasks'),
      // Framed-Layout Retrofit §4 — read the completed-count rollup
      // directly for "N of M done" instead of reconstructing N via
      // round(percent × total); same rollup the Domain profile already
      // resolves for its own per-project cards. Degrades to the
      // reconstruction below if the schema doesn't have it.
      getRollupPropByKeyword(CONFIG.DB.PROJECTS, 'done'),
      relationPropertyName(CONFIG.DB.TASKS, CONFIG.DB.PROJECTS),
      relationPropertyName(CONFIG.DB.NOTES, CONFIG.DB.PROJECTS),
      getDatabaseIcon(CONFIG.DB.DOMAINS),
      getDatabaseIcon(CONFIG.DB.PEOPLE),
      getDatabaseIcon(CONFIG.DB.COLLECTIONS),
      getProjectCheckboxProps(CONFIG.DB.PROJECTS),
      getTextPropByKeyword(CONFIG.DB.PROJECTS, 'pause'),
    ]);
    const priorityOptions = await getSelectOptions(CONFIG.DB.PROJECTS, projPriorityProp);

    const title = plainTitle(page, projTitleProp);
    const statusProp = page.properties[projStatusSchema.name];
    const statusName = (statusProp && statusProp.status && statusProp.status.name) || null;
    const priorityName = projPriorityProp ? (((page.properties[projPriorityProp] || {}).select || {}).name || null) : null;

    const uniqueIdVal = projUniqueIdProp ? (page.properties[projUniqueIdProp] || {}).unique_id : null;
    const uniqueId = uniqueIdVal ? formatUniqueId(uniqueIdVal.prefix, uniqueIdVal.number) : null;

    const startDate = startDateProp ? (page.properties[startDateProp] || {}).date : null;
    const deadline = deadlineProp ? (page.properties[deadlineProp] || {}).date : null;
    const completedDate = completedDateProp ? (page.properties[completedDateProp] || {}).date : null;
    const archivedDate = archivedDateProp ? (page.properties[archivedDateProp] || {}).date : null;
    const pausedDate = pausedDateProp ? (page.properties[pausedDateProp] || {}).date : null;

    const archivedChecked = checkboxProps.archived ? !!(page.properties[checkboxProps.archived] || {}).checkbox : false;
    const focusChecked = checkboxProps.focus ? !!(page.properties[checkboxProps.focus] || {}).checkbox : false;
    const pauseDetailsText = plainRichText(page, pauseDetailsProp);

    const domainIds = ((page.properties[projDomainProp] || {}).relation || []).map((r) => r.id);
    const peopleIds = ((page.properties[projPeopleProp] || {}).relation || []).map((r) => r.id);
    const collectionIds = ((page.properties[projCollectionsProp] || {}).relation || []).map((r) => r.id);

    const [domainRel, people, collections] = await Promise.all([
      domainIds.length ? resolveRelationNames(CONFIG.DB.DOMAINS, [domainIds[0]]) : Promise.resolve([]),
      resolveRelationNames(CONFIG.DB.PEOPLE, peopleIds),
      resolveRelationNames(CONFIG.DB.COLLECTIONS, collectionIds),
    ]);
    const domainId = domainIds[0] || null;
    const domainName = domainRel.length ? domainRel[0].name : null;

    // Progress is read as whichever of a 0..1 fraction or an already-scaled
    // 0..100 percent the live rollup happens to return (normalizing >1 down
    // rather than guessing which). "N of M done" reads doneCountProp
    // directly when the schema has it; falls back to reconstructing N via
    // round(percent × total) only when that rollup is absent.
    const progressRaw = readRollupNumber(page, progressProp);
    const totalTasksRaw = readRollupNumber(page, noOfTasksProp);
    const doneRaw = readRollupNumber(page, doneCountProp);
    const progressFraction = typeof progressRaw === 'number' ? (progressRaw > 1 ? progressRaw / 100 : progressRaw) : null;
    const totalTasks = typeof totalTasksRaw === 'number' ? totalTasksRaw : null;
    const doneTasks = typeof doneRaw === 'number'
      ? doneRaw
      : ((progressFraction != null && totalTasks != null) ? Math.round(progressFraction * totalTasks) : null);

    return {
      id: page.id, title, uniqueId, statusName, priorityName,
      startDate, deadline, completedDate, archivedDate, pausedDate,
      domainId, domainName, people, collections,
      icons: { domains: domainsIcon, people: peopleIcon, collections: collectionsIcon },
      progressFraction, totalTasks, doneTasks,
      tasksProjectsProp, notesProjectsProp,
      createdTime: page.created_time,
      lastEditedTime: page.last_edited_time,
      // Edit slice — resolved property names + live option lists/values.
      statusPropName: projStatusSchema.name, statusOptions: projStatusSchema.options,
      priorityPropName: projPriorityProp, priorityOptions,
      domainPropName: projDomainProp, peoplePropName: projPeopleProp, collectionsPropName: projCollectionsProp,
      startDatePropName: startDateProp, deadlinePropName: deadlineProp,
      completedDatePropName: completedDateProp, archivedDatePropName: archivedDateProp, pausedDatePropName: pausedDateProp,
      archivedPropName: checkboxProps.archived, focusPropName: checkboxProps.focus, archivedChecked, focusChecked,
      pauseDetailsPropName: pauseDetailsProp, pauseDetailsText,
    };
  }

  // Minimal-payload count query, mirroring queryTabCount above but against
  // Tasks' own Projects relation (never the project's inline relation array,
  // which truncates past 25 — every Tasks-tab query goes through the Tasks
  // database itself instead).
  async function queryProjectTaskCount(relProp, pageId) {
    const titleProp = await titlePropertyName(CONFIG.DB.TASKS);
    const db = await getSchema(CONFIG.DB.TASKS);
    const titlePropId = db.properties[titleProp] && db.properties[titleProp].id;
    const pages = await queryAllPages(
      CONFIG.DB.TASKS,
      { property: relProp, relation: { contains: pageId } },
      titlePropId ? [titlePropId] : undefined
    );
    return pages.length;
  }

  async function queryProjectTaskRecords(relProp, pageId, priorityProp, dueDateProp) {
    const pages = await queryAllPages(CONFIG.DB.TASKS, { property: relProp, relation: { contains: pageId } });
    const [titleProp, uniqueIdProp, statusSchema] = await Promise.all([
      titlePropertyName(CONFIG.DB.TASKS),
      uniqueIdPropertyName(CONFIG.DB.TASKS),
      getStatusSchema(CONFIG.DB.TASKS),
    ]);
    return pages.map((p) => {
      const taskTitle = plainTitle(p, titleProp);
      const uniqueIdVal = uniqueIdProp ? (p.properties[uniqueIdProp] || {}).unique_id : null;
      const uniqueId = uniqueIdVal ? formatUniqueId(uniqueIdVal.prefix, uniqueIdVal.number) : null;
      const statusProp = p.properties[statusSchema.name];
      const statusName = (statusProp && statusProp.status && statusProp.status.name) || null;
      const due = dueDateProp ? ((p.properties[dueDateProp] || {}).date || null) : null;
      // Inline Status+Priority pills (Step E) — Priority read alongside
      // Status so the card can offer both without a per-card fetch.
      const priorityProp2 = priorityProp ? p.properties[priorityProp] : null;
      const priorityName = (priorityProp2 && priorityProp2.select && priorityProp2.select.name) || null;
      return { id: p.id, title: taskTitle, uniqueId, statusName, priorityName, due };
    });
  }

  // In Progress/Not Started stay expanded per the system-wide status-collapse
  // convention; every other status (Done, Paused, or any future addition)
  // collapses behind a count header — this screen's spec explicitly calls
  // out "Done (and Paused if present) collapsed", and treating "anything
  // that isn't active" as the collapse rule covers that without hardcoding
  // just those two names.
  function isActiveTaskStatus(name) {
    const n = (name || '').toLowerCase();
    return n === 'in progress' || n === 'not started';
  }

  // Groups already-fetched task records by Status, ordered by the Tasks
  // database's own live Status-option order (schema order, same principle
  // as the Notes-by-Type ordering above) with active statuses first, then
  // everything else — so Paused naturally lands above Done whenever the
  // schema itself orders them that way (Inbox / Not Started / In Progress /
  // Paused / Done per the backend notes).
  function groupProjectTasksByStatus(records, statusOptions) {
    const byStatus = new Map();
    records.forEach((r) => {
      const key = r.statusName || 'No status';
      if (!byStatus.has(key)) byStatus.set(key, []);
      byStatus.get(key).push(r);
    });
    const schemaOrder = (statusOptions || []).map((o) => o.name);
    const seen = new Set();
    const ordered = [];
    schemaOrder.forEach((n) => { if (byStatus.has(n)) { ordered.push(n); seen.add(n); } });
    Array.from(byStatus.keys()).forEach((n) => { if (!seen.has(n)) ordered.push(n); });
    const active = ordered.filter(isActiveTaskStatus);
    const rest = ordered.filter((n) => !isActiveTaskStatus(n));
    return [...active, ...rest].map((name) => ({
      key: name, name, records: byStatus.get(name), collapsedDefault: !isActiveTaskStatus(name),
    }));
  }

  // Hybrid load: Tasks is the default tab, so it's fully hydrated on open
  // (also yielding its own count for free); Notes only gets its lightweight
  // count query up front and hydrates lazily on first open, exactly like
  // loadRelationProfileBase's non-default tabs above.
  async function loadProjectTabs(pageId, tasksProjectsProp, notesProjectsProp) {
    const [tasksPriorityProp, tasksDueDateProp] = await Promise.all([
      getTasksPriorityProp(CONFIG.DB.TASKS),
      getDatePropByKeyword(CONFIG.DB.TASKS, 'due date'),
    ]);
    const [tasksStatusSchema, tasksRecords, notesCount, priorityOptions] = await Promise.all([
      getStatusSchema(CONFIG.DB.TASKS),
      queryProjectTaskRecords(tasksProjectsProp, pageId, tasksPriorityProp, tasksDueDateProp),
      queryTabCount(REL_DB_META.notes, notesProjectsProp, pageId),
      getSelectOptions(CONFIG.DB.TASKS, tasksPriorityProp),
    ]);
    const tasksTab = {
      key: 'tasks', label: 'Tasks', count: tasksRecords.length,
      records: tasksRecords, statusOptions: tasksStatusSchema.options,
      priorityPropName: tasksPriorityProp, priorityOptions, dueDatePropName: tasksDueDateProp,
      hydrated: true, loading: false, error: null,
    };
    const notesTab = {
      key: 'notes', label: 'Notes', count: notesCount,
      records: null, typeOrder: null, hydrated: false, loading: false, error: null,
    };
    return [tasksTab, notesTab];
  }

  // Framed-Layout Retrofit §4 — the Tasks tab is now the same two-column
  // near-square card grid the Domain profile's Inbox/Admin uses
  // (.dmn-task-grid/.dmn-task), status-collapsed the same way Domain's own
  // work spine is (.dmn-status-hd/.dmn-collapser/.dmn-collapse-body) —
  // unlike Domain's loose tasks, Project's Tasks tab can include a Done
  // group, so its card needs the checked box state Domain's never did.
  // The checkbox is carved out of the card's own data-pf-nav click area
  // (Step E carry-over) — tapping it writes completion (Status=Done +
  // Completed=today, reversible) instead of navigating to the task.
  // ---- Mass-select (Step E carry-over) — Project's Tasks tab, and
  // Domain's Inbox/Admin tasks + work-spine project cards. Reuses Inbox's
  // own select-mode CSS/markup vocabulary (.tg-checkbox/.tg-bulk-bar/
  // .tg-bulk-actions/.tg-bulk-btn), under new data attributes since
  // framedRoot's click handler is a separate delegation scope from
  // Inbox's own #content one. Bulk writes are a plain sequential
  // for-await loop, same "throttled sequential" shape every Inbox bulk
  // action already uses — never Promise.all.
  function renderMassSelectToggle(scope, selecting) {
    return `<button type="button" class="tg-btn-select${selecting ? ' on' : ''}" data-pfe-toggle-select="${scope}">${selecting ? 'Done' : 'Select'}</button>`;
  }
  // Fix 10 (Appendix B) — selection is a card-level state, not a second
  // checkbox competing with the completion checkbox. In select mode the
  // whole card becomes the tap target (data-pfe-select-card lives on the
  // card's own root, ahead of data-pf-nav in the click-dispatch order, so
  // it wins) and a selected card gets a ring+shadow — the same "active"
  // treatment Inbox's own bin chips use — rather than a circular indicator.
  function cardSelectState(id, kind, selectedSet, selecting) {
    if (!selecting) return { attrs: '', cls: '' };
    return {
      attrs: ` data-pfe-select-card="${escapeHtml(id)}" data-pfe-select-kind="${kind}"`,
      cls: selectedSet.has(id) ? ' dmn-card--selected' : '',
    };
  }

  function renderProjectTaskCard(r, statusOptions, priorityOptions) {
    const isDone = (r.statusName || '').toLowerCase() === 'done';
    const s = projectProfileState;
    const sel = cardSelectState(r.id, 'project-task', s.selected, s.selecting);
    const checkboxAttrs = s.selecting ? '' : ` data-pfe-task-toggle="${escapeHtml(r.id)}" data-pfe-task-done="${isDone}"`;
    return `<div class="dmn-task${sel.cls}" data-pf-nav="task/${escapeHtml(r.id)}"${sel.attrs}>
      <div class="dmn-top"><span class="dmn-box${isDone ? ' dmn-box--checked' : ''}${s.selecting ? ' dmn-box--dim' : ''}"${checkboxAttrs} role="checkbox" aria-checked="${isDone}">${isDone ? '✓' : ''}</span><span class="dmn-tname">${escapeHtml(r.title || 'Untitled')}</span></div>
      ${renderPfeCardValuePills(r, statusOptions, priorityOptions)}
    </div>`;
  }

  function renderProjectStatusGroup(group, collapsedStatus, statusOptions, priorityOptions) {
    const gridHtml = `<div class="dmn-task-grid">${group.records.map((r) => renderProjectTaskCard(r, statusOptions, priorityOptions)).join('')}</div>`;
    if (!group.collapsedDefault) {
      return `<div class="dmn-status-hd">${escapeHtml(group.name)} <span class="dmn-ct">${group.records.length}</span></div>${gridHtml}`;
    }
    const collapsed = collapsedStatus.has(group.key);
    return `<button type="button" class="dmn-collapser" aria-expanded="${!collapsed}" data-pf-status-toggle="${escapeHtml(group.key)}">
        <svg class="dmn-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
        <span class="dmn-status-hd" style="margin:0">${escapeHtml(group.name)} <span class="dmn-ct">${group.records.length}</span></span>
      </button>
      <div class="dmn-collapse-body"${collapsed ? ' hidden' : ''}>${gridHtml}</div>`;
  }

  function renderProjectTasksTabPanel(tab, collapsedStatus) {
    const countHtml = `<div class="pf-tab-panel-count">${escapeHtml(tab.label)}<span class="pf-tab-n">${tab.count}</span></div>`;
    if (tab.loading) return `<div class="pf-tab-panel">${countHtml}<div class="tg-status">Loading…</div></div>`;
    if (tab.error) return `<div class="pf-tab-panel">${countHtml}<div class="tg-status tg-status--error">${escapeHtml(tab.error)}</div></div>`;
    if (!tab.records.length) return `<div class="pf-tab-panel">${countHtml}<div class="pf-tab-empty">No tasks reference this project yet.</div></div>`;
    // Progress moved out to the right rail (renderProjectProgressRail) —
    // no longer shown inline above the task groups.
    const groups = groupProjectTasksByStatus(tab.records, tab.statusOptions);
    const groupsHtml = groups.map((g) => renderProjectStatusGroup(g, collapsedStatus, tab.statusOptions, tab.priorityOptions)).join('');
    return `<div class="pf-tab-panel">${countHtml}<div class="pf-status-group-list">${groupsHtml}</div></div>`;
  }

  // Bulk Status popover — a plain option list (no current-value highlight,
  // since a bulk action applies one value across a mixed-status
  // selection) with its own data-pfe-bulk-opt attribute, distinct from
  // the single-record renderPfeSelectPopover's data-pfe-opt.
  function renderPfeBulkStatusPopover(statusOptions) {
    const rows = (statusOptions || []).map((o) => `<div class="tg-pop-opt" data-pfe-bulk-opt="${escapeHtml(o.name)}">${escapeHtml(o.name)}</div>`).join('');
    return `<div class="tg-popover"><div class="tg-pop-label">Status</div><div class="tg-pop-list">${rows}</div></div>`;
  }

  // Fix 10 (Appendix B) — the profile mass-select bulk bar is inline
  // content next to the Select toggle, never Inbox's own fixed
  // bottom-sheet (that's a different layout context with its own
  // full-width convention) — so it gets its own compact wrapper
  // (.pfe-bulk-bar) sized to its content instead of reusing
  // .tg-bulk-bar's width:100%/border-top bottom-sheet styling.
  function renderProjectBulkBar() {
    const s = projectProfileState;
    if (!s.selecting) return '';
    const count = s.selected.size;
    const tasksTab = s.data.tabs.find((t) => t.key === 'tasks');
    const actions = [{ key: 'status', label: 'Status' }, { key: 'delete', label: 'Delete' }];
    const btnsHtml = actions.map((a) => `
      <div class="tg-pop-wrap tg-bulk-wrap">
        <button type="button" class="tg-bulk-btn" data-pfe-bulk-action="${a.key}"${count === 0 || pfeState.busy ? ' disabled' : ''}>${a.label}</button>
        ${s.bulkPopover === a.key && a.key === 'status' ? renderPfeBulkStatusPopover(tasksTab && tasksTab.statusOptions) : ''}
      </div>`).join('');
    return `<div class="pfe-bulk-bar">
      <div class="tg-bulk-cnt">${count} selected</div>
      <div class="tg-bulk-actions">${btnsHtml}</div>
    </div>`;
  }

  function renderProjectHeader(p) {
    const domainSegment = p.domainName
      ? `<span class="dmn-crumb-sep">·</span><a class="dmn-crumb-link" data-pf-nav="domain/${escapeHtml(p.domainId)}">${escapeHtml(p.domainName)}</a>`
      : '';
    return `<div class="dmn-head">
      <div class="dmn-idline"><span class="dmn-crumb-id">${p.uniqueId ? escapeHtml(p.uniqueId) : '—'}</span>${domainSegment}</div>
      <div class="dmn-title-row">${renderEditableTitleHtml('project', p.title)}</div>
    </div>`;
  }

  // Right-rail Progress (Framed-Layout Retrofit §4) — same slim-bar/"N of M
  // done" shape as the Domain aggregate, N now read directly off the
  // completed-count rollup (loadProjectProfile) rather than reconstructed.
  function renderProjectProgressRail(p) {
    if (p.totalTasks == null) return '';
    const pct = p.progressFraction != null ? Math.max(0, Math.min(100, Math.round(p.progressFraction * 100))) : 0;
    const doneLabel = p.doneTasks != null ? String(p.doneTasks) : '—';
    return `<section class="dmn-prop-sec dmn-prop-sec--progress">
      <h3>Progress</h3>
      <div class="dmn-prog-num">${escapeHtml(doneLabel)} of ${escapeHtml(String(p.totalTasks))} done</div>
      <div class="dmn-prog-bar"><i style="width:${pct}%"></i></div>
    </section>`;
  }

  // Right-rail hierarchy pass — Status/Priority move to the main column's
  // value-pill row; unchanged renderValuePill/renderPriorityValue markup.
  function renderProjectValuePills(p) {
    const statusPop = pfeOpenFor('project', 'status') ? renderPfeSelectPopover(p.statusOptions, p.statusName, { label: 'Status' }) : '';
    const statusHtml = `<span class="tg-pop-wrap">${renderValuePill(p.statusName ? escapeHtml(p.statusName) : 'No status', 'project:status')}${statusPop}</span>`;
    let priorityHtml;
    if (p.priorityPropName) {
      const priorityPop = pfeOpenFor('project', 'priority') ? renderPfeSelectPopover(p.priorityOptions, p.priorityName, { label: 'Priority', clearable: !!p.priorityName }) : '';
      priorityHtml = `<span class="tg-pop-wrap">${renderValuePill(renderPriorityValue(p.priorityName), 'project:priority')}${priorityPop}</span>`;
    } else {
      priorityHtml = renderValuePill(renderPriorityValue(p.priorityName));
    }
    return statusHtml + priorityHtml;
  }

  // DATES — meaningful user dates only; Created/Last edited moved to Log.
  // Start Date/Target Deadline/Date Completed are edit-slice editable
  // (§7); Date Archived/Date Paused are auto-written status-transition
  // stamps only (§8) — not individually hand-editable, so they render as
  // plain read-only rows even though they sit in the same DATES section.
  // Rows extracted from the section wrapper so the exact same markup can
  // also be dropped into the mobile value-pill row (see renderValuePillRow's
  // caller in paintProjectProfile) without duplicating the date logic itself.
  function renderProjectDateRows(p) {
    const contextRow = projectContextualDateRow(p);
    let contextRowHtml = '';
    if (contextRow) {
      contextRowHtml = contextRow.editable
        ? renderPfeDateRow(contextRow.label, contextRow.date, 'project', contextRow.field)
        : `<div class="dmn-kv"><span class="k">${escapeHtml(contextRow.label)}</span><span class="v">${contextRow.date && contextRow.date.start ? '🗓 ' + escapeHtml(formatDateShort(contextRow.date.start)) : '—'}</span></div>`;
    }
    return `${renderPfeDateRow('Start Date', p.startDate, 'project', 'start')}${renderPfeDateRow('Target Deadline', p.deadline, 'project', 'deadline')}${contextRowHtml}`;
  }
  function renderProjectDates(p) {
    return `<section class="dmn-prop-sec dmn-prop-sec--dates">
      <h3>Dates</h3>
      ${renderProjectDateRows(p)}
    </section>`;
  }

  function renderProjectLog(p) {
    return `<section class="dmn-prop-sec dmn-prop-sec--log">
      <h3>Log</h3>
      <div class="dmn-kv"><span class="k">Created</span><span class="v">${escapeHtml(formatDateTime(p.createdTime))}</span></div>
      <div class="dmn-kv"><span class="k">Last edited</span><span class="v">${escapeHtml(formatDateTime(p.lastEditedTime))}</span></div>
    </section>`;
  }

  // Right-rail hierarchy pass — Project's Properties is now relations only
  // (Priority/Status moved to the main-column pill row): Domain, People,
  // Collections.
  function renderProjectProperties(p) {
    const domainMeta = p.domainId
      ? (DOMAIN_META.find((d) => normalizeDbId(d.pageId) === normalizeDbId(p.domainId)) || NO_DOMAIN_META)
      : null;
    const domainHtml = p.domainName
      ? renderRelPill({
          label: p.domainName, icon: renderChipIcon(p.icons.domains),
          navId: p.domainId, navRoute: 'domain',
          styleAttr: domainMeta ? `background:${domainMeta.fill};color:${domainMeta.text};` : '',
          editKey: 'project:domain',
        })
      : renderGhostPill('Domain', 'project:domain');
    const domainPop = pfeOpenFor('project', 'domain') ? renderPfeRelationPopover({
      entity: 'project', field: 'domain', label: 'Domain',
      members: p.domainId ? [{ id: p.domainId, name: p.domainName }] : [],
      targetDbId: CONFIG.DB.DOMAINS, single: true, allowCreate: false,
    }) : '';

    const peoplePop = pfeOpenFor('project', 'people') ? renderPfeRelationPopover({
      entity: 'project', field: 'people', label: 'Person',
      members: p.people, targetDbId: CONFIG.DB.PEOPLE, single: false, allowCreate: true,
    }) : '';
    const peopleHtml = p.people.length
      ? p.people.map((pp) => renderRelPill({ label: pp.name, icon: renderChipIcon(p.icons.people), navId: pp.id, navRoute: 'person', editKey: 'project:people' })).join('')
      : renderGhostPill('Person', 'project:people');

    const collectionsPop = pfeOpenFor('project', 'collections') ? renderPfeRelationPopover({
      entity: 'project', field: 'collections', label: 'Collection',
      members: p.collections, targetDbId: CONFIG.DB.COLLECTIONS, single: false, allowCreate: false,
    }) : '';
    const collectionsHtml = p.collections.length
      ? p.collections.map((c) => renderRelPill({ label: c.name, icon: renderChipIcon(p.icons.collections), navId: c.id, navRoute: 'collection', editKey: 'project:collections' })).join('')
      : renderGhostPill('Collection', 'project:collections');

    // Archived/Focus checkboxes (Step D) — Archived's own transition
    // writes Date Archived in the same PATCH (applyProjectCheckboxToggle);
    // Focus carries no date side-effect, it's a plain flag.
    const archivedRow = p.archivedPropName ? `<div class="pfe-check-row"><span class="k">Archived</span><span class="pfe-checkbox${p.archivedChecked ? ' pfe-checkbox--checked' : ''}" data-pfe-action="project:archived" role="checkbox" aria-checked="${p.archivedChecked}">${p.archivedChecked ? '✓' : ''}</span></div>` : '';
    const focusRow = p.focusPropName ? `<div class="pfe-check-row"><span class="k">Focus</span><span class="pfe-checkbox${p.focusChecked ? ' pfe-checkbox--checked' : ''}" data-pfe-action="project:focus" role="checkbox" aria-checked="${p.focusChecked}">${p.focusChecked ? '✓' : ''}</span></div>` : '';

    // Pause Details (§8) — a hand-edited carry-forward note, editable any
    // time (not just at pause), full-string write on Save, never
    // auto-appended/stamped. Textarea always shows the field's live value;
    // the Save button only writes when the draft differs.
    const pauseDetailsHtml = p.pauseDetailsPropName ? `<div class="pfe-pausedetails">
      <div class="k" style="margin-bottom:6px;">Pause Details</div>
      <textarea data-pfe-pausedetails placeholder="What's unresolved — what would move this forward?">${escapeHtml(p.pauseDetailsText || '')}</textarea>
      <button type="button" class="pfe-pausedetails-save" data-pfe-save-pausedetails>Save</button>
    </div>` : '';

    return `<section class="dmn-prop-sec dmn-prop-sec--properties">
      <h3>Properties</h3>
      ${renderPropRow('Domain', domainHtml, domainPop)}
      ${renderPropRow('People', peopleHtml, peoplePop)}
      ${renderPropRow('Collections', collectionsHtml, collectionsPop)}
      ${archivedRow}
      ${focusRow}
      ${pauseDetailsHtml}
    </section>`;
  }

  const projectProfileState = {
    id: null, loading: false, error: null, data: null, activeTab: 'tasks', collapsedStatus: new Set(),
    // Mass-select (Step E carry-over) — Tasks tab only.
    selecting: false, selected: new Set(), bulkPopover: null,
  };

  function paintProjectProfile() {
    const s = projectProfileState;
    if (s.loading) {
      dmnMain.innerHTML = `<div class="dmn-status">Loading…</div>`;
      dmnProps.innerHTML = renderCaptureAffordance();
      return;
    }
    if (s.error) {
      dmnMain.innerHTML = `<div class="dmn-status dmn-status--error">${escapeHtml(s.error)}</div>`;
      dmnProps.innerHTML = renderCaptureAffordance();
      return;
    }
    const p = s.data.header;
    const tabsHtml = `<div class="pf-tabs" role="tablist">${s.data.tabs.map((t) => `
        <button type="button" class="pf-tab${t.key === s.activeTab ? ' pf-tab--active' : ''}" data-pf-project-tab="${t.key}" role="tab" aria-selected="${t.key === s.activeTab}">
          <span class="pf-tab-label">${escapeHtml(t.label)}</span>
          <span class="pf-tab-n">${t.count}</span>
        </button>`).join('')}</div>`;
    const activeTab = s.data.tabs.find((t) => t.key === s.activeTab) || s.data.tabs[0];
    const panelHtml = activeTab.key === 'tasks'
      ? renderProjectTasksTabPanel(activeTab, s.collapsedStatus)
      : renderRelationTabPanel(activeTab, 'Project');

    // Create-in-context (§5.6) — "+ New Task", pre-filled with this
    // project's relation, only on the Tasks tab (the tab it populates).
    const createTaskHtml = activeTab.key === 'tasks'
      ? `<button type="button" class="pfe-create-context" data-pfe-create-context="project:task">+ New Task</button><span class="pfe-select-bar">${renderMassSelectToggle('project', s.selecting)}${renderProjectBulkBar()}</span>`
      : '';
    dmnMain.innerHTML = `${renderProjectHeader(p)}${renderValuePillRow(renderProjectValuePills(p) + `<span class="dmn-datepills-inline">${renderProjectDateRows(p)}</span>`)}<section class="dmn-sec">${tabsHtml}${createTaskHtml}${panelHtml}</section>${renderPfeToast()}`;
    dmnProps.innerHTML = `${renderCaptureAffordance()}${renderProjectProgressRail(p)}${renderProjectDates(p)}${renderProjectProperties(p)}${renderProjectLog(p)}`;
  }

  async function mountProjectProfile(id) {
    const s = projectProfileState;
    s.id = id;
    s.loading = true;
    s.error = null;
    s.data = null;
    s.activeTab = 'tasks';
    s.collapsedStatus = new Set();
    s.selecting = false;
    s.selected = new Set();
    s.bulkPopover = null;
    ensureFramedShell();
    paintProjectProfile();
    try {
      const header = await loadProjectProfile(id);
      if (s.id !== id) return; // route moved on while this was in flight
      const tabs = await loadProjectTabs(id, header.tasksProjectsProp, header.notesProjectsProp);
      if (s.id !== id) return;
      // Default-collapsed groups (Done/Paused/etc.) are computed once here
      // rather than on every render, so re-rendering after a toggle doesn't
      // stomp on a group the user already expanded.
      const groups = groupProjectTasksByStatus(tabs[0].records, tabs[0].statusOptions);
      groups.forEach((g) => { if (g.collapsedDefault) s.collapsedStatus.add(g.key); });
      s.data = { header, tabs };
    } catch (err) {
      console.error('Failed to load project profile', err);
      if (s.id !== id) return;
      s.error = err.message || 'Could not load this project — check the Worker.';
    } finally {
      if (s.id === id) {
        s.loading = false;
        paintProjectProfile();
      }
    }
  }

  // Mirrors onRelationTabClick above but only Notes ever actually hits the
  // lazy-hydrate path (Tasks is always pre-hydrated as the default tab).
  async function onProjectTabClick(tabKey) {
    const s = projectProfileState;
    if (!s.data) return;
    const id = s.id;
    s.activeTab = tabKey;
    paintProjectProfile();
    const tab = s.data.tabs.find((t) => t.key === tabKey);
    if (!tab || tab.hydrated || tab.loading) return;
    if (tab.count === 0) {
      tab.records = [];
      tab.hydrated = true;
      paintProjectProfile();
      return;
    }
    tab.loading = true;
    paintProjectProfile();
    try {
      const [records, typeOrder] = await Promise.all([
        queryTabRecords('notes', REL_DB_META.notes, s.data.header.notesProjectsProp, id),
        getNotesTypeOrder(),
      ]);
      if (s.id !== id) return;
      tab.records = records;
      tab.typeOrder = typeOrder;
      tab.count = records.length;
      tab.hydrated = true;
    } catch (err) {
      console.error('Failed to load project tab', tabKey, err);
      if (s.id !== id) return;
      tab.error = err.message || 'Could not load this list.';
    } finally {
      tab.loading = false;
      if (s.id === id && s.activeTab === tabKey) paintProjectProfile();
    }
  }

  function onProjectStatusToggle(key) {
    const s = projectProfileState;
    if (s.collapsedStatus.has(key)) s.collapsedStatus.delete(key);
    else s.collapsedStatus.add(key);
    paintProjectProfile();
  }

  // ==========================================================================
  // Edit-slice write handlers — Task/Note/Project. Relation fields (up to
  // six per entity) share ONE set of pick/remove/clear/create handlers via
  // pfeActiveRelationField's small per-field descriptor table, rather than
  // one bespoke handler per entity × field; Status/Priority/dates/titles/
  // checkboxes stay per-entity (each is a couple of lines, not worth the
  // extra indirection). Every write here routes through the shared layer
  // (resolveOptionValue, the relation r-m-w helpers, the property-patch
  // builders) defined earlier — never a bespoke inline PATCH.
  // ==========================================================================

  // Which lookup database a relation field's picker searches/links
  // against — the one thing pfeTogglePopover needs to know to (lazily)
  // load that pool when a field's picker opens.
  const PFE_RELATION_TARGET_DB = {
    'note:domain': CONFIG.DB.DOMAINS, 'note:people': CONFIG.DB.PEOPLE, 'note:tags': CONFIG.DB.TAGS,
    'note:collections': CONFIG.DB.COLLECTIONS, 'note:projects': CONFIG.DB.PROJECTS, 'note:resources': CONFIG.DB.RESOURCES,
    'task:project': CONFIG.DB.PROJECTS, 'task:people': CONFIG.DB.PEOPLE,
    'project:domain': CONFIG.DB.DOMAINS, 'project:people': CONFIG.DB.PEOPLE, 'project:collections': CONFIG.DB.COLLECTIONS,
  };

  function pfeTogglePopover(entity, field) {
    if (pfeOpenFor(entity, field)) {
      pfeState.popover = null;
      paintActiveProfile();
      return;
    }
    pfeState.popover = { entity, field };
    pfeState.query = '';
    paintActiveProfile();
    const targetDbId = PFE_RELATION_TARGET_DB[`${entity}:${field}`];
    if (targetDbId && !pfeLookupPool(targetDbId)) {
      ensurePfeLookupLoaded(targetDbId).then(() => { if (pfeOpenFor(entity, field)) paintActiveProfile(); });
    }
  }

  // Resolves the active profile-state + field metadata for whichever
  // relation popover is open — the single indirection point every
  // pick/remove/clear/create handler reads through. `apply` is a
  // state-only sync (no network call — the generic handlers below make
  // the actual write) that patches the loaded profile data so the next
  // paint reflects it without a full reload.
  function pfeActiveRelationField() {
    const pop = pfeState.popover;
    if (!pop) return null;
    const { entity, field } = pop;
    if (entity === 'note') {
      const s = noteProfileState; if (!s.data) return null;
      const n = s.data;
      if (field === 'domain') {
        if (!n.domainProp) return null;
        return {
          pageId: n.id, hostDbId: CONFIG.DB.NOTES, dbId: CONFIG.DB.DOMAINS, single: true, label: 'Domain', allowCreate: false,
          propName: n.domainProp.name, selectShape: n.domainProp.type === 'select',
          currentIds: n.domainId ? [n.domainId] : [],
          apply: async (members) => {
            n.domainId = n.domainProp.type === 'relation' ? (members[0] ? members[0].id : null) : null;
            n.domainName = members[0] ? members[0].name : null;
          },
        };
      }
      const relMap = {
        people: { propName: n.peoplePropName, dbId: CONFIG.DB.PEOPLE, label: 'Person', allowCreate: true, listKey: 'people' },
        tags: { propName: n.tagsPropName, dbId: CONFIG.DB.TAGS, label: 'Tag', allowCreate: true, listKey: 'tags' },
        collections: { propName: n.collectionsPropName, dbId: CONFIG.DB.COLLECTIONS, label: 'Collection', allowCreate: false, listKey: 'collections' },
        projects: { propName: n.projectsPropName, dbId: CONFIG.DB.PROJECTS, label: 'Project', allowCreate: true, listKey: 'projects' },
        resources: { propName: n.resourcesPropName, dbId: CONFIG.DB.RESOURCES, label: 'Resource', allowCreate: false, listKey: 'resources' },
      };
      const cfg = relMap[field];
      if (!cfg) return null;
      return {
        pageId: n.id, hostDbId: CONFIG.DB.NOTES, dbId: cfg.dbId, single: false, label: cfg.label, allowCreate: cfg.allowCreate, propName: cfg.propName,
        currentIds: n[cfg.listKey].map((m) => m.id),
        apply: async (members) => { n[cfg.listKey] = members; },
      };
    }
    if (entity === 'task') {
      const s = taskProfileState; if (!s.data) return null;
      const t = s.data;
      if (field === 'project') {
        return {
          pageId: t.id, hostDbId: CONFIG.DB.TASKS, dbId: CONFIG.DB.PROJECTS, single: true, label: 'Project', allowCreate: true, propName: t.projectsPropName,
          currentIds: t.projects.map((p) => p.id),
          apply: async (members) => {
            t.projects = members;
            // Domain is derived through the project — re-resolve so the
            // read-only Domain pill stays correct after a Project change.
            const resolution = await resolveTaskProjectAndDomain(members.map((m) => m.id));
            t.domainId = resolution.domainId;
            const domainRel = resolution.domainId ? await resolveRelationNames(CONFIG.DB.DOMAINS, [resolution.domainId]) : [];
            t.domainName = domainRel.length ? domainRel[0].name : null;
          },
        };
      }
      if (field === 'people') {
        return {
          pageId: t.id, hostDbId: CONFIG.DB.TASKS, dbId: CONFIG.DB.PEOPLE, single: false, label: 'People', allowCreate: true, propName: t.peoplePropName,
          currentIds: t.people.map((p) => p.id),
          apply: async (members) => { t.people = members; },
        };
      }
      return null;
    }
    if (entity === 'project') {
      const s = projectProfileState; if (!s.data) return null;
      const p = s.data.header;
      if (field === 'domain') {
        return {
          pageId: p.id, hostDbId: CONFIG.DB.PROJECTS, dbId: CONFIG.DB.DOMAINS, single: true, label: 'Domain', allowCreate: false, propName: p.domainPropName,
          currentIds: p.domainId ? [p.domainId] : [],
          apply: async (members) => { p.domainId = members[0] ? members[0].id : null; p.domainName = members[0] ? members[0].name : null; },
        };
      }
      if (field === 'people') {
        return {
          pageId: p.id, hostDbId: CONFIG.DB.PROJECTS, dbId: CONFIG.DB.PEOPLE, single: false, label: 'Person', allowCreate: true, propName: p.peoplePropName,
          currentIds: p.people.map((pp) => pp.id),
          apply: async (members) => { p.people = members; },
        };
      }
      if (field === 'collections') {
        return {
          pageId: p.id, hostDbId: CONFIG.DB.PROJECTS, dbId: CONFIG.DB.COLLECTIONS, single: false, label: 'Collection', allowCreate: false, propName: p.collectionsPropName,
          currentIds: p.collections.map((c) => c.id),
          apply: async (members) => { p.collections = members; },
        };
      }
      return null;
    }
    return null;
  }

  // Every handler below resolves the field's new member set as a fresh
  // {id,name}[] straight from resolveRelationNames and hands that array
  // to desc.apply() as one unit — never re-zipped against a separately-
  // computed ids array, which could silently misalign if
  // resolveRelationNames ever drops an entry (an archived/deleted linked
  // page resolves softly to nothing, per its own contract).
  const applyPfeRelationPick = withPfeBusy(async (memberId) => {
    const desc = pfeActiveRelationField();
    if (!desc) return;
    try {
      let members;
      if (desc.single) {
        members = await resolveRelationNames(desc.dbId, [memberId]);
        if (desc.selectShape) {
          await patchProperties(desc.pageId, selectPropertyPatch(desc.propName, members[0] ? members[0].name : null));
        } else {
          await setRelationSingle(desc.pageId, desc.propName, memberId);
        }
      } else {
        const newIds = await addRelationMember(desc.pageId, desc.hostDbId, desc.propName, memberId);
        members = await resolveRelationNames(desc.dbId, newIds);
      }
      await desc.apply(members);
      pfeState.popover = null;
      pfeState.query = '';
      paintActiveProfile();
    } catch (err) {
      console.error('Failed to link', err);
      showPfeToast(err.message || 'Could not link — try again.');
    }
  });

  const applyPfeRelationRemove = withPfeBusy(async (memberId) => {
    const desc = pfeActiveRelationField();
    if (!desc || desc.single) return; // single fields use Clear, never a per-member ×
    try {
      const newIds = await removeRelationMember(desc.pageId, desc.hostDbId, desc.propName, memberId);
      const members = await resolveRelationNames(desc.dbId, newIds);
      await desc.apply(members);
      paintActiveProfile();
    } catch (err) {
      console.error('Failed to remove', err);
      showPfeToast(err.message || 'Could not remove — try again.');
    }
  });

  const applyPfeRelationClear = withPfeBusy(async () => {
    const desc = pfeActiveRelationField();
    if (!desc) return;
    try {
      if (desc.selectShape) await patchProperties(desc.pageId, selectPropertyPatch(desc.propName, null));
      else await writeRelationIds(desc.pageId, desc.propName, []);
      await desc.apply([]);
      pfeState.popover = null;
      paintActiveProfile();
    } catch (err) {
      console.error('Failed to clear', err);
      showPfeToast(err.message || 'Could not clear — try again.');
    }
  });

  const applyPfeRelationCreate = withPfeBusy(async (name) => {
    const desc = pfeActiveRelationField();
    if (!desc || !desc.allowCreate) return;
    try {
      const entry = await pfeCreateAndLink(desc.dbId, name);
      let members;
      if (desc.single) { await setRelationSingle(desc.pageId, desc.propName, entry.id); members = [entry]; }
      else {
        const newIds = await addRelationMember(desc.pageId, desc.hostDbId, desc.propName, entry.id);
        members = await resolveRelationNames(desc.dbId, newIds);
      }
      await desc.apply(members);
      pfeState.popover = null;
      pfeState.query = '';
      paintActiveProfile();
      // A Project created from a picker (rather than a Domain's own
      // create-in-context) has no Domain yet — resurfaces in the Inbox
      // until one is assigned (§5.7).
      if (desc.dbId === CONFIG.DB.PROJECTS) {

  // --- Task: completion, Status, Priority, dates, title -------------------
  const applyTaskCompletionToggle = withPfeBusy(async () => {
    const s = taskProfileState;
    if (!s.data) return;
    const id = s.id;
    const wasDone = (s.data.statusName || '').toLowerCase() === 'done';
    try {
      const resolved = await resolveOptionValue(CONFIG.DB.TASKS, s.data.statusPropName, wasDone ? 'Not Started' : 'Done');
      const today = todayIsoLocal();
      const props = { ...statusPropertyPatch(s.data.statusPropName, resolved) };
      if (s.data.completedPropName) Object.assign(props, datePropertyPatch(s.data.completedPropName, wasDone ? null : today));
      // Step A spike: confirmed-first — await, then re-render from the
      // write itself rather than flipping optimistically, to validate the
      // pipeline before the rest of the slice generalizes to optimistic.
      await patchProperties(id, props);
      if (s.id !== id) return;
      s.data.statusName = resolved;
      if (s.data.completedPropName) s.data.completedDate = wasDone ? null : { start: today };
      paintActiveProfile();
    } catch (err) {
      console.error('Failed to toggle completion', err);
      showPfeToast(err.message || 'Could not update completion — try again.');
    }
  });

  const applyTaskStatusEdit = withPfeBusy(async (value) => {

      // Status-transition side effect (§8) folded into the same PATCH —
      // -> Done also stamps Completed, same compound write the hero
      // checkbox makes, so the two entry points stay consistent.
      const today = todayIsoLocal();
      if (resolved.toLowerCase() === 'done' && s.data.completedPropName) Object.assign(props, datePropertyPatch(s.data.completedPropName, today));
      await patchProperties(id, props);
      if (s.id !== id) return;
      s.data.statusName = resolved;
      if (resolved.toLowerCase() === 'done' && s.data.completedPropName) s.data.completedDate = { start: today };

  const applyTaskDateEdit = withPfeBusy(async (field, iso) => {
    const s = taskProfileState;
    if (!s.data) return;
    const id = s.id;
    const propName = { due: s.data.dueDatePropName, do: s.data.doDatePropName, completed: s.data.completedPropName }[field];
    if (!propName) { showPfeToast('Could not find that date property on the Notion schema — try again.'); return; }
    try {
      const props = datePropertyPatch(propName, iso);
      // Fix 3 (Appendix A) — clearing Completed is the inverse of the
      // completion checkbox: an empty Completed date is incompatible with
      // Done, so it also reverts Status. Editing the date to a different
      // day (iso truthy) is a catch-up correction and leaves Status alone.
      if (field === 'completed' && !iso) {
        const notStarted = await resolveOptionValue(CONFIG.DB.TASKS, s.data.statusPropName, 'Not Started');
        Object.assign(props, statusPropertyPatch(s.data.statusPropName, notStarted));
        await patchProperties(id, props);
        if (s.id !== id) return;
        s.data.statusName = notStarted;
      } else {
        await patchProperties(id, props);
      }
      if (s.id !== id) return;
      s.data[{ due: 'dueDate', do: 'doDate', completed: 'completedDate' }[field]] = iso ? { start: iso } : null;
      pfeState.popover = null;

  // mounted (Project's Tasks tab or Domain's Inbox/Admin grid — the two
  // places a task-grid card renders) and mutates it in place, mirroring
  // applyTaskCardCompletionToggle's own lookup.
  function pfeUpdateCardRecordEverywhere(taskId, mutate) {
    const route = currentRoute();
    if (route === 'project' && projectProfileState.data) {
      const tab = projectProfileState.data.tabs.find((t) => t.key === 'tasks');
      const rec = tab && tab.records.find((r) => r.id === taskId);
      if (rec) mutate(rec);
    } else if (route === 'domain' && domainProfileState.data) {

      if (rec) mutate(rec);

  // --- Inline Status+Priority pills on task-grid cards (Project's Tasks
  // tab, Domain's Inbox/Admin, per Step E) — a lightweight parallel to
  // pfeState.popover, since a card isn't the mounted Task profile: popover
  // identity is (taskId, field), and writes go straight to Notion by task
  // id (mirroring applyTaskCardCompletionToggle) rather than through a
  // mounted profile's own state.
  const pfeCardPopover = { taskId: null, field: null };
  function pfeCardOpenFor(taskId, field) {
    return pfeCardPopover.taskId === taskId && pfeCardPopover.field === field;
  }
  function pfeToggleCardPopover(taskId, field) {
    if (pfeCardOpenFor(taskId, field)) { pfeCardPopover.taskId = null; pfeCardPopover.field = null; }
    else { pfeCardPopover.taskId = taskId; pfeCardPopover.field = field; }
    paintActiveProfile();
  }
  function renderPfeCardSelectPopover(taskId, options, currentValue, opts = {}) {
    const rows = (options || []).map((o) => `<div class="tg-pop-opt${o.name === currentValue ? ' on' : ''}" data-pfe-card-opt="${escapeHtml(o.name)}" data-pfe-card-id="${escapeHtml(taskId)}">${escapeHtml(o.name)}</div>`).join('');
    const clearHtml = opts.clearable ? `<div class="tg-pop-opt tg-pop-opt--clear" data-pfe-card-clear="true" data-pfe-card-id="${escapeHtml(taskId)}">Clear</div>` : '';
    return `<div class="tg-popover">${opts.label ? `<div class="tg-pop-label">${escapeHtml(opts.label)}</div>` : ''}<div class="tg-pop-list">${rows}</div>${clearHtml}</div>`;
  }
  // `priorityOptions` is null when the tab/card context hasn't resolved a
  // Priority property at all (never rendered in that case, same
  // degrade-gracefully rule every other optional property follows here).
  //
  // Fix 9 (Appendix B) — Due Date moves into this same pill row instead of
  // rendering as muted metadata at the card's bottom (it's the scanned
  // field). Read-only here (no data-pfe-card-action) — editing still
  // happens on the record itself. Do Date never appears on a card. The
  // two card record shapes name this field differently (Project's own
  // `r.due` vs Domain's `t.dueDate`), so both are checked rather than
  // renaming either and risking a missed reference elsewhere.
  function renderPfeCardValuePills(r, statusOptions, priorityOptions) {
    const statusPop = pfeCardOpenFor(r.id, 'status') ? renderPfeCardSelectPopover(r.id, statusOptions, r.statusName, { label: 'Status' }) : '';
    const statusHtml = `<span class="tg-pop-wrap"><span class="pf-pill pf-pill--value dmn-card-pill" data-pfe-card-action="status" data-pfe-card-id="${escapeHtml(r.id)}">${escapeHtml(r.statusName || 'No status')}</span>${statusPop}</span>`;
    let priorityHtml = '';
    if (priorityOptions && priorityOptions.length) {
      const priorityPop = pfeCardOpenFor(r.id, 'priority') ? renderPfeCardSelectPopover(r.id, priorityOptions, r.priorityName, { label: 'Priority', clearable: !!r.priorityName }) : '';
      priorityHtml = `<span class="tg-pop-wrap"><span class="pf-pill pf-pill--value dmn-card-pill" data-pfe-card-action="priority" data-pfe-card-id="${escapeHtml(r.id)}">${escapeHtml(r.priorityName || 'No priority')}</span>${priorityPop}</span>`;
    }
    const due = r.due || r.dueDate || null;
    const dueHtml = (due && due.start)
      ? `<span class="pf-pill pf-pill--value dmn-card-pill dmn-card-pill--due">🗓 ${escapeHtml(formatDateShort(due.start))}</span>`
      : '';
    return `<div class="dmn-card-pills">${statusHtml}${priorityHtml}${dueHtml}</div>`;
  }

  const applyTaskCardStatusEdit = withPfeBusy(async (taskId, value) => {
